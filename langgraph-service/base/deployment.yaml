apiVersion: apps/v1
kind: Deployment
metadata:
  name: langgraph-service
  labels:
    app: langgraph-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langgraph-service
  template:
    metadata:
      labels:
        app: langgraph-service
    spec:
      serviceAccountName: langgraph-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: langgraph-service
          image: langgraph-service:dev   # rewritten by overlay's `images:` block
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            # --- Cluster-config helpers (Phase 2 portability refactor) ---
            # DOMAIN + KEYCLOAK_REALM come from the cluster-config CM in
            # this namespace (raj-ai-lab-eks-infra/cluster-config-cm.tf).
            # Lets us fork to a new account/domain without editing YAML.
            - name: DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: cluster-config
                  key: domain
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: cluster-config
                  key: keycloak_realm
            # --- Keycloak OIDC config -------------------------------
            # Issuer URL — must match the realm exactly (incl. https
            # scheme + trailing /realms/<name>). Token `iss` claim is
            # checked verbatim against this string. K8s expands $(VAR)
            # at container start after all env entries are resolved.
            - name: KEYCLOAK_ISSUER
              value: https://keycloak.$(DOMAIN)/realms/$(KEYCLOAK_REALM)
            # Audience claim check is disabled in main.py for now (see
            # the comment there); this var is reserved for the eventual
            # azp/aud-based client lock-down.
            - name: KEYCLOAK_AUDIENCE
              value: langgraph-service

            # --- Model variant URLs ---------------------------------
            # In-cluster Service DNS for each model tier. The variant
            # Deployments live in the llm ns; their Services share the
            # same parent host as the default `vllm` Service, but
            # Service objects per-variant aren't currently shipped in
            # the llm/base/ kustomization (the variants exist as
            # Deployments only — see deployment-variants.yaml +
            # deployment-models.yaml). The JIT-scale logic talks to
            # the Deployment by name; the inference call uses these
            # URLs which assume per-variant Services exist.
            #
            # FOLLOW-UP: add per-variant Services to llm/base/ so
            # vllm-llama-8b.llm.svc:8000 actually resolves.
            - name: MODEL_TRIVIAL_URL
              value: http://vllm-llama-8b.llm.svc.cluster.local:8000
            - name: MODEL_REASONING_URL
              value: http://vllm-deepseek-r1-70b.llm.svc.cluster.local:8000
            - name: MODEL_HARD_URL
              value: http://vllm.llm.svc.cluster.local:8000

            # --- Deployment names for kubernetes-client scaling -----
            - name: DEPLOY_TRIVIAL
              value: vllm-llama-8b
            - name: DEPLOY_REASONING
              value: vllm-deepseek-r1-70b
            - name: DEPLOY_HARD
              value: vllm
            - name: LLM_NAMESPACE
              value: llm

            # --- Phase 4: rag-service /retrieve --------------------
            # In-cluster Service URL — no public ingress hop. The
            # retrieve node forwards the user's bearer token to
            # rag-service for JWT validation + per-user Qdrant filter.
            - name: RAG_SERVICE_URL
              value: http://rag-service.rag.svc.cluster.local
            - name: RAG_RETRIEVE_TIMEOUT_SECONDS
              value: "30"
            - name: RAG_TOP_K_DEFAULT
              value: "5"

            # --- Observability --------------------------------------
            # OTel OTLP endpoint — Tempo in monitoring ns. Same target
            # as rag-service so traces interleave in the Tempo UI.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo.monitoring.svc.cluster.local:4317
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: OTEL_SERVICE_NAME
              value: langgraph-service
            - name: OTEL_TRACES_SAMPLER
              value: parentbased_always_on

            # --- Langfuse base URL (keys via envFrom below) ---------
            # In-cluster Service URL, not the public ingress hostname.
            # Trace export is pod→pod east-west traffic; routing it
            # through ingress-nginx adds DNS lookup, NAT egress, public
            # ALB hop, TLS termination + re-handshake on every flush —
            # and depends on the ingress upstream being healthy (it
            # was returning 503 at the time of this change). The mesh's
            # AuthorizationPolicy gating cross-namespace traffic into
            # langfuse must allow the langgraph-service SA — see
            # raj-ai-lab-eks-infra/istio-zero-trust.tf
            # (allow_langgraph_to_langfuse).
            - name: LANGFUSE_HOST
              value: http://langfuse-web.langfuse.svc.cluster.local:3000

            # --- Phase #4: content safety (Llama Guard 3 8B) -----------
            # Master switch defaults to "false" so the safety nodes
            # pass through (return safety_action="passed", no Llama
            # Guard call). Flip to "true" after vllm-llama-guard-3-8b
            # has been scaled up at least once and the operator wants
            # the safety filter active. The graph topology is identical
            # whether enabled or not — only the per-node call/skip
            # behavior changes — so toggling this is a Deployment env
            # edit + ArgoCD sync, no graph rewiring.
            - name: SAFETY_FILTER_ENABLED
              value: "false"
            - name: SAFETY_LLAMA_GUARD_URL
              value: http://vllm-llama-guard-3-8b.llm.svc.cluster.local:8000/v1
            - name: SAFETY_LLAMA_GUARD_MODEL
              value: llama-guard-3-8b
            # Fail-open in the lab. Production switches to "closed".
            - name: SAFETY_FAIL_MODE
              value: open
            # Hazard category allowlist — comma-separated S-codes from
            # Meta's taxonomy that should trigger a block. Default is
            # all 14 categories. Narrow by setting to e.g. "S1,S4,S9"
            # if some categories produce too many false positives for
            # this lab's user-base.
            - name: SAFETY_BLOCK_CATEGORIES
              value: S1,S2,S3,S4,S5,S6,S7,S8,S9,S10,S11,S12,S13,S14

            # --- Phase #5: cost guardrails (Redis token bucket) --------
            # Master switch defaults to "false" so a default deploy
            # never rate-limits anyone — the langgraph-redis Service
            # might exist but be unready at first sync, and we don't
            # want fail-closed behavior surprise during initial roll.
            # Flip to "true" once langgraph-redis pod is Ready.
            - name: BUDGET_ENABLED
              value: "false"
            - name: BUDGET_REDIS_URL
              value: redis://langgraph-redis.langgraph.svc.cluster.local:6379/0
            # Per-user daily request cap. 200 is comfortable for a
            # single-user lab demo (the implicit "200 prompts in a
            # day" ceiling is way past what a human would actually
            # send). Multi-user deployments should set this lower
            # (e.g. 50) and consider per-tier multipliers later.
            - name: BUDGET_REQUESTS_PER_DAY
              value: "200"
            # Fail-open in the lab — a Redis outage shouldn't break
            # langgraph-service entirely. Production switches to
            # "closed" when rate-limiting is a security posture
            # concern (e.g. multi-tenant SaaS).
            - name: BUDGET_FAIL_MODE
              value: open

            # --- Phase #6: conversational memory + query rewriting -----
            # Both default to false so existing /invoke behavior is
            # unchanged on this commit. Flip to "true" once chat-ui
            # passes session_id consistently and you've smoked the
            # rewrite quality on real conversations. The feature
            # depends on langgraph-redis being reachable; failure mode
            # is graceful (no memory loaded, raw prompt used for
            # retrieve) — the request never errors due to memory.
            - name: MEMORY_ENABLED
              value: "false"
            # Recent turns the rewrite_query node sees as conversation
            # context. 5 is enough for typical pronoun resolution; bump
            # if users reference content from earlier in the session.
            - name: MEMORY_RECENT_TURNS
              value: "5"
            # Re-summarize every Nth turn. 10 means once a conversation
            # crosses 10 turns, the summary regenerates from the last
            # 10 turns. Lower N = more LLM cost, fresher summary;
            # higher N = stale summary risk on long conversations.
            - name: MEMORY_SUMMARIZE_AFTER_TURNS
              value: "10"
            # 7-day TTL on memory keys. Idle sessions self-clean.
            # Active sessions get TTL refresh on every save/load.
            - name: MEMORY_TTL_SECONDS
              value: "604800"

            - name: QUERY_REWRITE_ENABLED
              value: "false"

            # --- Phase #7: semantic prompt cache -----------------------
            # Embedding-similarity cache. On hit, the entire downstream
            # graph is skipped — classify, retrieve, ensure_warm,
            # execute, reflect, safety_output don't run. Halves cost on
            # repetitive workloads.
            #
            # Default disabled. Activation requires vllm-bge-m3 to be
            # Ready (it computes the embeddings used for similarity).
            # When bge-m3 is at 0 replicas, the cache fails open
            # gracefully (lookup returns miss, the request runs the
            # full pipeline).
            - name: CACHE_ENABLED
              value: "false"
            - name: CACHE_EMBEDDINGS_URL
              value: http://vllm-bge-m3.llm.svc.cluster.local:8000/v1
            - name: CACHE_EMBEDDINGS_MODEL
              value: bge-m3
            # 0.95 = "very similar but not identical." Tighten if cache
            # returns wrong answers from related-but-different prompts;
            # loosen if you want broader hits at the cost of occasional
            # off-target cached responses.
            - name: CACHE_SIMILARITY_THRESHOLD
              value: "0.95"
            # 20 entries × ~10KB per entry = ~200KB per session in
            # Redis. Negligible for this lab.
            - name: CACHE_MAX_ENTRIES_PER_SESSION
              value: "20"
            # 24h TTL. Cache loses freshness faster than memory
            # because retrieval results may have changed.
            - name: CACHE_TTL_SECONDS
              value: "86400"

          envFrom:
            # Langfuse keys live in a Secret created by
            # raj-ai-lab-eks-infra/langgraph.tf, mirroring the
            # rag-service-langfuse pattern in the rag namespace.
            # optional=true means the pod admits when the Secret is
            # missing — handy for first-deploy before tfvars are filled.
            - secretRef:
                name: langgraph-service-langfuse
                optional: true

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"

          # /healthz is auth-bypassed in the FastAPI app exactly to
          # support these probes — kubelet doesn't carry a JWT.
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        # Read-only root means /tmp needs an emptyDir for any transient
        # writes (uvicorn pid file, JWKs cache disk-fallback if it ever
        # adds one).
        - name: tmp
          emptyDir: {}
