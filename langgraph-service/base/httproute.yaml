# HTTPRoute — Phase 4 of Gateway API migration (langgraph-service is
# the second app to migrate; rag-service was first).
#
# Same pattern as raj-ai-lab-eks/rag-service/base/httproute.yaml:
#   - Lives alongside the existing Ingress during the migration window
#   - Both serve the same hostname; Ingress reachable via NGINX NLB,
#     HTTPRoute reachable via Istio Gateway NLB. No conflict because
#     each NLB has its own DNS hostname; Route53 rewrites determine
#     which one the public hostname resolves to.
#   - parentRefs.sectionName binds to the langgraph-https listener
#     specifically (not all listeners on shared-gateway), matching
#     the rag-service pattern. Defensive against future cross-listener
#     attachment.
#
# NOTE on the upstream-vhost annotation in the legacy Ingress:
#   The Ingress had `nginx.ingress.kubernetes.io/upstream-vhost:
#   langgraph-service.langgraph.svc.cluster.local` as a workaround for
#   NGINX→meshed-backend Host-header issues. HTTPRoute doesn't need
#   this — the Istio Gateway IS the mesh data plane, so it routes to
#   meshed Services natively without Host-header gymnastics.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: langgraph-service
  labels:
    app: langgraph-service
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway-system
      sectionName: langgraph-https
  hostnames:
    - langgraph.example.local   # overlay patches with real FQDN
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: langgraph-service
          port: 80
