apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - serviceaccount.yaml
  # Phase #30: deployment.yaml removed — replaced by rollout.yaml
  # (Argo Rollouts canary). The Rollout CRD has a Deployment-shaped
  # template plus a strategy.canary block; everything else (probes,
  # env, resources, securityContext) is identical.
  - rollout.yaml
  # Phase #30: AnalysisTemplate referenced by rollout.yaml's canary
  # step. Queries Prometheus for /invoke success rate and pass/fails
  # the canary at the checkpoint.
  - analysistemplate.yaml
  # Phase #34: background AnalysisTemplate. Runs continuously
  # throughout the canary lifecycle (not at checkpoints) as a
  # watchdog for sustained error-rate spikes between gated checks.
  - analysistemplate-bg.yaml
  - service.yaml
  # Phase #31: stable + canary Services for argo-rollouts Istio
  # trafficRouting. argo-rollouts injects rollouts-pod-template-hash
  # into their selectors at runtime so each Service targets only
  # its respective ReplicaSet's pods.
  - service-stable.yaml
  - service-canary.yaml
  # Phase #31: VirtualService routing east-west traffic (gateways:
  # [mesh]) from langgraph-service.svc to weighted -stable/-canary.
  # argo-rollouts mutates spec.http[0].route[*].weight in real time
  # at each canary step.
  - virtualservice.yaml
  - httproute.yaml
  - servicemonitor.yaml
  # Phase #75b: redis.yaml removed — replaced by the Bitnami Redis
  # HA chart (3-pod Sentinel-mode StatefulSet) in
  # raj-ai-lab-eks-infra/langgraph-redis.tf (Phase #75a).
  # The original Phase #5 design (single-pod emptyDir Deployment,
  # restart-amnesty for the cost-bucket) was upgraded because
  # langgraph-redis ALSO holds Chainlit conversation memory, which
  # is user-visible state worth preserving across pod restarts.
  # langgraph-service rollout.yaml's BUDGET_REDIS_URL now points at
  # langgraph-redis-ha:6379 (the Sentinel-aware Service).
  # Phase #67: HPA scales langgraph-service 2 → 5 replicas on CPU.
  - hpa.yaml
