apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - serviceaccount.yaml
  # Phase #30: deployment.yaml removed — replaced by rollout.yaml
  # (Argo Rollouts canary). The Rollout CRD has a Deployment-shaped
  # template plus a strategy.canary block; everything else (probes,
  # env, resources, securityContext) is identical.
  - rollout.yaml
  # Phase #30: AnalysisTemplate referenced by rollout.yaml's canary
  # step. Queries Prometheus for /invoke success rate and pass/fails
  # the canary at the checkpoint.
  - analysistemplate.yaml
  - service.yaml
  # Phase #31: stable + canary Services for argo-rollouts Istio
  # trafficRouting. argo-rollouts injects rollouts-pod-template-hash
  # into their selectors at runtime so each Service targets only
  # its respective ReplicaSet's pods.
  - service-stable.yaml
  - service-canary.yaml
  # Phase #31: VirtualService routing east-west traffic (gateways:
  # [mesh]) from langgraph-service.svc to weighted -stable/-canary.
  # argo-rollouts mutates spec.http[0].route[*].weight in real time
  # at each canary step.
  - virtualservice.yaml
  - httproute.yaml
  - servicemonitor.yaml
  # Phase #5: dedicated Redis for the cost-guardrails token bucket.
  # In-namespace, single-replica, no persistence — daily-bucket
  # workload tolerates restart-amnesty.
  - redis.yaml
