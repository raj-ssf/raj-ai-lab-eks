# ServiceAccount + cross-namespace RBAC for the JIT scale-up flow.
#
# The agent's `ensure_warm` node calls the Kubernetes API to set
# replicas=1 on a target vllm-* Deployment in the `llm` namespace
# when a routing decision picks a model that isn't currently warm.
# The scale subresource is the minimum-privilege primitive for this
# (rather than full deployments/update which could mutate spec.template).
#
# The SA itself lives in `langgraph` namespace; the Role + RoleBinding
# live in `llm` to grant cross-namespace access. RoleBinding refers
# back to the langgraph-namespaced SA via subjects.namespace.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: langgraph-service
  labels:
    app: langgraph-service

---
# Role lives in the llm ns (where the target Deployments are). Not a
# ClusterRole because we want to scope this strictly to llm — the
# agent has no business scaling deployments anywhere else.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: langgraph-scale-llm-deployments
  namespace: llm
  labels:
    app: langgraph-service
rules:
  # Read deployment status to check current replica count + readiness.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  # The scale subresource — patch to set spec.replicas, get to read
  # current value. Doesn't grant the ability to mutate other fields.
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch", "update"]
  # Read pod status during the wait-for-ready loop after a scale-up.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: langgraph-scale-llm-deployments
  namespace: llm
  labels:
    app: langgraph-service
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: langgraph-scale-llm-deployments
subjects:
  - kind: ServiceAccount
    name: langgraph-service
    namespace: langgraph
