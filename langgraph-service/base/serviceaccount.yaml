# ServiceAccount + cross-namespace RBAC for the ensure_warm wait loop.
#
# The agent's `ensure_warm` node READS Deployment + Pod status across
# the namespace boundary (langgraph SA → llm Deployments) to decide
# whether the chosen variant is already serving, in cold-start, or
# gitops-cold (replicas=0). It NEVER writes — Phase #81e Option-A
# (2026-05-02) moved scaling fully to gitops via
# raj-ai-lab-eks/llm/base/scaling.yaml, so the SA's prior
# `deployments/scale` patch/update permission was withdrawn.
#
# The SA lives in `langgraph` namespace; the Role + RoleBinding live
# in `llm` to grant cross-namespace read access. RoleBinding refers
# back to the langgraph-namespaced SA via subjects.namespace.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: langgraph-service
  labels:
    app: langgraph-service

---
# Role lives in the llm ns (where the read targets are). Not a
# ClusterRole because we want to scope this strictly to llm — the
# agent has no business reading deployments anywhere else.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  # Renamed from langgraph-scale-llm-deployments → langgraph-read-llm-status
  # 2026-05-02 to reflect the read-only contract post Phase #81e Option-A.
  name: langgraph-read-llm-status
  namespace: llm
  labels:
    app: langgraph-service
rules:
  # Read deployment status to check current replica count + readiness.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  # GET on /scale subresource only — used by _read_replicas to read
  # spec.replicas via the scale endpoint. NO patch/update — gitops owns
  # writes via scaling.yaml; granting patch here would let a compromised
  # langgraph-service pod silently revert operator scaling decisions.
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get"]
  # Read pod status during the wait-for-ready loop.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: langgraph-read-llm-status
  namespace: llm
  labels:
    app: langgraph-service
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: langgraph-read-llm-status
subjects:
  - kind: ServiceAccount
    name: langgraph-service
    namespace: langgraph
