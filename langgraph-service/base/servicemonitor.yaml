# ServiceMonitor for kube-prometheus-stack to scrape /metrics. Same
# label scheme as rag-service so the existing Prometheus
# serviceMonitorSelector picks it up without config changes.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: langgraph-service
  labels:
    app: langgraph-service
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: langgraph-service
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
