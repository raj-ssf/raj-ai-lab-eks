# Phase #35: rag-service converted to Argo Rollouts canary, mirror
# of the langgraph-service Phase #30+#31 conversion. Replaces
# deployment.yaml. Step-gated + background analysis runs against
# the rag_* metrics introduced in Phase #24.
#
# Migration notes (same as langgraph-service):
#   - Spec is identical to the prior Deployment except for:
#       apiVersion + kind     (apps/v1 Deployment → argoproj.io/v1alpha1 Rollout)
#       spec.replicas         (1 → 2; canary needs ≥2 replicas)
#       spec.strategy         (RollingUpdate → canary with steps + analysis)
#   - Pod template is byte-identical to deployment.yaml — same env,
#     same Vault annotations, same probes, same volumes. The Vault
#     Agent Injector annotations are particularly load-bearing:
#     without them, pods don't get /vault/secrets/* mounted and
#     rag-service's startup checks fail.
#   - When ArgoCD reconciles this, it prunes the prior Deployment
#     and creates the Rollout. Brief endpoint gap during the swap.
#
# Why replicas: 2 (was 1):
#   Same rationale as langgraph — replica-percentage canary needs
#   ≥2 replicas, and even with traffic-percentage canary (used
#   here), the canary RS is sized as ceil(replicas × weight/100),
#   so replicas=1 with setWeight 10 still gives 1 canary pod which
#   handles ALL canary traffic alone. Two replicas keeps stable HA
#   during canary.

apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: rag-service
  labels:
    app: rag-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-service
  strategy:
    canary:
      canaryService: rag-service-canary
      stableService: rag-service-stable
      trafficRouting:
        istio:
          virtualService:
            name: rag-service-canary-vs
            routes:
              - primary
      steps:
        - setWeight: 10
        - pause:
            duration: 1m
        - analysis:
            templates:
              - templateName: rag-service-canary-checks
        - setWeight: 50
        - pause:
            duration: 1m
        - analysis:
            templates:
              - templateName: rag-service-canary-checks
      # Background watchdog — runs continuously throughout the
      # canary, complements step-gated analysis. See
      # analysistemplate-bg.yaml for the design rationale.
      analysis:
        templates:
          - templateName: rag-service-canary-error-watch-bg
        startingStep: 1
      maxSurge: 1
      maxUnavailable: 0
      abortScaleDownDelaySeconds: 30
  revisionHistoryLimit: 5
  template:
    metadata:
      labels:
        app: rag-service
      annotations:
        # Vault Agent Injector annotations — required for Vault to
        # inject /vault/secrets/* into the rag-service container.
        # Role bindings live in raj-ai-lab-eks-infra/vault-config.tf.
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "rag-service"
        vault.hashicorp.com/agent-inject-secret-demo: "secret/data/rag-service/demo"
        vault.hashicorp.com/agent-inject-template-demo: |
          {{- with secret "secret/data/rag-service/demo" -}}
          hello={{ .Data.data.hello }}
          rotation_note={{ .Data.data.rotation_note }}
          {{- end -}}
        vault.hashicorp.com/agent-inject-secret-db-creds: "database/creds/rag-service-db"
        vault.hashicorp.com/agent-inject-template-db-creds: |
          {{- with secret "database/creds/rag-service-db" -}}
          DB_USERNAME={{ .Data.username }}
          DB_PASSWORD={{ .Data.password }}
          {{- end -}}
    spec:
      serviceAccountName: rag-service
      containers:
        - name: rag-service
          image: rag-service:dev   # rewritten by overlay's `images:` field
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: cluster-config
                  key: domain
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: cluster-config
                  key: keycloak_realm
            - name: AWS_REGION
              value: us-west-2
            - name: BEDROCK_FAST_MODEL_ID
              value: us.amazon.nova-micro-v1:0
            - name: BEDROCK_SMART_MODEL_ID
              value: us.amazon.nova-pro-v1:0
            - name: AUTO_THRESHOLD_CHARS
              value: "500"
            - name: EMBED_MODEL_ID
              value: amazon.titan-embed-text-v2:0
            - name: QDRANT_URL
              value: http://qdrant.qdrant.svc.cluster.local:6333
            - name: QDRANT_COLLECTION
              value: rag-docs
            - name: EMBED_DIM
              value: "1024"
            - name: RAG_DEFAULT_TOP_K
              value: "3"
            - name: LLM_PROVIDER
              value: bedrock
            - name: VLLM_URL
              value: http://vllm.llm.svc.cluster.local:8000
            - name: VLLM_MODEL_NAME
              value: llama-3.3-70b
            - name: VLLM_CONNECT_TIMEOUT_SECONDS
              value: "3"
            - name: VLLM_TIMEOUT_SECONDS
              value: "120"
            - name: KEYCLOAK_ISSUER
              value: https://keycloak.$(DOMAIN)/realms/$(KEYCLOAK_REALM)
            - name: EMBEDDING_URL
              value: http://vllm-bge-m3.llm.svc.cluster.local:8000
            - name: EMBEDDING_MODEL_NAME
              value: bge-m3
            - name: DOCS_COLLECTION
              value: documents
            - name: RETRIEVE_DEFAULT_TOP_K
              value: "5"
            - name: LANGFUSE_HOST
              value: http://langfuse-web.langfuse.svc.cluster.local:3000
            - name: OTEL_SERVICE_NAME
              value: rag-service
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo.monitoring.svc.cluster.local:4317
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"

            # Phase #36 smoke marker — forces a pod-template-hash
            # bump so argo-rollouts spawns a canary RS and exercises
            # the Phase #35 traffic-shifting + AnalysisRun pipeline
            # for rag-service. First exercise of the
            # latency-fraction gate (rag-service-canary-checks) and
            # 5xx watchdog (rag-service-canary-error-watch-bg).
            # Datestamp value; future bumps update the date.
            - name: CANARY_SMOKE_MARKER
              # Phase #49 ROLLBACK DRILL — value bumped from
              # "2026-04-29" → "2026-04-29-rollback-drill" to force
              # a new pod-template-hash. argo-rollouts spawns a
              # canary RS that runs against the tripwire-broken
              # AnalysisTemplate (analysistemplate.yaml has a
              # failureCondition: 1==1 that always trips), and the
              # rollout aborts on first measurement.
              value: "2026-04-29-rollback-drill"
          envFrom:
            - secretRef:
                name: rag-service-langfuse
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
