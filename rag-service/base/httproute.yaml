# HTTPRoute — Phase 2 of the Ingress → Gateway API migration.
#
# Lives ALONGSIDE the existing Ingress (not replacing it yet). Both
# resources route the same hostname to the same Service during the
# parallel-running migration window — they don't conflict because:
#   - Ingress is reachable via the ingress-nginx NLB hostname only
#     (Route53 still points rag.ekstest.com here)
#   - HTTPRoute is reachable via the Istio Gateway NLB hostname only
#     (no Route53 record yet — accessed via /etc/hosts override
#     during Phase 2 testing, then DNS cutover happens in Phase 3)
#
# After DNS cutover + soak period, the Ingress can be removed (and
# its base/kustomization.yaml entry too).
#
# parentRefs.sectionName binds this HTTPRoute to the specific
# listener "rag-https" on shared-gateway. Without sectionName, the
# route would attach to ALL matching listeners on the gateway —
# fine when there's one listener, but as we add chat/keycloak/etc.
# in subsequent phases, leaving sectionName off would route
# rag-service traffic onto every listener including HTTP ones.
# Explicit binding is more defensive.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rag-service
  labels:
    app: rag-service
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway-system
      sectionName: rag-https
  hostnames:
    - rag.example.local   # overlay patches with real FQDN
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: rag-service
          port: 80
