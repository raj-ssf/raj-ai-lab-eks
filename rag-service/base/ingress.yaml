apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-service
  labels:
    app: rag-service
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - rag.example.local   # overlay patches with real FQDN
      secretName: rag-tls
  rules:
    - host: rag.example.local   # overlay patches with real FQDN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rag-service
                port:
                  name: http
