apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
  labels:
    app: rag-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-service
  template:
    metadata:
      labels:
        app: rag-service
      annotations:
        # Vault Agent Injector: writes secrets to /vault/secrets/<name> in
        # the rag-service container. Role 'rag-service' is bound to the
        # rag/rag-service ServiceAccount in Vault's kubernetes auth backend
        # (see vault-config.tf in raj-ai-lab-eks-infra).
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "rag-service"
        vault.hashicorp.com/agent-inject-secret-demo: "secret/data/rag-service/demo"
        vault.hashicorp.com/agent-inject-template-demo: |
          {{- with secret "secret/data/rag-service/demo" -}}
          hello={{ .Data.data.hello }}
          rotation_note={{ .Data.data.rotation_note }}
          {{- end -}}
        # Dynamic Postgres credentials from Vault's database secrets engine.
        # Each render produces a NEW username/password with 1h TTL; the
        # sidecar re-renders before expiry. rag-service doesn't consume
        # this file yet — it's a proof-of-life for the dynamic-creds path.
        vault.hashicorp.com/agent-inject-secret-db-creds: "database/creds/rag-service-db"
        # DB_HOST/DB_PORT/DB_NAME are also available as env vars on the
        # container below (patched in by the infra overlay at apply time);
        # included here in file form so anything that sources the file
        # gets the full connection spec.
        vault.hashicorp.com/agent-inject-template-db-creds: |
          {{- with secret "database/creds/rag-service-db" -}}
          DB_USERNAME={{ .Data.username }}
          DB_PASSWORD={{ .Data.password }}
          {{- end -}}
    spec:
      serviceAccountName: rag-service
      containers:
        - name: rag-service
          image: rag-service:dev   # rewritten by overlay's `images:` field
          imagePullPolicy: Always 
          ports:
            - name: http
              containerPort: 8000
          env:
            # --- Cluster-config helpers (Phase 2 portability refactor) ---
            # DOMAIN + KEYCLOAK_REALM are sourced from the cluster-config
            # ConfigMap (raj-ai-lab-eks-infra/cluster-config-cm.tf) so
            # forking this lab to a new account/domain doesn't require
            # editing this YAML — change var.domain and the CM updates.
            # Subsequent env entries reference $(DOMAIN) / $(KEYCLOAK_REALM)
            # via K8s env-var expansion (resolved at container start).
            - name: DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: cluster-config
                  key: domain
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: cluster-config
                  key: keycloak_realm
            - name: AWS_REGION
              value: us-west-2     # IRSA doesn't inject this; boto3 needs it
            - name: BEDROCK_FAST_MODEL_ID
              value: us.amazon.nova-micro-v1:0
            - name: BEDROCK_SMART_MODEL_ID
              value: us.amazon.nova-pro-v1:0
            - name: AUTO_THRESHOLD_CHARS
              value: "500"
            - name: EMBED_MODEL_ID
              value: amazon.titan-embed-text-v2:0
            - name: QDRANT_URL
              value: http://qdrant.qdrant.svc.cluster.local:6333
            - name: QDRANT_COLLECTION
              value: rag-docs
            - name: EMBED_DIM
              value: "1024"
            - name: RAG_DEFAULT_TOP_K
              value: "3"
            # Hybrid LLM routing. Default 'bedrock' preserves the original
            # behaviour — Bedrock Nova always serves /invoke, regardless of
            # whether the vLLM path is up. Flip to 'auto' during demos to
            # prefer self-hosted vLLM with Bedrock as the fallback, or 'vllm'
            # to force self-hosted (fails hard if vLLM is down).
            - name: LLM_PROVIDER
              value: bedrock   # bedrock | vllm | auto
            - name: VLLM_URL
              value: http://vllm.llm.svc.cluster.local:8000
            - name: VLLM_MODEL_NAME
              value: llama-3.3-70b
            - name: VLLM_CONNECT_TIMEOUT_SECONDS
              value: "3"
            - name: VLLM_TIMEOUT_SECONDS
              value: "120"
            # --- Phase 4: /retrieve endpoint -----------------------------
            # /retrieve is the bge-m3-backed JWT-protected RAG path that
            # langgraph-service's retrieve node calls. Keep the legacy
            # Bedrock-Titan path on /search untouched.
            #
            # KEYCLOAK_ISSUER drives JWT validation. Same realm URL the
            # other services use; rag-service trusts any valid token from
            # this issuer and scopes Qdrant queries by the user claim.
            - name: KEYCLOAK_ISSUER
              value: https://keycloak.$(DOMAIN)/realms/$(KEYCLOAK_REALM)
            # bge-m3 vLLM endpoint. Same Service that ingestion-service
            # writes through, so query and document embeddings live in
            # the same vector space.
            - name: EMBEDDING_URL
              value: http://vllm-bge-m3.llm.svc.cluster.local:8000
            - name: EMBEDDING_MODEL_NAME
              value: bge-m3
            # Separate from the legacy QDRANT_COLLECTION (rag-docs / Titan
            # vectors). DOCS_COLLECTION is the bge-m3 collection populated
            # by ingestion-service.
            - name: DOCS_COLLECTION
              value: documents
            - name: RETRIEVE_DEFAULT_TOP_K
              value: "5"
            # Langfuse LLM-observability. Host is cluster-internal so traces
            # don't round-trip through the ingress. Public + Secret keys
            # come from a K8s Secret provisioned by Terraform from tfvars
            # (see langfuse-rag-creds.tf). If the Secret is missing or the
            # keys are empty, the Langfuse SDK logs a warning and no-ops —
            # the /invoke path keeps working without observability.
            - name: LANGFUSE_HOST
              value: http://langfuse-web.langfuse.svc.cluster.local:3000
            # OpenTelemetry → Tempo OTLP gRPC receiver in the monitoring namespace.
            - name: OTEL_SERVICE_NAME
              value: rag-service
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo.monitoring.svc.cluster.local:4317
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
          envFrom:
            # LANGFUSE_PUBLIC_KEY + LANGFUSE_SECRET_KEY from a K8s Secret
            # provisioned by Terraform. optional=true so rag-service still
            # starts if the Secret hasn't been created yet (e.g., Langfuse
            # keys haven't been minted). Langfuse SDK gracefully degrades
            # when keys are missing — it logs a warning and no-ops trace
            # calls.
            - secretRef:
                name: rag-service-langfuse
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        # Writable scratch dir — Python libs (portalocker via qdrant-client, tempfile
        # callers, etc.) need a writable /tmp even though the rootfs is read-only.
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
