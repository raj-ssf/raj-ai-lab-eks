apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
  labels:
    app: rag-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-service
  template:
    metadata:
      labels:
        app: rag-service
    spec:
      serviceAccountName: rag-service
      containers:
        - name: rag-service
          image: rag-service:dev   # rewritten by overlay's `images:` field
          imagePullPolicy: Always 
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: AWS_REGION
              value: us-west-2     # IRSA doesn't inject this; boto3 needs it
            - name: BEDROCK_FAST_MODEL_ID
              value: us.anthropic.claude-haiku-4-5-20251001-v1:0
            - name: BEDROCK_SMART_MODEL_ID
              value: us.anthropic.claude-sonnet-4-5-20250929-v1:0
            - name: AUTO_THRESHOLD_CHARS
              value: "500"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
