apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Account-specific bits (IRSA role ARN, ECR registry URL, hostname) are injected
# by the ArgoCD Application spec in raj-ai-lab-eks-infra/argocd-apps.tf.
# The image TAG lives here so GHA can bump it without touching Terraform.
namespace: rag
resources:
  - ../../base
images:
  - name: rag-service
    newTag: sha-0250df2 # updated by .github/workflows/build-push-rag-service.yml on every build
