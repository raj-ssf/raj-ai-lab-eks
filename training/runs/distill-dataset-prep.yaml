# Phase #81b: K8s Job that runs seed_prompts.py — generates the
# teacher-output dataset that Phase #81c's PyTorchJob trains on.
#
# Apply via:
#   # Pre-req: prompts JSONL must exist at PROMPTS_S3_URI. For first
#   # iteration use the lab's eval datasets:
#   #   cat eval/ragas/dataset.yaml eval/runs/dataset.yaml \
#   #     | python3 -c "import yaml,sys,json; \
#   #         [print(json.dumps({'prompt': e['question']})) \
#   #          for d in yaml.safe_load_all(sys.stdin) \
#   #          for e in d.get('entries',[])]" \
#   #     | aws s3 cp - s3://${TRAINING_BUCKET}/datasets/distill-llama-3.3-70b/prompts.jsonl
#
#   # Pre-req: scale teacher up
#   kubectl -n llm scale deploy/vllm-llama-3-3-70b-awq --replicas=1
#   kubectl -n llm wait --for=condition=available --timeout=15m \
#     deploy/vllm-llama-3-3-70b-awq
#
#   # Refresh the script ConfigMap
#   kubectl -n llm create configmap distill-seed-prompts \
#     --from-file=seed_prompts.py=training/distill/seed_prompts.py \
#     --dry-run=client -o yaml | kubectl apply -f -
#
#   # Apply Job
#   export TRAINING_BUCKET=raj-ai-lab-eks-training
#   envsubst < training/runs/distill-dataset-prep.yaml | kubectl apply -f -
#
#   # Watch
#   kubectl -n llm logs -l app.kubernetes.io/name=distill-dataset-prep -f
#
# Why llm namespace + eval-pod SA:
#   eval-pod already has Pod Identity creds for S3 write to the
#   training bucket's distill-* prefix (extension to be made in
#   training.tf — see operational note in commit message). Running
#   here also means the Job can call vllm Services directly via mesh-
#   internal Service DNS, with mTLS already established on both ends
#   via Istio sidecars.
#
# Why ConfigMap-mounted script (vs baked into eval image):
#   Phase #81b is iteration-heavy (tweaking max_tokens, concurrency,
#   retry logic) — refreshing a ConfigMap is faster than rebuilding
#   the eval image + retagging the kustomize overlay.
#   Phase #81b1 candidate: bake into eval image once script
#   stabilizes, drop the ConfigMap volume.

# Phase #81b run 2026-05-01: inline teacher Deployment +
# Service named `vllm-llama-3-3-70b-awq` (the canonical README
# name) sized correctly for a single L40S 48GB g6e.xlarge.
#
# Why inline + not in deployment-variants.yaml:
#   The existing vllm-g6e-1gpu Deployment in deployment-variants.yaml
#   has --max-model-len=16384 + --gpu-memory-utilization=0.85, which
#   does NOT fit Llama-3.3-70B AWQ (~38 GB weights + 5.4 GB KV per
#   16K context = 43.4 GB needed; 0.85 × 48 = 40.8 GB usable).
#   Scaling it up reproducibly OOMs at vLLM's KV cache init step.
#
#   Rather than edit the gitops manifest (would need ArgoCD sync +
#   risk of unrelated drift), this run uses a fresh Deployment with
#   correct sizing for the dataset-prep workload (short prompts,
#   max-tokens=512). max-model-len drops 16384 -> 4096 (~1.4 GB
#   KV per context, leaves ~4.8 GB free for batching) and
#   gpu-mem-util bumps 0.85 -> 0.92.
#
#   ALSO: --quantization awq_marlin instead of awq (Phase #83b
#   lesson — see feedback_vllm_awq_marlin.md). Plain `awq` warns
#   "speed can be slower than non-quantized models"; awq_marlin
#   uses Ada's int4 tensor cores.
#
#   This Deployment + Service live in this operator-applied file
#   (not tracked by ArgoCD), so kubectl apply lands them atomically
#   and selfHeal can't prune them.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-llama-3-3-70b-awq
  namespace: llm
  labels:
    app: vllm-llama-3-3-70b-awq
    app.kubernetes.io/name: vllm-llama-3-3-70b-awq
    app.kubernetes.io/component: teacher
    phase: "81b"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-llama-3-3-70b-awq
  template:
    metadata:
      labels:
        app: vllm-llama-3-3-70b-awq
        app.kubernetes.io/name: vllm-llama-3-3-70b-awq
    spec:
      serviceAccountName: vllm
      enableServiceLinks: false
      nodeSelector:
        node.kubernetes.io/instance-type: g6e.xlarge
      tolerations:
        - { key: nvidia.com/gpu,    operator: Exists, effect: NoSchedule }
        - { key: gpu-experiment,    operator: Exists, effect: NoSchedule }
      initContainers:
        - name: model-sync
          image: amazon/aws-cli:2.17.0
          env:
            - { name: AWS_REGION, value: us-west-2 }
            - { name: S3_URI,     value: s3://raj-ai-lab-eks-model-weights/llama-3.3-70b-instruct-awq/ }
            - { name: MODEL_PATH, value: /model }
          command: ["/bin/sh", "-euxc"]
          args:
            - |
              aws configure set default.s3.max_concurrent_requests 32
              aws configure set default.s3.multipart_chunksize 128MB
              aws s3 sync "$S3_URI" "$MODEL_PATH" \
                --exclude ".cache/*" \
                --exclude "*.metadata" \
                --no-progress
              ls -la "$MODEL_PATH"
          resources:
            requests: { cpu: "1", memory: "1Gi" }
            limits:   { cpu: "2", memory: "2Gi" }
          volumeMounts:
            - { name: model-cache, mountPath: /model }
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.7.2
          args:
            - "--model"
            - "/model"
            - "--served-model-name"
            - "llama-3.3-70b"
            - "--tensor-parallel-size"
            - "1"
            - "--quantization"
            - "awq_marlin"
            - "--dtype"
            - "half"
            # 4096 chosen for the Dolly-15k workload: prompts avg
            # ~100 tokens + max_tokens=512 response = well under
            # 1K total. 4096 is generous headroom AND fits the
            # KV-cache budget on single L40S (~1.4 GB per context).
            - "--max-model-len"
            - "4096"
            # 0.92 (vs the 0.85 in deployment-variants.yaml) gives
            # ~3.4 extra GB for KV pool on top of the smaller
            # max-model-len savings.
            - "--gpu-memory-utilization"
            - "0.92"
            - "--enable-prefix-caching"
            - "--enforce-eager"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          ports:
            - { name: http, containerPort: 8000 }
          env:
            - { name: HF_HUB_OFFLINE,       value: "1" }
            - { name: TRANSFORMERS_OFFLINE, value: "1" }
            - { name: OTEL_SERVICE_NAME,    value: vllm-llama-3-3-70b-awq }
          resources:
            requests:
              nvidia.com/gpu: "1"
              cpu: "2"
              memory: "8Gi"
            limits:
              nvidia.com/gpu: "1"
              cpu: "3"
              memory: "28Gi"
          startupProbe:  { httpGet: { path: /health, port: http }, initialDelaySeconds: 30, periodSeconds: 10, failureThreshold: 60 }
          readinessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 10, failureThreshold: 3 }
          livenessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 30, failureThreshold: 3 }
          volumeMounts:
            - { name: model-cache, mountPath: /model, readOnly: true }
            - { name: shm,         mountPath: /dev/shm }
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            # Same PVC as vllm-g6e-1gpu — already has the 38 GB
            # AWQ weights cached, so model-sync init's aws s3 sync
            # is a quick no-op rather than a fresh 38 GB download.
            # RWO is fine: vllm-g6e-1gpu is now scaled to 0 so
            # the PVC is detachable.
            claimName: vllm-model-cache
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 2Gi }

---
apiVersion: v1
kind: Service
metadata:
  name: vllm-llama-3-3-70b-awq
  namespace: llm
  labels:
    app.kubernetes.io/name: vllm-llama-3-3-70b-awq
    app.kubernetes.io/component: teacher-alias
    phase: "81b"
spec:
  type: ClusterIP
  selector:
    app: vllm-llama-3-3-70b-awq
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP

---
apiVersion: batch/v1
kind: Job
metadata:
  name: distill-dataset-prep
  namespace: llm
  labels:
    app.kubernetes.io/name: distill-dataset-prep
    app.kubernetes.io/component: distillation-data
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  # Hard cost-cap. At ~$1.86/hr teacher + ~$0.05/hr Job pod, 8h is
  # ~$15 budget. Real expectation is 4-6h for Dolly-15k at conc=16
  # / max_tokens=512. If the Job exceeds 8h something has gone
  # sideways and stopping is the right move.
  activeDeadlineSeconds: 28800
  template:
    metadata:
      labels:
        app.kubernetes.io/name: distill-dataset-prep
        app.kubernetes.io/component: distillation-data
    spec:
      serviceAccountName: eval-pod
      restartPolicy: Never

      # Sync prompts JSONL from S3 before main container runs. Mirror
      # of the dataset-sync pattern in training/runs/llama-3.2-1b-
      # distill.yaml — keeps the Python container focused on the
      # one thing (teacher inference) and uses awscli for what it's
      # good at (S3 transfer).
      initContainers:
        - name: prompts-sync
          image: amazon/aws-cli:2.17.0
          command: ["/bin/sh", "-euxc"]
          args:
            - |
              aws s3 cp \
                "s3://${TRAINING_BUCKET}/datasets/distill-llama-3.3-70b/prompts.jsonl" \
                /workspace/prompts/prompts.jsonl
              wc -l /workspace/prompts/prompts.jsonl
          env:
            - name: TRAINING_BUCKET
              value: ${TRAINING_BUCKET}
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
          volumeMounts:
            - { name: prompts, mountPath: /workspace/prompts }

      containers:
        - name: seed-prompts
          # Use the lab's training image — already on Kyverno's
          # allowlist for the llm namespace AND has Python 3.11 +
          # boto3 + awscli baked in. Only `openai` SDK needs a
          # runtime pip install.
          # (Phase #81b's original draft assumed python:3.11-slim
          #  but Kyverno's deny-unverified-images policy added
          #  2026-04-23 blocked that image in critical namespaces.)
          image: 050693401425.dkr.ecr.us-west-2.amazonaws.com/training:latest
          imagePullPolicy: IfNotPresent
          terminationMessagePolicy: FallbackToLogsOnError

          command: ["/bin/sh", "-euxc"]
          args:
            - |
              # Only openai SDK is missing from the training image.
              # boto3 + awscli are baked in.
              pip install --no-cache-dir --quiet 'openai>=1.0,<2.0'

              # Wait for teacher to be ready before firing prompts.
              # The teacher pod cold-starts in ~10 min (Karpenter spawn
              # + 70B AWQ load); without this gate, seed_prompts.py
              # would burn through 16-concurrent retries while the
              # teacher is still loading. The training image has
              # `curl` baked in via the axolotl base, so no extra deps.
              TEACHER_HEALTH_URL="${TEACHER_URL%/v1}/health"
              echo "=== Waiting for teacher: $TEACHER_HEALTH_URL ==="
              ATTEMPTS=0
              until curl --max-time 5 -sf "$TEACHER_HEALTH_URL" >/dev/null 2>&1; do
                ATTEMPTS=$((ATTEMPTS+1))
                if [ $ATTEMPTS -gt 90 ]; then
                  echo "ERROR: teacher not ready after 15min — aborting"
                  exit 1
                fi
                echo "  (attempt $ATTEMPTS) teacher not yet ready, sleeping 10s..."
                sleep 10
              done
              echo "=== Teacher ready (after $ATTEMPTS attempts) ==="

              echo "=== Starting teacher-output generation ==="
              python /workspace/script/seed_prompts.py \
                --prompts-file /workspace/prompts/prompts.jsonl \
                --output-file /tmp/teacher_outputs.jsonl \
                --output-s3-uri "s3://${TRAINING_BUCKET}/datasets/distill-llama-3.3-70b/teacher_outputs.jsonl" \
                --teacher-url "${TEACHER_URL}" \
                --teacher-model "${TEACHER_MODEL}" \
                --max-tokens 512 \
                --max-concurrent 16

          env:
            - name: TRAINING_BUCKET
              value: ${TRAINING_BUCKET}
            # Teacher: the canonical 70B AWQ via the Service alias
            # added at the top of this manifest. Resolves to whichever
            # variant pod is scaled up (currently vllm-g6e-1gpu, single
            # L40S, ~$1.86/hr). Switch the Service's selector for a
            # different teacher.
            - name: TEACHER_URL
              value: http://vllm-llama-3-3-70b-awq.llm.svc.cluster.local:8000/v1
            - name: TEACHER_MODEL
              value: llama-3.3-70b
            # Quiet boto3 + openai SDK chatter
            - name: PYTHONUNBUFFERED
              value: "1"

          resources:
            # Pure HTTP-client workload — no GPU, modest CPU/memory.
            requests: { cpu: "200m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }

          volumeMounts:
            - { name: script,  mountPath: /workspace/script, readOnly: true }
            - { name: prompts, mountPath: /workspace/prompts, readOnly: true }

      volumes:
        - name: script
          configMap:
            name: distill-seed-prompts
            defaultMode: 0555
        # initContainer writes here; main container reads it
        - name: prompts
          emptyDir: { sizeLimit: 100Mi }
