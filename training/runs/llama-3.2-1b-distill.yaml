# PyTorchJob: Distillation SFT of Llama-3.2-1B on teacher outputs.
#
# Phase #81 distillation training run. Mirrors the existing
# llama-3.1-8b-alpaca-lora.yaml PyTorchJob structure with three
# distillation-specific adjustments:
#
#   1. Adds an init container that aws-s3-syncs the teacher-output
#      JSONL into /workspace/datasets/distill/ before axolotl train
#      starts. (The 8B+Alpaca config pulls from HF Hub at runtime;
#      we have S3 since the dataset is private to the lab.)
#   2. Sized for g6.xlarge (1× L4 24GB) — the QLoRA 1B fits with
#      tons of headroom. The 8B QLoRA needed g6e.xlarge (L40S) for
#      the 16GB+ working set.
#   3. Output path s3://${TRAINING_BUCKET}/adapters/llama-3.2-1b-
#      distilled/ — sibling to the existing alpaca-lora adapter.
#
# Apply via:
#   export TRAINING_IMAGE=<account>.dkr.ecr.us-west-2.amazonaws.com/training:sha-<short>
#   export TRAINING_BUCKET=raj-ai-lab-eks-cilium-training
#   envsubst < training/runs/llama-3.2-1b-distill.yaml | kubectl apply -f -
#
# Prerequisites (Phase #81b operational step, NOT in this commit):
#   - s3://${TRAINING_BUCKET}/datasets/distill-llama-3.3-70b/teacher_outputs.jsonl
#     must exist. Generated by running the 70B teacher over a corpus
#     of ~10K diverse prompts and capturing (prompt, response) pairs.
#     One-time cost: ~4-6 hours of warm 70B inference, ~$15 in GPU.

apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: llama-3-2-1b-distill
  namespace: training
  labels:
    app.kubernetes.io/name: training
    app.kubernetes.io/component: distillation
    training.raj-ai-lab/model: llama-3.2-1b
    training.raj-ai-lab/dataset: distill-llama-3.3-70b
    training.raj-ai-lab/method: qlora
spec:
  runPolicy:
    cleanPodPolicy: None
    backoffLimit: 0

  pytorchReplicaSpecs:
    Master:
      replicas: 1
      restartPolicy: OnFailure
      template:
        metadata:
          labels:
            app.kubernetes.io/name: training
            app.kubernetes.io/component: distillation
        spec:
          serviceAccountName: training-pod
          tolerations:
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule
            - key: gpu-experiment
              operator: Exists
              effect: NoSchedule
          nodeSelector:
            karpenter.sh/nodepool: gpu-experiments

          # Phase #81-specific: dataset-sync init container.
          # The 8B+Alpaca config pulls from HF Hub at runtime; for
          # distillation our dataset is private to the lab (lives in
          # the training bucket). Pull it BEFORE axolotl starts so
          # the training pod doesn't waste GPU time on data download.
          initContainers:
            - name: dataset-sync
              image: amazon/aws-cli:2.17.0
              command: ["/bin/sh", "-euxc"]
              args:
                - |
                  aws s3 sync \
                    "s3://${TRAINING_BUCKET}/datasets/distill-llama-3.3-70b/" \
                    /workspace/datasets/distill/ \
                    --no-progress
                  ls -la /workspace/datasets/distill/
                  echo "Dataset ready: $(wc -l /workspace/datasets/distill/teacher_outputs.jsonl) lines"
              env:
                - name: TRAINING_BUCKET
                  value: ${TRAINING_BUCKET}
              resources:
                requests: { cpu: "1", memory: "1Gi" }
                limits:   { cpu: "2", memory: "2Gi" }
              volumeMounts:
                - { name: dataset-cache, mountPath: /workspace/datasets/distill }

          containers:
            - name: pytorch
              image: ${TRAINING_IMAGE}
              imagePullPolicy: IfNotPresent
              terminationMessagePolicy: FallbackToLogsOnError
              command:
                - /bin/bash
                - -c
                - |
                  # Persistent logging: tee everything to /workspace/.cache/
                  # huggingface/training.log (in hf-cache PVC) so logs survive
                  # pod deletion on failure. Phase #81c run #1 (2026-05-01) had
                  # backoffLimit=0 + pod auto-cleanup losing all logs from a
                  # failed run.
                  LOG_FILE=/workspace/.cache/huggingface/training-$(date +%s).log
                  exec > >(tee -a "$LOG_FILE") 2>&1
                  echo "=== Logs persisting to $LOG_FILE ==="

                  # Trap: on any exit, upload the log to S3 so it's accessible
                  # from outside the cluster too (failure or success).
                  trap 'echo "=== EXIT trap: uploading log to S3 ==="; \
                        aws s3 cp "$LOG_FILE" \
                          "s3://${TRAINING_BUCKET}/logs/llama-3.2-1b-distill/$(basename $LOG_FILE)" \
                          --no-progress 2>&1 || true' EXIT

                  set -euxo pipefail
                  echo "=== Starting Llama-3.2-1B distillation SFT ==="
                  axolotl train /workspace/configs/llama-3.2-1b-distilled.yaml
                  echo "=== Training complete; uploading adapter to S3 ==="
                  aws s3 sync /workspace/output \
                    "s3://${TRAINING_BUCKET}/adapters/llama-3.2-1b-distilled/" \
                    --exclude "checkpoint-*/*" \
                    --exclude "runs/*"
                  echo "=== Upload complete ==="
              env:
                - name: TRAINING_BUCKET
                  value: ${TRAINING_BUCKET}
                - name: HF_HOME
                  value: /workspace/.cache/huggingface
                - name: HF_HUB_DISABLE_TELEMETRY
                  value: "1"
              resources:
                # Sized for g6.xlarge (1× L4 24GB / 4 vCPU / 16 GiB
                # node memory). 1B QLoRA's working set is small.
                limits:
                  nvidia.com/gpu: "1"
                  memory: 14Gi
                  cpu: "3"
                  ephemeral-storage: 30Gi
                requests:
                  nvidia.com/gpu: "1"
                  memory: 8Gi
                  cpu: "2"
                  ephemeral-storage: 10Gi
              volumeMounts:
                - { name: dshm, mountPath: /dev/shm }
                - { name: hf-cache, mountPath: /workspace/.cache/huggingface }
                - { name: training-configs, mountPath: /workspace/configs }
                - { name: dataset-cache, mountPath: /workspace/datasets/distill, readOnly: true }

          volumes:
            - name: dshm
              emptyDir: { medium: Memory, sizeLimit: 4Gi }
            - name: hf-cache
              persistentVolumeClaim: { claimName: hf-cache }
            - name: training-configs
              configMap: { name: training-configs }
            # Phase #81-specific: ephemeral volume for the teacher-
            # output dataset. emptyDir (not PVC) — re-pulled per run
            # to ensure freshness (teacher outputs may be regenerated
            # over time). 10Gi handles ~50K teacher-output entries
            # at avg 1KB/line.
            - name: dataset-cache
              emptyDir: { sizeLimit: 10Gi }
