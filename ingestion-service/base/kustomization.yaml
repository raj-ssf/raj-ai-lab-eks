apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - serviceaccount.yaml
  # Phase #39: deployment.yaml replaced by rollout.yaml. NO
  # AnalysisTemplate — ingestion-service has no Prometheus
  # instrumentation, so the canary uses indefinite-pause steps
  # that require manual `kubectl argo rollouts promote`.
  # See rollout.yaml header for the design rationale.
  - rollout.yaml
  - service.yaml
  # Phase #39: helper Services + VirtualService for argo-rollouts
  # Istio trafficRouting (mirror of langgraph/rag pattern).
  - service-stable.yaml
  - service-canary.yaml
  - virtualservice.yaml
  # Phase #43: Prometheus ServiceMonitor. With the Instrumentator
  # now wired up in app/main.py, http_request_duration_seconds /
  # http_requests_total are scraped, enabling a future Phase #43b
  # AnalysisTemplate to convert the Phase #39 indefinite-pause
  # canary to automated.
  - servicemonitor.yaml
