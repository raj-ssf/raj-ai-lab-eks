apiVersion: v1
kind: Service
metadata:
  name: ingestion-service
  labels:
    app: ingestion-service
spec:
  type: ClusterIP
  selector:
    app: ingestion-service
  ports:
    # Named `http` for Istio HTTP-aware filter chains, same convention
    # as the other meshed Services.
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
