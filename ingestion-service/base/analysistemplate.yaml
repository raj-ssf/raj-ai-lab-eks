# Phase #46: step-gated AnalysisTemplate for ingestion-service.
# Now that Phase #43 added prometheus_fastapi_instrumentator + a
# ServiceMonitor, the canary can gate on real metrics instead of
# the Phase #39 indefinite-pause + manual-promote pattern.
#
# Note on first-run behavior:
#   The ServiceMonitor exists but the live pods predate Phase #43's
#   image — they don't expose /metrics yet. Until a fresh ingestion-
#   service image is built (with the new requirements.txt
#   prometheus_fastapi_instrumentator dep + main.py Instrumentator
#   call) and ArgoCD updates the image tag, this AnalysisTemplate
#   queries return empty result. The successCondition's empty-
#   result clause (`len(result) == 0 || ...`) keeps the canary
#   pass-through during this window — same lab-friendly default as
#   langgraph + rag.
#
# Metric: 5xx error rate on /upload, mirror of rag-service's
# Phase #35 background watchdog. /upload is the only meaningful
# user-facing endpoint; /healthz and /metrics shouldn't gate the
# canary.
#
# successCondition (rather than failureCondition like Phase #34's
# background): step-gated checks want to PROVE healthy. Empty-
# result-passes is intentional here for sparse-traffic windows.

apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: ingestion-canary-checks
  labels:
    app: ingestion-service
spec:
  metrics:
    - name: upload-success-rate
      interval: 30s
      count: 4
      failureLimit: 2
      # Pass: 95% non-5xx OR no traffic (lab default).
      successCondition: len(result) == 0 || result[0] >= 0.95
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
          # /upload-specific filter so /healthz / /metrics
          # 200s don't dilute the signal. status!~"5.." treats
          # 4xx (e.g. 401 from missing JWT, 422 from bad multipart)
          # as success — those are caller bugs, not service
          # regressions.
          #
          # No-traffic handling (fixed 2026-05-02):
          # The previous query used `clamp_min(denominator, 1e-9)`
          # to avoid 0/0, which made the formula return 0 (fail)
          # when the canary saw zero ambient /upload calls in the
          # 5-min window. Hit this twice on the [md] fix rollout —
          # the lab has no synthetic load, so a fresh canary often
          # sees 0 calls before AnalysisRun checks fire. Result:
          # the canary failed not because the new image was bad
          # but because nothing exercised it.
          #
          # New query: gate the denominator on `> 0`. PromQL's
          # comparison operator filters: when the sum is 0, the
          # `> 0` strips it out → empty denominator → division
          # produces no series → the trailing `or on() vector(1.0)`
          # backfills 1.0 → passes the ≥0.95 gate. When sum > 0,
          # the comparison passes the value through and division
          # proceeds normally.
          # Net effect:
          #   - No traffic in window  → 1.0  (pass — fix)
          #   - Mostly successful     → ratio (pass)
          #   - 5xx-heavy traffic     → low ratio (fail correctly)
          # Trade-off: a canary that's so broken it can't accept
          # any /upload calls also passes here. That risk is
          # caught by the readiness probe + the bg watchdog
          # AnalysisTemplate (analysistemplate-bg.yaml's
          # `failureCondition: result[0] > 0.10`), which fires
          # on sustained 5xx — different signal, different gate.
          query: |
            (
              sum(rate(http_requests_total{job="ingestion-service",handler="/upload",status!~"5.."}[5m]))
              /
              (sum(rate(http_requests_total{job="ingestion-service",handler="/upload"}[5m])) > 0)
            )
            or on() vector(1.0)
