apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  labels:
    app: ingestion-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: ingestion-service
    spec:
      serviceAccountName: ingestion-service
      containers:
        - name: ingestion-service
          image: ingestion-service:placeholder  # rewritten by overlay's images: transform
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            # Auth — same realm as langgraph-service / chat-ui.
            - name: KEYCLOAK_ISSUER
              value: https://keycloak.ekstest.com/realms/raj-ai-lab-eks
            - name: KEYCLOAK_AUDIENCE
              value: ingestion-service

            # Where to call the embedding model and the vector DB at
            # write time. In-cluster Service URLs; AuthZ rules
            # in raj-ai-lab-eks-infra/ingestion-service.tf permit
            # the cross-ns flow.
            - name: EMBEDDING_URL
              value: http://vllm-bge-m3.llm.svc.cluster.local:8000
            - name: QDRANT_URL
              value: http://qdrant.qdrant.svc.cluster.local:6333
            - name: QDRANT_COLLECTION
              value: documents

            # OTel — match langgraph-service / chat-ui targets.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo.monitoring.svc.cluster.local:4317
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: OTEL_SERVICE_NAME
              value: ingestion-service
            - name: OTEL_TRACES_SAMPLER
              value: parentbased_always_on

          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi

          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            failureThreshold: 3
