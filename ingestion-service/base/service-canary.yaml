# Phase #39: canary Service for argo-rollouts Istio trafficRouting.
# Empty endpoints in steady-state. Populated only when a canary is
# in flight.

apiVersion: v1
kind: Service
metadata:
  name: ingestion-service-canary
  labels:
    app: ingestion-service
    role: canary
spec:
  type: ClusterIP
  selector:
    app: ingestion-service
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
