name: Build and push rag-service

on:
  push:
    branches: [main]
    paths:
      - "rag-service/app/**"
      - ".github/workflows/build-push-rag-service.yml"
  workflow_dispatch:   # manual trigger from GitHub UI

permissions:
  id-token: write      # required for AWS OIDC federation
  contents: write      # required to commit rag-service/image.tag back

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-west-2

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: rag-service/app
          platforms: linux/amd64
          push: true
          tags: |
            ${{ vars.ECR_REPOSITORY_URL }}:latest
            ${{ vars.ECR_REPOSITORY_URL }}:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Keyless cosign signing: uses the GHA OIDC token as input to Sigstore
      # Fulcio, which issues a short-lived cert bound to this workflow's
      # identity. Signature + cert are stored back in ECR as an OCI artifact
      # next to the image (tag: sha256-<digest>.sig). No private key to
      # manage. Kyverno admission controller verifies the identity matches
      # this workflow (see kyverno-policies.tf in raj-ai-lab-eks-infra).
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          IMAGE: ${{ vars.ECR_REPOSITORY_URL }}@${{ steps.build.outputs.digest }}
        run: |
          echo "Signing $IMAGE"
          cosign sign --yes "$IMAGE"

      - name: Bump image tag in overlay and commit
        env:
          TAG: sha-${{ steps.sha.outputs.short }}
          OVERLAY: rag-service/overlays/dev/kustomization.yaml
        run: |
          # Idempotent: exit if tag already set (no empty commits on re-runs)
          current=$(yq '.images[] | select(.name == "rag-service") | .newTag' "$OVERLAY")
          if [ "$current" = "$TAG" ]; then
            echo "overlay already on $TAG; skipping commit"
            exit 0
          fi

          yq -i "(.images[] | select(.name == \"rag-service\") | .newTag) = \"$TAG\"" "$OVERLAY"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$OVERLAY"
          git commit -m "rag-service: bump image tag to $TAG"
          git push

      - name: Summary
        run: |
          {
            echo "### rag-service image built and pushed"
            echo ""
            echo "**Tags:**"
            echo "- \`${{ vars.ECR_REPOSITORY_URL }}:latest\`"
            echo "- \`${{ vars.ECR_REPOSITORY_URL }}:sha-${{ steps.sha.outputs.short }}\`"
            echo ""
            echo "**Deploy:** \`cd raj-ai-lab-eks-infra && terraform apply\`"
          } >> "$GITHUB_STEP_SUMMARY"
