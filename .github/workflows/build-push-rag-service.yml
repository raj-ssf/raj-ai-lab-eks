name: Build and push rag-service

on:
  push:
    branches: [main]
    paths:
      - "rag-service/app/**"
      - ".github/workflows/build-push-rag-service.yml"
  workflow_dispatch:   # manual trigger from GitHub UI

permissions:
  id-token: write      # required for AWS OIDC federation
  contents: write      # required to commit rag-service/image.tag back

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-west-2

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: rag-service/app
          platforms: linux/amd64
          push: true
          tags: |
            ${{ vars.ECR_REPOSITORY_URL }}:latest
            ${{ vars.ECR_REPOSITORY_URL }}:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image.tag and commit
        env:
          TAG: sha-${{ steps.sha.outputs.short }}
        run: |
          # Write the new tag only if it changed (prevents empty commits on no-op reruns)
          current=$(cat rag-service/image.tag 2>/dev/null || echo "")
          if [ "$current" = "$TAG" ]; then
            echo "image.tag already $TAG; skipping commit"
            exit 0
          fi

          echo "$TAG" > rag-service/image.tag

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rag-service/image.tag
          git commit -m "rag-service: bump image tag to $TAG"
          git push

      - name: Summary
        run: |
          {
            echo "### rag-service image built and pushed"
            echo ""
            echo "**Tags:**"
            echo "- \`${{ vars.ECR_REPOSITORY_URL }}:latest\`"
            echo "- \`${{ vars.ECR_REPOSITORY_URL }}:sha-${{ steps.sha.outputs.short }}\`"
            echo ""
            echo "**Deploy:** \`cd raj-ai-lab-eks-infra && terraform apply\`"
          } >> "$GITHUB_STEP_SUMMARY"
