name: RAGAS regression eval

# RAG-pipeline regression gate. Triggers on PRs and main pushes that
# touch the services or dataset that the eval covers. Submits the
# RAGAS K8s Job, waits for completion, posts scores to the PR, and
# fails if any metric regresses by more than the threshold in
# eval/runs/ragas-eval.yaml's RAGAS_REGRESSION_THRESHOLD_PP env (5pp).
#
# One-time prerequisites (raj-ai-lab-eks-infra):
#   1. The cluster's API endpoint must be reachable from GitHub-hosted
#      runners. EKS public-access endpoint with a CIDR allowlist that
#      includes GHA runner ranges, OR a self-hosted runner inside the
#      VPC. The lab today runs public-access; if that changes, add a
#      self-hosted runner and switch `runs-on` accordingly.
#   2. GHA OIDC role gha_eval (existing) needs eks:DescribeCluster on
#      the cluster ARN. Existing role policies should already grant
#      this for the lm-eval lifecycle; verify via `aws iam
#      get-role-policy` if the workflow's update-kubeconfig step fails.
#   3. The Secret `ragas-eval-credentials` (KEYCLOAK_PASSWORD) must
#      exist in the llm namespace before this workflow runs. See
#      eval/runs/ragas-eval.yaml header for the kubectl create command.
#   4. Repo variable RAGAS_EVAL_ECR_REPOSITORY_URL set (same as
#      build-push-ragas-eval.yml requires).
#   5. Repo variable EKS_CLUSTER_NAME set so the kubeconfig step knows
#      what to update against.

on:
  pull_request:
    paths:
      - "rag-service/**"
      - "langgraph-service/**"
      - "ingestion-service/**"
      - "eval/ragas/**"
      - ".github/workflows/ragas-eval.yml"
  push:
    branches: [main]
    paths:
      - "rag-service/**"
      - "langgraph-service/**"
      - "ingestion-service/**"
      - "eval/ragas/**"
      - ".github/workflows/ragas-eval.yml"
  workflow_dispatch:
    inputs:
      update_baseline:
        description: "Adopt current scores as the new baseline (writes baselines.json + opens PR)"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read         # bumped to write only on the update-baseline path via the create-pr action
  pull-requests: write   # for posting score-comment on PRs

# Concurrency: one eval at a time per ref. Cancels superseded runs so a
# rapid push doesn't waste GPU minutes on a stale build.
concurrency:
  group: ragas-eval-${{ github.ref }}
  cancel-in-progress: true

env:
  NAMESPACE: llm
  JOB_NAME: ragas-eval
  # Phase #81f run #2 (2026-05-02): added vllm-deepseek-r1-70b
  # because the dataset's 5th question (graph-reasoning-loop-cap)
  # routes to the `reasoning` tier per langgraph-service's classifier.
  # Without pre-warming that Deployment, the 5th /invoke call hits a
  # cold pod and the in-script httpx timeout fires before the 70B
  # finishes cold-start. Symptom: 4 of 5 queries succeed (trivial /
  # tuned-lora — both served by vllm-llama-8b), 5th errors with
  # "httpx.ReadTimeout: timed out", whole Job hangs until
  # JOB_WAIT_TIMEOUT, scores JSON empty, gate exits 1.
  GPU_DEPLOYMENTS: vllm-llama-8b vllm-bge-m3 vllm-deepseek-r1-70b
  # Phase #81f run #2: bumped 1500→3600 to leave headroom for the 70B
  # cold-start (~5-10 min on g6.12xlarge) PLUS 5 langgraph /invoke
  # turns PLUS the 5×3-metric RAGAS scoring loop. 25 min was too
  # tight; 60 min is comfortable.
  JOB_WAIT_TIMEOUT: 3600s   # 60 min — covers cold-start of all 3 GPU tiers + scoring

jobs:
  ragas-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.EVAL_AWS_ROLE_ARN }}
          aws-region: us-west-2

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "${{ vars.EKS_CLUSTER_NAME }}" \
            --region us-west-2

      # Phase #81e Option-A (2026-05-02): GPU scaling is now gitops-only
      # via raj-ai-lab-eks/llm/base/scaling.yaml. This workflow no longer
      # `kubectl scale`s — instead it FAILS FAST if any required GPU
      # Deployment isn't already at desired>=1 with a Ready replica when
      # the eval starts. The expected operator workflow:
      #   1. Edit scaling.yaml: set vllm-bge-m3 + vllm-deepseek-r1-70b
      #      replicas to 1, push.
      #   2. Wait for ArgoCD sync (~5s via webhook) + cold-start
      #      (~5-10 min for 70B on g6.12xlarge).
      #   3. Trigger this workflow (or merge a PR that touches the
      #      eval-relevant paths).
      #   4. After eval, edit scaling.yaml back to replicas=0 and push.
      # Failing fast (~30s) instead of waiting JOB_WAIT_TIMEOUT (60 min)
      # makes the "I forgot to warm" failure mode obvious.
      - name: Verify required GPU services are warm
        run: |
          MISSING=""
          for d in $GPU_DEPLOYMENTS; do
            DESIRED=$(kubectl -n "$NAMESPACE" get deploy "$d" \
              -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "")
            READY=$(kubectl -n "$NAMESPACE" get deploy "$d" \
              -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
            READY=${READY:-0}
            if [ "${DESIRED:-0}" -lt 1 ] || [ "$READY" -lt 1 ]; then
              MISSING="$MISSING $d(desired=${DESIRED:-0},ready=$READY)"
            fi
          done
          if [ -n "$MISSING" ]; then
            cat <<EOF >&2
          ::error::Required GPU services are not warm:$MISSING
          Edit raj-ai-lab-eks/llm/base/scaling.yaml so each of the
          following has 'replicas: 1', then push and wait for ArgoCD
          to sync + the pod(s) to be Ready before re-running:
            $GPU_DEPLOYMENTS
          EOF
            exit 1
          fi
          echo "All required GPU services warm: $GPU_DEPLOYMENTS"

      # Image tag selection: PR/push runs use the freshly built sha
      # tag, but to keep the workflow simple, we use :latest. The
      # build-push-ragas-eval.yml workflow always pushes :latest on
      # any merge to main, and the PR build workflow pushes a sha tag
      # — we could pin precisely by passing through the github.sha as
      # an image tag, but that would require waiting for the build to
      # finish first. Pragmatic: use :latest, accept that a PR's eval
      # might run against the previous main's image (still gates
      # regressions in the SERVICE code, which is the actual goal).
      - name: Apply ragas-eval Job
        env:
          RAGAS_EVAL_IMAGE: ${{ vars.RAGAS_EVAL_ECR_REPOSITORY_URL }}:latest
          UPDATE_BASELINE: ${{ inputs.update_baseline == true && 'true' || '' }}
        run: |
          # Delete any stale Job from a previous run before applying.
          # Without this, kubectl apply errors on the immutable spec.
          kubectl -n "$NAMESPACE" delete job "$JOB_NAME" --ignore-not-found

          # If update_baseline is requested, patch the env into the Job
          # via a kustomize-style overlay. envsubst then resolves both
          # ${RAGAS_EVAL_IMAGE} and the optional UPDATE_BASELINE block.
          envsubst < eval/runs/ragas-eval.yaml | \
            ( if [ -n "$UPDATE_BASELINE" ]; then
                # Inject UPDATE_BASELINE=true into the env list. yq
                # would be cleaner; awk keeps the runner-image dep
                # surface small.
                awk '/^          env:/{print; print "            - name: UPDATE_BASELINE"; print "              value: \"true\""; next} {print}'
              else cat
              fi ) | \
            kubectl apply -f -

      - name: Wait for Job completion
        id: wait
        run: |
          # Poll for terminal Job state — bypasses a known issue where
          # `kubectl wait --for=condition=complete` hangs indefinitely
          # if the Job's Complete condition was set BEFORE the watch
          # opened (i.e., when the Job finished faster than the wait
          # could attach). We hit this 2026-05-02: a 4m4s eval Job
          # finished, but `kubectl wait` never returned, so the
          # workflow sat at "Wait for Job completion" until
          # JOB_WAIT_TIMEOUT (was 1500s, now 3600s) expired before
          # proceeding to log capture.
          #
          # The poll loop checks .status.conditions on a 10-second
          # cadence and exits as soon as either Complete=True or
          # Failed=True. Same outcome as kubectl wait but reliable
          # against the already-Met-condition race.
          #
          # JOB_WAIT_TIMEOUT format is "3600s" — strip the trailing
          # "s" for arithmetic.
          set +e
          TIMEOUT_SEC=${JOB_WAIT_TIMEOUT%s}
          DEADLINE=$(( $(date +%s) + TIMEOUT_SEC ))
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            STATUS=$(kubectl -n "$NAMESPACE" get job "$JOB_NAME" -o json 2>/dev/null | \
              jq -r '
                .status.conditions // [] |
                (map(select(.type=="Complete" and .status=="True")) | length > 0) as $complete |
                (map(select(.type=="Failed"   and .status=="True")) | length > 0) as $failed   |
                if $complete then "complete"
                elif $failed then "failed"
                else "running"
                end
              ')
            case "$STATUS" in
              complete)
                ELAPSED=$(( $(date +%s) - DEADLINE + TIMEOUT_SEC ))
                echo "job complete after ${ELAPSED}s"
                set -e
                exit 0
                ;;
              failed)
                ELAPSED=$(( $(date +%s) - DEADLINE + TIMEOUT_SEC ))
                echo "job failed after ${ELAPSED}s"
                echo "job_failed=true" >> "$GITHUB_OUTPUT"
                set -e
                exit 0
                ;;
            esac
            sleep 10
          done
          echo "wait timed out after ${TIMEOUT_SEC}s without terminal state"
          echo "job_failed=true" >> "$GITHUB_OUTPUT"
          set -e

      - name: Capture Job logs
        id: logs
        run: |
          # Pull the job's pod name (Job→Pod relation via job-name label).
          POD=$(kubectl -n "$NAMESPACE" get pod \
            -l job-name="$JOB_NAME" -o jsonpath='{.items[0].metadata.name}')
          echo "pod=$POD" >> "$GITHUB_OUTPUT"
          kubectl -n "$NAMESPACE" logs "$POD" | tee /tmp/ragas-eval.log

      - name: Extract scores JSON
        id: scores
        run: |
          # Slice the scores block between the markers the runner emits.
          # awk is robust to the JSON containing braces or newlines.
          awk '/===RAGAS_SCORES_JSON_BEGIN===/{flag=1; next} /===RAGAS_SCORES_JSON_END===/{flag=0} flag' \
            /tmp/ragas-eval.log > /tmp/scores.json
          if [ ! -s /tmp/scores.json ]; then
            echo "::warning::no scores JSON found in log output — runner likely failed before scoring"
            echo '{"metrics": {}, "per_entry": {}}' > /tmp/scores.json
          fi
          echo "Scores:"
          cat /tmp/scores.json | python3 -m json.tool || true

      - name: Render PR comment markdown
        id: comment
        run: |
          python3 <<'PY' > /tmp/comment.md
          import json
          scores = json.load(open("/tmp/scores.json"))
          baselines = json.load(open("eval/ragas/baselines.json"))
          base_metrics = baselines.get("metrics", {})
          lines = ["## RAGAS regression eval", ""]
          lines.append("| metric | this run | baseline | Δ | gate |")
          lines.append("|---|---|---|---|---|")
          for name, current in scores.get("metrics", {}).items():
              baseline = base_metrics.get(name)
              if baseline is None:
                  lines.append(f"| {name} | {current:.4f} | _none_ | — | skipped |")
                  continue
              delta = current - baseline
              flag = "❌ regression" if delta < -0.05 else "✅ ok"
              lines.append(f"| {name} | {current:.4f} | {baseline:.4f} | {delta:+.4f} | {flag} |")
          lines.append("")
          lines.append(f"_Threshold: regression if any metric drops more than 0.05 (5pp)._")
          print("\n".join(lines))
          PY
          echo "rendered=$(wc -c < /tmp/comment.md) bytes"

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file /tmp/comment.md

      # Phase #81e Option-A (2026-05-02): scale-down is now the
      # operator's responsibility — edit raj-ai-lab-eks/llm/base/
      # scaling.yaml to set vllm-bge-m3 + vllm-deepseek-r1-70b
      # replicas back to 0 and push. We removed the workflow's
      # `kubectl scale --replicas=0` because it would fight the
      # gitops state ArgoCD enforces from scaling.yaml (no
      # ignoreDifferences entry exists for these two anymore).
      # The `Verify required GPU services are warm` step at the
      # top of the job catches the symmetric "forgot to scale up"
      # mistake.

      # If the runner exit code indicated a regression (the wait step
      # set job_failed=true), fail the whole workflow now. Done at
      # the end so the comment + cleanup steps run first.
      - name: Fail on regression
        if: steps.wait.outputs.job_failed == 'true'
        run: |
          echo "::error::ragas-eval Job reported a regression (or hard failure). See logs above."
          exit 1

      # workflow_dispatch + update_baseline: the runner has already
      # written the new baselines.json INSIDE the pod's image, but we
      # need to land it back in the repo. Read the per-metric block
      # from scores.json and craft a baselines.json update, then open
      # a PR for review.
      - name: Open baseline-update PR
        if: inputs.update_baseline == true && steps.wait.outputs.job_failed != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "eval/ragas: refresh baselines from latest run"
          title: "eval/ragas: refresh baselines"
          body: |
            Auto-generated baseline refresh. Triggered by workflow_dispatch
            with `update_baseline=true`.

            Review the metric deltas before merging — adopting these as the
            new baseline locks in their values for future regression gating.
          branch: ragas-eval/refresh-baselines
          delete-branch: true
          add-paths: |
            eval/ragas/baselines.json
