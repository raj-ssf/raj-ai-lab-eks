apiVersion: v1
kind: Service
metadata:
  name: qdrant
  labels:
    app: qdrant
spec:
  # Headless service: no cluster IP, DNS resolves to individual pod IPs.
  # Required by the StatefulSet for stable per-pod DNS (qdrant-0.qdrant.<ns>.svc...).
  # Clients inside the cluster can still dial `qdrant.<ns>.svc.cluster.local:6333`
  # and get round-robin DNS answers to pod IPs.
  clusterIP: None
  selector:
    app: qdrant
  ports:
    - name: http
      port: 6333
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 6334
      targetPort: grpc
      protocol: TCP
    # Phase #76: P2P port for qdrant cluster consensus + replication.
    # Each qdrant pod's Raft-based consensus ring talks here. Without
    # this port exposed by the headless Service, qdrant-0 / qdrant-1 /
    # qdrant-2 can't discover each other via the qdrant-N.qdrant.<ns>.svc
    # DNS name needed for cluster membership.
    - name: p2p
      port: 6335
      targetPort: p2p
      protocol: TCP
