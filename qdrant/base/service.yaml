apiVersion: v1
kind: Service
metadata:
  name: qdrant
  labels:
    app: qdrant
spec:
  # Headless service: no cluster IP, DNS resolves to individual pod IPs.
  # Required by the StatefulSet for stable per-pod DNS (qdrant-0.qdrant.<ns>.svc...).
  # Clients inside the cluster can still dial `qdrant.<ns>.svc.cluster.local:6333`
  # and get round-robin DNS answers to pod IPs.
  clusterIP: None
  selector:
    app: qdrant
  ports:
    - name: http
      port: 6333
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 6334
      targetPort: grpc
      protocol: TCP
