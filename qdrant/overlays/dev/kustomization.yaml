apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Qdrant has no account-specific or env-specific values today (no auth,
# no ingress, cluster-internal only). Overlay sets just the namespace.
# If you ever add an API key, sized PVC, or replica count differences
# between envs, patch them here.

namespace: qdrant

resources:
  - ../../base
