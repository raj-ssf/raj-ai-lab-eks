apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: hello
    namespace: default
  spec:
    replicas: 2
    selector:
      matchLabels:
        app: hello
    template:
      metadata:
        labels:
          app: hello
      spec:
        containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
          - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
  ---
  apiVersion: v1
  kind: Service
  metadata:
    name: hello
    namespace: default
  spec:
    selector:
      app: hello
    ports:
    - port: 80
      targetPort: 80
    type: ClusterIP