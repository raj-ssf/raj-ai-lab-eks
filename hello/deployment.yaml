apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: hello
  namespace: default
spec:
  selector:
    app: hello
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
---
# Phase 12 of Gateway API migration: legacy Ingress removed. The
# hello.ekstest.com + hello2.ekstest.com hostnames now serve solely
# through the HTTPRoute below + shared-gateway in gateway-system ns.
# cert-manager Certificate hello-tls-prod is now standalone (in
# raj-ai-lab-eks-infra/gateway-app-certs.tf as a kubectl_manifest)
# and no longer derived from this file.
---
# Phase 10 of Gateway API migration: HTTPRoute for both hello
# hostnames. Single HTTPRoute attaches to TWO listener sections
# (hello-https + hello2-https) on shared-gateway.
#
# Phase 2 portability refactor (2026-04-29): hostnames are
# placeholders here; ArgoCD's kustomize.patches in
# raj-ai-lab-eks-infra/argocd-apps.tf:hello_app substitutes the
# real var.domain hostnames at sync time. Same pattern as
# rag-service / chat-ui / langgraph-service / vllm.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hello
  namespace: default
  labels:
    app: hello
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway-system
      sectionName: hello-https
    - name: shared-gateway
      namespace: gateway-system
      sectionName: hello2-https
  hostnames:
    - hello.example.local   # overlay/argocd patches with real FQDN
    - hello2.example.local  # overlay/argocd patches with real FQDN
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hello
          port: 80
