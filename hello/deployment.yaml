apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: hello
  namespace: default
spec:
  selector:
    app: hello
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Phase 10 of Gateway API migration: opt out of ExternalDNS so
    # this Ingress no longer competes with the hello HTTPRoute as a
    # DNS source for hello.ekstest.com / hello2.ekstest.com.
    # cert-manager renewal continues unaffected. See rag-service
    # Ingress for full rationale.
    external-dns.alpha.kubernetes.io/controller: skip-migrated
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - hello.ekstest.com
    - hello2.ekstest.com
    secretName: hello-tls-prod
  rules:
  - host: hello.ekstest.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: hello
            port:
              number: 80
  - host: hello2.ekstest.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: hello
            port:
              number: 80
---
# Phase 10 of Gateway API migration: HTTPRoute for both hello
# hostnames. Single HTTPRoute attaches to TWO listener sections
# (hello-https + hello2-https) on shared-gateway. Hostnames are
# hardcoded here (not patched per-env) since this is a test app
# with stable lab-specific hostnames — same convention as the
# Ingress above.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hello
  namespace: default
  labels:
    app: hello
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway-system
      sectionName: hello-https
    - name: shared-gateway
      namespace: gateway-system
      sectionName: hello2-https
  hostnames:
    - hello.ekstest.com
    - hello2.ekstest.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hello
          port: 80
