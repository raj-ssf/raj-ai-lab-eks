# Phase #40: preview Service for the blueGreen strategy. Mirror of
# the existing chat-ui Service (same port shape) but argo-rollouts
# injects rollouts-pod-template-hash into spec.selector at runtime
# to pin it to the PREVIEW (not active) ReplicaSet's pods.
#
# Steady-state behavior:
#   No deploy in progress → preview RS doesn't exist → this Service
#   has zero endpoints. Same harmless empty-Service pattern as the
#   canary Services on langgraph/rag/ingestion.
#
# How operators use it during a blueGreen pause:
#   kubectl -n chat port-forward svc/chat-ui-preview 8001:80
#   open http://localhost:8001
#   # Inspect the preview UI; if good:
#   kubectl argo rollouts promote chat-ui -n chat
#   # Promotion atomically flips chat-ui Service's selector to the
#   # preview RS. WebSocket sessions on the old RS reconnect via
#   # Chainlit's client-side retry against the new RS.

apiVersion: v1
kind: Service
metadata:
  name: chat-ui-preview
  labels:
    app: chat-ui
    role: preview
spec:
  type: ClusterIP
  selector:
    app: chat-ui
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
