# Phase #45: stable Service for argo-rollouts Istio trafficRouting.
# Mirror of langgraph-service-stable / rag-service-stable /
# ingestion-service-stable. argo-rollouts injects rollouts-pod-
# template-hash into spec.selector at runtime so this Service
# targets ONLY the stable RS's pods.

apiVersion: v1
kind: Service
metadata:
  name: chat-ui-stable
  labels:
    app: chat-ui
    role: stable
spec:
  type: ClusterIP
  selector:
    app: chat-ui
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
