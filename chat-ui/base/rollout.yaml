# Phase #45: chat-ui flipped from blueGreen → canary now that Phase
# #44's DestinationRule with consistent-hash on the Chainlit session
# cookie is in place. Same-cookie requests pin to the same pod →
# safe to weight traffic across stable + canary.
#
# Original Phase #40 rationale (kept for archeology — explains the
# constraint Phase #44 lifted):
#
# Phase #40: chat-ui converted to Argo Rollouts blueGreen, NOT
# canary. Different strategy than langgraph (#30+#31), rag (#35),
# and ingestion (#39) — and the strategy choice is forced by
# Chainlit's session model.
#
# WHY blueGreen, NOT canary (PRE-Phase #44):
#   Chainlit uses WebSockets for token-by-token streaming of /invoke
#   responses. A weighted-traffic canary (Phase #31 pattern) would
#   randomly route the WebSocket-upgrade request between stable and
#   canary RS based on VS weights — but mid-conversation HTTP polls,
#   feedback POSTs, and reconnects would not necessarily land on
#   the same RS that holds the session state. Result: corrupted
#   conversations, lost stream tokens, broken feedback.
#
#   blueGreen sidesteps this entirely:
#     1. New version deploys as "preview" (separate Service)
#     2. activeService keeps serving production traffic on stable
#     3. Operator inspects preview by pointing at chat-ui-preview
#        directly (port-forward or curl with cookie)
#     4. `kubectl argo rollouts promote chat-ui -n chat` flips the
#        activeService selector to the preview RS atomically
#     5. WebSocket sessions on the old RS disconnect (Chainlit's
#        client-side reconnect kicks in, lands on the new RS)
#     6. Old RS scales to 0 after scaleDownDelaySeconds (60s)
#
#   The atomic flip means no mid-stream bouncing — every individual
#   session is fully on stable or fully on preview, never split.
#
# WebSocket disconnect-on-flip caveat:
#   At promote time, all in-flight WebSockets are killed. Chainlit's
#   client reconnects automatically and rebuilds session state from
#   the langgraph-redis store (Phase #6 conversation memory + Phase
#   #22 session export both persist server-side), so users see a
#   brief stutter rather than data loss. Best operational practice:
#   promote during quiet windows.
#
# NO ANALYSIS:
#   Same reason as ingestion-service (Phase #39) — chat-ui has no
#   prometheus_fastapi_instrumentator wired up and no ServiceMonitor.
#   Operator-driven promotion via the plugin is the gate. Phase #37
#   RolloutPausedTooLong fires at 30m if a preview is forgotten.
#
# Migration notes:
#   - replicas at 3 (Phase #56). Phase #44's consistent-hash DR
#     pins each session to one pod across the 3 replicas, so no
#     session-state fragmentation. Single-pod failure no longer
#     takes the chat UI down.
#     (Originally said replicas=1 because Chainlit's session model
#     would have fragmented across multiple pods; Phase #44 fixed
#     that, and Phase #56 cashed it in.)
#   - Pod template byte-identical to deployment.yaml.
#   - First-deploy of a Rollout skips the blueGreen pause (no prior
#     version to preview against).

apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: chat-ui
  labels:
    app: chat-ui
spec:
  # Phase #56: 1 → 3 replicas for HA. Made safe by Phase #44's
  # DestinationRule with consistent-hash on the chainlit-session-id
  # cookie — same-session requests pin to the same pod across the 3
  # replicas, so Chainlit's per-pod session state isn't fragmented.
  # Single-pod failure no longer takes the chat UI down.
  #
  # Canary math under setWeight 25: ceil(3 × 0.25) = 1 canary pod
  # alongside 3 stable pods (4 total during canary), drops back to 3
  # post-promote. setWeight 75: ceil(3 × 0.75) = 3 canary alongside
  # 3 stable (6 total — temporary surge during canary, fine on g6
  # Karpenter capacity).
  replicas: 3
  selector:
    matchLabels:
      app: chat-ui
  strategy:
    # Phase #45: blueGreen → canary. Made safe by Phase #44's
    # DestinationRule with consistent-hash on the Chainlit session
    # cookie — same-cookie requests pin to the same pod, so a
    # weighted-traffic canary (this strategy block) doesn't fragment
    # in-conversation sessions across stable + canary RS.
    #
    # Without the Phase #44 hash, switching to canary would have
    # split each user's session traffic randomly between two RS
    # instances, corrupting Chainlit's server-side session state.
    # The hash makes this safe.
    #
    # No analysis templates yet — chat-ui has no Prometheus
    # instrumentation. Indefinite-pause canary like Phase #39
    # ingestion-service: setWeight + pause + manual operator
    # promote. When Phase #47 (Chainlit /metrics on a side port)
    # lands, this strategy can swap pause for an analysis step.
    canary:
      canaryService: chat-ui-canary
      stableService: chat-ui-stable
      trafficRouting:
        istio:
          virtualService:
            name: chat-ui-canary-vs
            routes:
              - primary
      steps:
        - setWeight: 25
        # Indefinite pause — operator inspects the canary RS, then
        # promotes manually. Phase #37's RolloutPausedTooLong alert
        # fires at 30m to remind a forgetful operator.
        - pause: {}
        - setWeight: 75
        - pause: {}
        # Auto-promote to 100% after the second manual promote.
      maxSurge: 1
      maxUnavailable: 0
      abortScaleDownDelaySeconds: 30
  revisionHistoryLimit: 5
  template:
    metadata:
      labels:
        app: chat-ui
    spec:
      serviceAccountName: chat-ui
      containers:
        - name: chat-ui
          image: chat-ui:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
            # Phase #47: prometheus_client side server. The chat-ui
            # Service exposes this via a port named "metrics".
            - name: metrics
              containerPort: 8001
          env:
            - name: DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: cluster-config
                  key: domain
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: cluster-config
                  key: keycloak_realm
            - name: LANGGRAPH_URL
              value: http://langgraph-service.langgraph.svc.cluster.local
            - name: STREAM_ENABLED
              value: "true"
            - name: INGESTION_URL
              value: http://ingestion-service.ingestion.svc.cluster.local
            - name: LANGFUSE_HOST
              value: https://langfuse.$(DOMAIN)
            - name: OAUTH_KEYCLOAK_BASE_URL
              value: https://keycloak.$(DOMAIN)
            - name: OAUTH_KEYCLOAK_REALM
              value: $(KEYCLOAK_REALM)
            - name: CHAINLIT_URL
              value: https://chat.$(DOMAIN)
          envFrom:
            - secretRef:
                name: chat-ui-oidc
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            failureThreshold: 3
