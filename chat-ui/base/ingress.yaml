apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chat-ui
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Same lesson from the langgraph-service ingress: when NGINX
    # forwards into a meshed backend that has a force-mtls
    # DestinationRule, the upstream Host header has to match the K8s
    # Service DNS so the source Envoy routes through the proper
    # outbound|<port>||<service>.<ns>.svc.cluster.local cluster (the
    # one with ISTIO_MUTUAL transport_socket configured). Without this
    # rewrite, NGINX keeps Host=chat.ekstest.com, Envoy can't match
    # the cluster, falls through to PassthroughCluster, and the dest
    # sidecar denies the call (no SPIFFE identity arrives).
    #
    # Note: chat-ui doesn't currently have a force-mtls DR, but the
    # rewrite is harmless and keeps the pattern consistent with the
    # other ingresses fronting meshed workloads. Add the DR if AuthZ
    # principal-matching becomes required later.
    nginx.ingress.kubernetes.io/upstream-vhost: chat-ui.chat.svc.cluster.local
    # Chainlit uses websockets for the live chat experience. NGINX
    # ingress's default proxy timeouts are too short for long-lived
    # WS connections; bump them to keep sessions alive across model
    # cold-starts (which can be several minutes for the 70B path).
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Phase 5: opt out of ExternalDNS so this Ingress no longer
    # competes with the chat-ui HTTPRoute as a DNS source for
    # chat.ekstest.com. ExternalDNS v0.15.0 skips Ingresses whose
    # external-dns.alpha.kubernetes.io/controller annotation isn't
    # "dns-controller". cert-manager renewal continues unaffected
    # (it doesn't read this annotation). See rag-service Ingress for
    # the full rationale.
    external-dns.alpha.kubernetes.io/controller: skip-migrated
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - chat.ekstest.com  # rewritten by overlay's kustomize patch (per env)
      secretName: chat-ui-tls
  rules:
    - host: chat.ekstest.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chat-ui
                port:
                  number: 80
