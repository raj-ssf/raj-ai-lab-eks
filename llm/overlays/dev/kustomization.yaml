apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Ingress hostname patch is applied by the ArgoCD Application spec
# (raj-ai-lab-eks-infra/argocd-apps.tf) via `kustomize.patches` — same
# pattern as rag-service. vLLM version lives here so we can bump the
# model server without a Terraform apply.
namespace: llm
resources:
  - ../../base
images:
  - name: vllm/vllm-openai
    newTag: v0.7.2   # bump on new vllm releases; validate model loads
