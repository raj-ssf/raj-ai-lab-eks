---
# Llama 3.1 405B Instruct AWQ on 8× NVIDIA A100 40GB (p4d.24xlarge).
# SOTA open-weight flagship. AWQ-quantized ~230 GB distributes across
# 8× 40GB A100s at TP=8 (~29 GB per GPU + KV cache).
#
# Storage model: S3 Mountpoint, not a local PVC. The vllm-cache-llama-405b
# PVC binds to the statically-provisioned vllm-405b-s3mp PV (see
# pv-llama-405b.yaml) which mounts s3://.../llama-3.1-405b-instruct-awq/
# as a read-only filesystem at /model. No init-container aws s3 sync
# step — the S3 Mountpoint mount IS the model source.
#
# Cold start: ~6 min (weights fault in from S3 during vLLM's layer
# load). Subsequent pod restarts replay the same cost (no between-pod
# caching). For repeat-demos within a single session, keep the pod up.
#
# CAUTION: p4d.24xlarge is ~$32.77/hr. A full demo cycle (90s provision
# + 6 min cold-start + 5 min inference + 30s consolidate ≈ 13 min) is
# ~$7. The variant intentionally uses p4d instead of p5 ($98/hr) unless
# you override the nodeSelector — A100 is plenty for this workload.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-llama-405b
  labels:
    app: vllm-llama-405b
    vllm-model: llama-3.1-405b-awq
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-llama-405b
  template:
    metadata:
      labels:
        app: vllm-llama-405b
        vllm-model: llama-3.1-405b-awq
    spec:
      serviceAccountName: vllm
      enableServiceLinks: false
      nodeSelector:
        node.kubernetes.io/instance-type: p4d.24xlarge
      tolerations:
        - { key: nvidia.com/gpu,    operator: Exists, effect: NoSchedule }
        - { key: gpu-experiment,    operator: Exists, effect: NoSchedule }
      # No init container — the S3 Mountpoint PVC provides /model
      # directly. vLLM reads weights through the mount on first access.
      containers:
        - name: vllm
          image: vllm/vllm-openai:placeholder
          args:
            - "--model"
            - "/model"
            - "--served-model-name"
            - "llama-3.1-405b"
            - "--tensor-parallel-size"
            - "8"
            - "--quantization"
            - "awq"
            - "--dtype"
            - "half"
            - "--max-model-len"
            - "8192"
            - "--gpu-memory-utilization"
            - "0.85"
            - "--enforce-eager"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          ports:
            - { name: http, containerPort: 8000 }
          env:
            - { name: HF_HUB_OFFLINE,       value: "1" }
            - { name: TRANSFORMERS_OFFLINE, value: "1" }
            - { name: NCCL_DEBUG,           value: "WARN" }
            - { name: OTEL_SERVICE_NAME,    value: vllm-llama-405b }
          resources:
            requests: { nvidia.com/gpu: "8", cpu: "16", memory: "128Gi" }
            limits:   { nvidia.com/gpu: "8", cpu: "64", memory: "400Gi" }
          # Longer startup grace than other variants — 405B via S3
          # Mountpoint needs ~6 min to fault in all weights. 120 ×
          # 10s = 20 min window before the kubelet gives up.
          startupProbe:  { httpGet: { path: /health, port: http }, initialDelaySeconds: 60, periodSeconds: 10, failureThreshold: 120 }
          readinessProbe:{ httpGet: { path: /health, port: http }, periodSeconds: 10, failureThreshold: 3 }
          livenessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 30, failureThreshold: 3 }
          volumeMounts:
            - { name: model-cache, mountPath: /model, readOnly: true }
            - { name: shm,         mountPath: /dev/shm }
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-cache-llama-405b
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 16Gi }
