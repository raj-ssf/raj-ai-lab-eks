            - "1"
            - "--quantization"
            - "awq"
            - "--dtype"
            - "half"
            - "--max-model-len"
            - "16384"
            - "--gpu-memory-utilization"
            - "0.88"
            - "--enforce-eager"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          ports:
            - { name: http, containerPort: 8000 }
          env:
            - { name: HF_HUB_OFFLINE,       value: "1" }
