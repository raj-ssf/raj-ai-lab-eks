# Model-axis test variants. One Deployment per model, each paired
# with:
#   - A sensible default GPU (nodeSelector on node.kubernetes.io/instance-type)
#   - Its own PVC for "hot" models (weights cached in-cluster) or
#     the S3 Mountpoint PVC for the "giant" 405B
#   - Appropriate --tensor-parallel-size, quantization, and max-model-len
#
# All scale to 0 by default. Bring one up with:
#   kubectl -n llm scale deployment vllm-<name> --replicas=1
# Reach it via `kubectl port-forward deployment/vllm-<name> 8000:8000`.
#
# To retarget a model to a different GPU (e.g., run Mixtral on
# g6.12xlarge instead of g6e.xlarge), edit the nodeSelector below and
# `git push` — ArgoCD will sync but won't touch the replica count
# (ignoreDifferences protects /spec/replicas only).

---
# Llama 3.1 8B Instruct (FP16) on 1× NVIDIA L40S 48GB (g6e.xlarge).
# Minimum viable demo — shows the cost-throughput curve's bottom end
# at ~$1.86/hr. TP=1, no NCCL; cold start is dominated by initial
# aws s3 sync (~30s for 16 GB over the VPC endpoint).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-llama-8b
  labels:
    app: vllm-llama-8b
    vllm-model: llama-3.1-8b
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-llama-8b
  template:
    metadata:
      labels:
        app: vllm-llama-8b
        vllm-model: llama-3.1-8b
    spec:
      serviceAccountName: vllm
      enableServiceLinks: false
      # Don't pin a specific instance type — let Karpenter pick the
      # cheapest fit from the gpu-experiments allowlist (currently
      # g6.xlarge L4, g6e.xlarge L40S, g6e.12xlarge L40Sx4, p4d.24xlarge
      # A100x8, p5.48xlarge H100x8). For Llama 3.1 8B FP16 + LoRA at
      # max-model-len=8192, even g6.xlarge's 24GB L4 fits comfortably.
      # Hard-pinning to g6e.xlarge bit us 2026-04-28 when AWS hit
      # InsufficientInstanceCapacity for g6e.xlarge in us-west-2c
      # (the AZ our model-weights PVC is bound to) — the pod sat
      # Pending indefinitely with no alternative.
      nodeSelector:
        karpenter.sh/nodepool: gpu-experiments
      tolerations:
        - { key: nvidia.com/gpu,    operator: Exists, effect: NoSchedule }
        - { key: gpu-experiment,    operator: Exists, effect: NoSchedule }
      initContainers:
        - name: model-sync
          image: amazon/aws-cli:2.17.0
          env:
            - { name: AWS_REGION, value: us-west-2 }
            - { name: S3_URI,     value: s3://raj-ai-lab-eks-model-weights/llama-3.1-8b-instruct/ }
            - { name: MODEL_PATH, value: /model }
          command: ["/bin/sh", "-euxc"]
          args:
            - |
              aws configure set default.s3.max_concurrent_requests 32
              aws configure set default.s3.multipart_chunksize 128MB
              aws s3 sync "$S3_URI" "$MODEL_PATH" --no-progress
              ls -la "$MODEL_PATH"
          resources:
            requests: { cpu: "1", memory: "1Gi" }
            limits:   { cpu: "2", memory: "2Gi" }
          volumeMounts:
            - { name: model-cache, mountPath: /model }
        # Pulls the fine-tuned LoRA adapter (built in fine-tuning F2) from
        # the training bucket. Pod Identity creds via the same vllm SA used
        # by model-sync — adapter-read perm is the
        # raj-ai-lab-eks-vllm-read-adapters policy attached in
        # raj-ai-lab-eks-infra/training.tf. ~185MB total (adapter weights
        # + adapter_config + tokenizer files); ~5s sync.
        - name: adapter-sync
          image: amazon/aws-cli:2.17.0
          env:
            - { name: AWS_REGION,   value: us-west-2 }
            - { name: S3_URI,       value: s3://raj-ai-lab-eks-training/adapters/llama-3.1-8b-alpaca-lora/ }
            - { name: ADAPTER_PATH, value: /adapters/alpaca-lora }
          command: ["/bin/sh", "-euxc"]
          args:
            - |
              # Exclude the tokenizer/special-tokens/config files Axolotl
              # saves alongside the adapter. The LoRA inherits the base
              # model's tokenizer (Llama 3.1 8B Instruct's tokenizer
              # includes a chat_template; Axolotl's saved tokenizer_config
              # does not). If the adapter dir contains a tokenizer_config,
              # vLLM uses IT for /v1/chat/completions calls and fails with
              # 'default chat template is no longer allowed' (transformers
              # v4.44+ requirement). Sync only the adapter weights so vLLM
              # falls back to the base tokenizer.
              aws s3 sync "$S3_URI" "$ADAPTER_PATH" --no-progress \
                --exclude "tokenizer*" \
                --exclude "special_tokens_map.json" \
                --exclude "config.json" \
                --exclude "README.md"
              ls -la "$ADAPTER_PATH"
          resources:
            requests: { cpu: "500m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "512Mi" }
          volumeMounts:
            - { name: adapter-cache, mountPath: /adapters/alpaca-lora }
      containers:
        - name: vllm
          image: vllm/vllm-openai:placeholder
          args:
            - "--model"
            - "/model"
            - "--served-model-name"
            - "llama-3.1-8b"
            - "--tensor-parallel-size"
            - "1"
            - "--dtype"
            - "half"
            - "--max-model-len"
            - "8192"
            - "--gpu-memory-utilization"
            - "0.85"
            - "--enforce-eager"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            # LoRA serving (fine-tuning F3). vLLM exposes the base model
            # (llama-3.1-8b) AND each loaded adapter (here:
            # llama-3.1-8b-alpaca) as separately addressable model names.
            # Caller picks via the `model:` field of /v1/chat/completions.
            - "--enable-lora"
            # Concurrent active adapters. With one adapter and one
            # in-flight request, max-loras=1 is enough. Each additional
            # active LoRA reserves a small VRAM slab for delta-weights —
            # bump when adding more adapters in F4.
            - "--max-loras"
            - "1"
            # Must be >= the rank we trained at (lora_r=16 in F2's Axolotl
            # config). vLLM rejects adapters whose rank exceeds this.
            - "--max-lora-rank"
            - "16"
            # name=path tuples. Path can be a local directory (filled by
            # the adapter-sync init container above) or an HF Hub id.
            # Loaded at vLLM cold-start; lives for the pod's lifetime.
            - "--lora-modules"
            - "llama-3.1-8b-alpaca=/adapters/alpaca-lora"
            # Tool calling (Phase T): expose the OpenAI-style tools=[...]
            # parameter so callers can give Llama 3.1 8B a tool catalog
            # and have it return structured tool_calls when it decides to
            # use one. langgraph-service uses this for the agentic-loop
            # path (tool registry: calculator, get_current_time,
            # http_fetch, search_session_docs).
            #
            # --tool-call-parser llama3_json matches Llama 3.1's native
            # tool-call output format (<|python_tag|>{"name":...} or
            # JSON in the assistant turn). Without this flag vLLM accepts
            # tools= in the request but doesn't auto-parse the response —
            # caller would have to scrape JSON from the model's text.
            - "--enable-auto-tool-choice"
            - "--tool-call-parser"
            - "llama3_json"
          ports:
            - { name: http, containerPort: 8000 }
          env:
            - { name: HF_HUB_OFFLINE,       value: "1" }
            - { name: TRANSFORMERS_OFFLINE, value: "1" }
            - { name: OTEL_SERVICE_NAME,    value: vllm-llama-8b }
            # Allows POST /v1/load_lora_adapter and /v1/unload_lora_adapter
            # at runtime — hot-swap adapters without a pod restart. Useful
            # for F4 A/B-testing once we have multiple adapters; harmless
            # to enable now since the static --lora-modules flag still
            # pre-loads alpaca on cold-start.
            - { name: VLLM_ALLOW_RUNTIME_LORA_UPDATING, value: "True" }
          resources:
            requests: { nvidia.com/gpu: "1", cpu: "2", memory: "8Gi" }
            limits:   { nvidia.com/gpu: "1", cpu: "3", memory: "28Gi" }
          startupProbe:  { httpGet: { path: /health, port: http }, initialDelaySeconds: 30, periodSeconds: 10, failureThreshold: 60 }
          readinessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 10, failureThreshold: 3 }
          livenessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 30, failureThreshold: 3 }
          volumeMounts:
            - { name: model-cache,   mountPath: /model,             readOnly: true }
            - { name: adapter-cache, mountPath: /adapters/alpaca-lora, readOnly: true }
            - { name: shm,           mountPath: /dev/shm }
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-cache-llama-8b
        # emptyDir (not PVC) for the adapter: 185MB downloads in ~5s on
        # pod restart, so a persistent volume buys nothing for the cost
        # of an EBS attach/detach cycle. If F4 grows the adapter set into
        # the GBs, switch to a shared RO PVC across the fleet.
        - name: adapter-cache
          emptyDir: { sizeLimit: 1Gi }
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 2Gi }

---
# Mixtral 8x7B Instruct AWQ on 1× NVIDIA L40S 48GB (g6e.xlarge).
# MoE architecture demo — 8 experts × 7B params, router activates 2
# per token. Quantized AWQ fits in ~28 GB VRAM with plenty of KV cache
# headroom. Inference is faster per token than dense 70B due to the
# sparse activation (only ~13B params used per forward pass).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-mixtral-8x7b
  labels:
    app: vllm-mixtral-8x7b
    vllm-model: mixtral-8x7b-awq
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-mixtral-8x7b
