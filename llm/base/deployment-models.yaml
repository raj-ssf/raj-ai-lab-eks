# Model-axis test variants. One Deployment per model, each paired
# with:
#   - A sensible default GPU (nodeSelector on node.kubernetes.io/instance-type)
#   - Its own PVC for "hot" models (weights cached in-cluster) or
#     the S3 Mountpoint PVC for the "giant" 405B
#   - Appropriate --tensor-parallel-size, quantization, and max-model-len
#
# All scale to 0 by default. Bring one up with:
#   kubectl -n llm scale deployment vllm-<name> --replicas=1
# Reach it via `kubectl port-forward deployment/vllm-<name> 8000:8000`.
#
# To retarget a model to a different GPU (e.g., run Mixtral on
# g6.12xlarge instead of g6e.xlarge), edit the nodeSelector below and
# `git push` — ArgoCD will sync but won't touch the replica count
# (ignoreDifferences protects /spec/replicas only).

---
# Llama 3.1 8B Instruct (FP16) on 1× NVIDIA L40S 48GB (g6e.xlarge).
# Minimum viable demo — shows the cost-throughput curve's bottom end
# at ~$1.86/hr. TP=1, no NCCL; cold start is dominated by initial
# aws s3 sync (~30s for 16 GB over the VPC endpoint).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-llama-8b
  labels:
    app: vllm-llama-8b
    vllm-model: llama-3.1-8b
spec:
  # Phase #80c: bumped 0 → 1 as the HPA's always-warm baseline.
  # The HPA (hpa-vllm-llama-8b.yaml) owns 1 → N scaling; without
  # at least 1 always-warm pod, HPA can't read vllm:* metrics
  # (the metric series simply doesn't exist when no pod is
  # emitting). This DOES change the cost model: was scale-from-
  # 0-via-ensure_warm at ~$0.80/hr g6.xlarge only when langgraph
  # routed a request, now ~$580/mo always-warm.
  # Phase #80d candidate: KEDA ScaledObject which CAN scale from
  # 0 (uses Prometheus directly, polls when no pods exist). Would
  # restore scale-from-0 with HPA-style autoscaling above 0.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-llama-8b
  template:
    metadata:
      labels:
        app: vllm-llama-8b
        vllm-model: llama-3.1-8b
    spec:
      serviceAccountName: vllm
      enableServiceLinks: false
      # Don't pin a specific instance type — let Karpenter pick the
      # cheapest fit from the gpu-experiments allowlist (currently
      # g6.xlarge L4, g6e.xlarge L40S, g6e.12xlarge L40Sx4, p4d.24xlarge
      # A100x8, p5.48xlarge H100x8). For Llama 3.1 8B FP16 + LoRA at
      # max-model-len=8192, even g6.xlarge's 24GB L4 fits comfortably.
      # Hard-pinning to g6e.xlarge bit us 2026-04-28 when AWS hit
      # InsufficientInstanceCapacity for g6e.xlarge in us-west-2c
      # (the AZ our model-weights PVC is bound to) — the pod sat
      # Pending indefinitely with no alternative.
      nodeSelector:
        karpenter.sh/nodepool: gpu-experiments
      tolerations:
        - { key: nvidia.com/gpu,    operator: Exists, effect: NoSchedule }
        - { key: gpu-experiment,    operator: Exists, effect: NoSchedule }
      initContainers:
        - name: model-sync
          image: amazon/aws-cli:2.17.0
          env:
            - { name: AWS_REGION, value: us-west-2 }
            # Phase #83b (2026-05-01): switched from FP16 weights to
            # the AWQ-INT4 quantized release (~16GB → ~6GB on disk,
            # ~75% VRAM reduction in the loaded model). Pre-staged via
            # llm/operational/awq-stage-llama-3.1-8b.yaml against the
            # hugging-quants/Meta-Llama-3.1-8B-Instruct-AWQ-INT4 repo.
            - { name: S3_URI,     value: s3://raj-ai-lab-eks-cilium-model-weights/llama-3.1-8b-awq/ }
            - { name: MODEL_PATH, value: /model }
          command: ["/bin/sh", "-euxc"]
          args:
            - |
              aws configure set default.s3.max_concurrent_requests 32
              aws configure set default.s3.multipart_chunksize 128MB
              aws s3 sync "$S3_URI" "$MODEL_PATH" --no-progress
              ls -la "$MODEL_PATH"
          resources:
            requests: { cpu: "1", memory: "1Gi" }
            limits:   { cpu: "2", memory: "2Gi" }
          volumeMounts:
            - { name: model-cache, mountPath: /model }
        # Pulls the fine-tuned LoRA adapter (built in fine-tuning F2) from
        # the training bucket. Pod Identity creds via the same vllm SA used
        # by model-sync — adapter-read perm is the
        # raj-ai-lab-eks-vllm-read-adapters policy attached in
        # raj-ai-lab-eks-infra/training.tf. ~185MB total (adapter weights
        # + adapter_config + tokenizer files); ~5s sync.
        - name: adapter-sync
          image: amazon/aws-cli:2.17.0
          env:
            - { name: AWS_REGION,   value: us-west-2 }
            - { name: S3_URI,       value: s3://raj-ai-lab-eks-cilium-training/adapters/llama-3.1-8b-alpaca-lora/ }
            - { name: ADAPTER_PATH, value: /adapters/alpaca-lora }
          command: ["/bin/sh", "-euxc"]
          args:
            - |
              # Exclude the tokenizer/special-tokens/config files Axolotl
              # saves alongside the adapter. The LoRA inherits the base
              # model's tokenizer (Llama 3.1 8B Instruct's tokenizer
              # includes a chat_template; Axolotl's saved tokenizer_config
              # does not). If the adapter dir contains a tokenizer_config,
              # vLLM uses IT for /v1/chat/completions calls and fails with
              # 'default chat template is no longer allowed' (transformers
              # v4.44+ requirement). Sync only the adapter weights so vLLM
              # falls back to the base tokenizer.
              aws s3 sync "$S3_URI" "$ADAPTER_PATH" --no-progress \
                --exclude "tokenizer*" \
                --exclude "special_tokens_map.json" \
                --exclude "config.json" \
                --exclude "README.md"
              ls -la "$ADAPTER_PATH"
          resources:
            requests: { cpu: "500m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "512Mi" }
          volumeMounts:
            - { name: adapter-cache, mountPath: /adapters/alpaca-lora }
      containers:
        - name: vllm
          image: vllm/vllm-openai:placeholder
          args:
            - "--model"
            - "/model"
            - "--served-model-name"
            - "llama-3.1-8b"
            - "--tensor-parallel-size"
            - "1"
            # Phase #83b: AWQ-INT4 quantized weights running through
            # the Marlin kernel — INT4 weights × FP16 activations
            # matmul on Ada's int4 tensor cores. ~2-3× throughput vs
            # FP16, and weights footprint drops from ~16GB to ~5GB,
            # freeing ~11GB for KV cache (which is what enables
            # ~30 → ~90 concurrent decode contexts per pod under
            # prefix caching from #80a).
            #
            # Caveat learned from the first Phase #83b deploy
            # (commit f5ea410): vLLM 0.7.2 has TWO AWQ code paths.
            # `--quantization awq` is the legacy/reference impl
            # (vLLM logs explicitly: "speed can be slower than
            # non-quantized models" — i.e. potentially SLOWER than
            # the FP16 baseline we're replacing). The real win comes
            # from `--quantization awq_marlin`, which dispatches to
            # the Marlin INT4 kernel. vLLM's startup log auto-detects
            # the model can run with awq_marlin and explicitly
            # recommends it. Use `awq_marlin`.
            - "--quantization"
            - "awq_marlin"
            # Activations stay FP16 even with INT4 weights — this is
            # the canonical AWQ inference dtype. Keep --dtype half
            # explicit so vLLM doesn't fall back to bfloat16 on a
            # different GPU class if Karpenter ever schedules to one
            # (the gpu-experiments NodePool also includes A100/H100).
            - "--dtype"
            - "half"
            # 2026-05-03: bumped 8192 -> 16384 to unblock RAGAS
            # Faithfulness scoring. langchain-openai 0.2.14 ↔ RAGAS
            # 0.2.15 has a max_tokens parameter-propagation regression
            # that strips our configured max_tokens=2048 before the
            # request reaches vLLM. The unbounded default resolves to
            # max-model-len, so vLLM was rejecting every Faithfulness
            # statement-extraction call with HTTP 400 ("8192 requested
            # in completion, prompt 507 → 8699 > 8192"). Doubling
            # max-model-len makes the unbounded request fit
            # comfortably. Targets the SYMPTOM (request rejection),
            # not the cause (the langchain pipeline drop) — see
            # feedback_ragas_judge_max_tokens.md for the full arc.
            #
            # Cost trade-offs at 16384:
            #   - KV cache reservation per request: 2x the previous
            #     ceiling (vLLM's per-sequence KV reservation scales
            #     with max_model_len). Peak concurrent decode capacity
            #     on the L4 24 GiB drops from ~60 to ~30. Trivial-
            #     tier traffic is well under that ceiling.
            #   - Live chat brief unavailability on rollout (Recreate
            #     strategy + cold-start ~5 min). One-time cost the
            #     operator approved.
            #   - Prefix caching efficiency unchanged: max-model-len
            #     doesn't affect cache hit rate, only the budget
            #     reserved if a request needs the full window.
            - "--max-model-len"
            - "16384"
            # Phase #80a: bumped 0.85 → 0.92. With prefix caching (below)
            # enabled, more memory in the KV cache pool = more prefixes
            # retained = higher hit rate. Llama-3.1-8B FP16 is ~16GB
            # weights on the L4's 24GB. At 0.85 ≈ 4.4GB KV; at 0.92
            # ≈ 6.1GB. Same stability margin (vLLM never allocates
            # 100% of its budget).
            - "--gpu-memory-utilization"
            - "0.92"
            # Phase #80a: enable prefix caching. Shares KV cache across
            # requests with identical prefixes. langgraph-service sends
            # the same system prompt + (often) the same plan/RAG
            # context block on every request, so prefix-cache hit rate
            # should be high. Effects:
            #   - first request prefills the system prompt cold;
            #     subsequent requests reuse the cached KV blocks
            #   - ~30-50% reduction in prefill cost (prefill is
            #     compute-bound — saving it saves wall-clock + GPU
            #     time)
            #   - +N concurrent requests per pod (KV headroom freed
            #     up by reuse becomes capacity for more decode
            #     contexts)
            # Compatible with --enable-lora since vLLM 0.6.4+. We're
            # on 0.7.2 (llm/overlays/dev/kustomization.yaml).
            # Metric to watch: `vllm:gpu_prefix_cache_hit_rate` in
            # Prometheus (already scraped via ServiceMonitor).
            - "--enable-prefix-caching"
            # Phase #83a: chunked prefill. Without this, vLLM
            # processes prefill (compute-bound, generates KV cache
            # for the prompt) and decode (memory-bound, generates
            # one token at a time) in SEPARATE iterations. Under
            # load, a long-prompt request stalls all decode
            # iterations behind it → p99 latency spikes.
            #
            # `--enable-chunked-prefill` chunks long prefills and
            # interleaves them with decode passes in the same
            # batch. Effects:
            #   - p99 latency: ~30-50% lower under mixed-prompt
            #     loads (long prompts no longer block short ones)
            #   - throughput: similar to without (the GPU is
            #     fully utilized either way), but shape of
            #     latency distribution improves
            #   - max-model-len budget: chunked prefill reserves
            #     a small % of the KV cache for the chunking
            #     buffer; tradeoff is bounded
            # Default in vLLM 0.6+ for max-model-len ≥ 32K, but
            # OFF by default for our max-model-len=8192. Flag-flip
            # opt-in.
            - "--enable-chunked-prefill"
            - "--enforce-eager"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            # LoRA serving (fine-tuning F3). vLLM exposes the base model
            # (llama-3.1-8b) AND each loaded adapter (here:
            # llama-3.1-8b-alpaca) as separately addressable model names.
            # Caller picks via the `model:` field of /v1/chat/completions.
            - "--enable-lora"
            # Concurrent active adapters. With one adapter and one
            # in-flight request, max-loras=1 is enough. Each additional
            # active LoRA reserves a small VRAM slab for delta-weights —
            # bump when adding more adapters in F4.
            - "--max-loras"
            - "1"
            # Must be >= the rank we trained at (lora_r=16 in F2's Axolotl
            # config). vLLM rejects adapters whose rank exceeds this.
            - "--max-lora-rank"
            - "16"
            # name=path tuples. Path can be a local directory (filled by
            # the adapter-sync init container above) or an HF Hub id.
            # Loaded at vLLM cold-start; lives for the pod's lifetime.
            - "--lora-modules"
            - "llama-3.1-8b-alpaca=/adapters/alpaca-lora"
            # Tool calling (Phase T): expose the OpenAI-style tools=[...]
            # parameter so callers can give Llama 3.1 8B a tool catalog
            # and have it return structured tool_calls when it decides to
            # use one. langgraph-service uses this for the agentic-loop
            # path (tool registry: calculator, get_current_time,
            # http_fetch, search_session_docs).
            #
            # --tool-call-parser llama3_json matches Llama 3.1's native
            # tool-call output format (<|python_tag|>{"name":...} or
            # JSON in the assistant turn). Without this flag vLLM accepts
            # tools= in the request but doesn't auto-parse the response —
            # caller would have to scrape JSON from the model's text.
            - "--enable-auto-tool-choice"
            - "--tool-call-parser"
            - "llama3_json"
          ports:
            - { name: http, containerPort: 8000 }
          env:
            - { name: HF_HUB_OFFLINE,       value: "1" }
            - { name: TRANSFORMERS_OFFLINE, value: "1" }
            - { name: OTEL_SERVICE_NAME,    value: vllm-llama-8b }
            # Allows POST /v1/load_lora_adapter and /v1/unload_lora_adapter
            # at runtime — hot-swap adapters without a pod restart. Useful
            # for F4 A/B-testing once we have multiple adapters; harmless
            # to enable now since the static --lora-modules flag still
            # pre-loads alpaca on cold-start.
            - { name: VLLM_ALLOW_RUNTIME_LORA_UPDATING, value: "True" }
          resources:
            # Phase #83b: AWQ load uses ~5GB peak host RAM during
            # from_pretrained (vs ~10-12GB for FP16 deserialization).
            # Memory limit drop 28Gi → 16Gi gives the Karpenter
            # bin-packer more headroom to schedule on smaller g6
            # variants under spot capacity pressure.
            requests: { nvidia.com/gpu: "1", cpu: "2", memory: "5Gi" }
            limits:   { nvidia.com/gpu: "1", cpu: "3", memory: "16Gi" }
          startupProbe:  { httpGet: { path: /health, port: http }, initialDelaySeconds: 30, periodSeconds: 10, failureThreshold: 60 }
          readinessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 10, failureThreshold: 3 }
          livenessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 30, failureThreshold: 3 }
          volumeMounts:
            - { name: model-cache,   mountPath: /model,             readOnly: true }
            - { name: adapter-cache, mountPath: /adapters/alpaca-lora, readOnly: true }
            - { name: shm,           mountPath: /dev/shm }
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-cache-llama-8b
        # emptyDir (not PVC) for the adapter: 185MB downloads in ~5s on
        # pod restart, so a persistent volume buys nothing for the cost
        # of an EBS attach/detach cycle. If F4 grows the adapter set into
        # the GBs, switch to a shared RO PVC across the fleet.
        - name: adapter-cache
          emptyDir: { sizeLimit: 1Gi }
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 2Gi }

---
# Mixtral 8x7B Instruct AWQ on 1× NVIDIA L40S 48GB (g6e.xlarge).
# MoE architecture demo — 8 experts × 7B params, router activates 2
# per token. Quantized AWQ fits in ~28 GB VRAM with plenty of KV cache
# headroom. Inference is faster per token than dense 70B due to the
# sparse activation (only ~13B params used per forward pass).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-mixtral-8x7b
  labels:
    app: vllm-mixtral-8x7b
    vllm-model: mixtral-8x7b-awq
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-mixtral-8x7b
  template:
    metadata:
      labels:
        app: vllm-mixtral-8x7b
        vllm-model: mixtral-8x7b-awq
    spec:
      serviceAccountName: vllm
      enableServiceLinks: false
      nodeSelector:
        node.kubernetes.io/instance-type: g6e.xlarge
      tolerations:
        - { key: nvidia.com/gpu,    operator: Exists, effect: NoSchedule }
        - { key: gpu-experiment,    operator: Exists, effect: NoSchedule }
      initContainers:
        - name: model-sync
          image: amazon/aws-cli:2.17.0
          env:
            - { name: AWS_REGION, value: us-west-2 }
            - { name: S3_URI,     value: s3://raj-ai-lab-eks-cilium-model-weights/mixtral-8x7b-instruct-awq/ }
            - { name: MODEL_PATH, value: /model }
          command: ["/bin/sh", "-euxc"]
          args:
            - |
              aws configure set default.s3.max_concurrent_requests 32
              aws configure set default.s3.multipart_chunksize 128MB
              aws s3 sync "$S3_URI" "$MODEL_PATH" --no-progress
              ls -la "$MODEL_PATH"
          resources:
            requests: { cpu: "1", memory: "1Gi" }
            limits:   { cpu: "2", memory: "2Gi" }
          volumeMounts:
            - { name: model-cache, mountPath: /model }
      containers:
        - name: vllm
          image: vllm/vllm-openai:placeholder
          args:
            - "--model"
            - "/model"
            - "--served-model-name"
            - "mixtral-8x7b"
            - "--tensor-parallel-size"
            - "1"
            - "--quantization"
            - "awq"
            - "--dtype"
            - "half"
            - "--max-model-len"
            - "16384"
            - "--gpu-memory-utilization"
            - "0.88"
            - "--enforce-eager"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          ports:
            - { name: http, containerPort: 8000 }
          env:
            - { name: HF_HUB_OFFLINE,       value: "1" }
            - { name: TRANSFORMERS_OFFLINE, value: "1" }
            - { name: OTEL_SERVICE_NAME,    value: vllm-mixtral-8x7b }
          resources:
            requests: { nvidia.com/gpu: "1", cpu: "2", memory: "12Gi" }
            limits:   { nvidia.com/gpu: "1", cpu: "3", memory: "28Gi" }
          startupProbe:  { httpGet: { path: /health, port: http }, initialDelaySeconds: 30, periodSeconds: 10, failureThreshold: 60 }
          readinessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 10, failureThreshold: 3 }
          livenessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 30, failureThreshold: 3 }
          volumeMounts:
            - { name: model-cache, mountPath: /model, readOnly: true }
            - { name: shm,         mountPath: /dev/shm }
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-cache-mixtral-8x7b
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 2Gi }

---
# Llama 3.2 11B Vision Instruct on 1× NVIDIA L40S 48GB (g6e.xlarge).
# Multimodal demo — accepts image URLs + text in the OpenAI-compat
# /v1/chat/completions schema (messages[].content can be a list with
# text and image_url parts). Lower max-model-len because image tokens
# eat context (each image ~1600-6400 tokens depending on resolution).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-llama-vision-11b
  labels:
    app: vllm-llama-vision-11b
    vllm-model: llama-3.2-11b-vision
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-llama-vision-11b
  template:
    metadata:
      labels:
        app: vllm-llama-vision-11b
        vllm-model: llama-3.2-11b-vision
    spec:
      serviceAccountName: vllm
      enableServiceLinks: false
      nodeSelector:
        node.kubernetes.io/instance-type: g6e.xlarge
      tolerations:
        - { key: nvidia.com/gpu,    operator: Exists, effect: NoSchedule }
        - { key: gpu-experiment,    operator: Exists, effect: NoSchedule }
      initContainers:
        - name: model-sync
          image: amazon/aws-cli:2.17.0
          env:
            - { name: AWS_REGION, value: us-west-2 }
            - { name: S3_URI,     value: s3://raj-ai-lab-eks-cilium-model-weights/llama-3.2-11b-vision-instruct/ }
            - { name: MODEL_PATH, value: /model }
          command: ["/bin/sh", "-euxc"]
          args:
            - |
              aws configure set default.s3.max_concurrent_requests 32
              aws configure set default.s3.multipart_chunksize 128MB
              aws s3 sync "$S3_URI" "$MODEL_PATH" --no-progress
              ls -la "$MODEL_PATH"
          resources:
            requests: { cpu: "1", memory: "1Gi" }
            limits:   { cpu: "2", memory: "2Gi" }
          volumeMounts:
            - { name: model-cache, mountPath: /model }
      containers:
        - name: vllm
          image: vllm/vllm-openai:placeholder
          args:
            - "--model"
            - "/model"
            - "--served-model-name"
            - "llama-3.2-vision"
            - "--tensor-parallel-size"
            - "1"
            - "--dtype"
            - "half"
            - "--max-model-len"
            - "4096"
            - "--max-num-seqs"
            - "8"
            - "--gpu-memory-utilization"
            - "0.85"
            - "--enforce-eager"
            - "--limit-mm-per-prompt"
            - "image=1"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          ports:
            - { name: http, containerPort: 8000 }
          env:
            - { name: HF_HUB_OFFLINE,       value: "1" }
            - { name: TRANSFORMERS_OFFLINE, value: "1" }
            - { name: OTEL_SERVICE_NAME,    value: vllm-llama-vision-11b }
          resources:
            requests: { nvidia.com/gpu: "1", cpu: "2", memory: "12Gi" }
            limits:   { nvidia.com/gpu: "1", cpu: "3", memory: "28Gi" }
          startupProbe:  { httpGet: { path: /health, port: http }, initialDelaySeconds: 30, periodSeconds: 10, failureThreshold: 60 }
          readinessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 10, failureThreshold: 3 }
          livenessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 30, failureThreshold: 3 }
          volumeMounts:
            - { name: model-cache, mountPath: /model, readOnly: true }
            - { name: shm,         mountPath: /dev/shm }
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-cache-llama-vision-11b
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 2Gi }

---
# Llama 3.1 405B Instruct AWQ on 8× NVIDIA A100 40GB (p4d.24xlarge).
# SOTA open-weight flagship. AWQ-quantized ~230 GB distributes across
# 8× 40GB A100s at TP=8 (~29 GB per GPU + KV cache).
#
# Storage model (Phase #52b, 2026-04-29): switched FROM S3 Mountpoint
# TO a gp3 PVC populated by a one-shot Phase #52a staging Job. The
# old vllm-cache-llama-405b PVC + vllm-405b-s3mp PV
# (pv-llama-405b.yaml) remain in the repo as the historical
# alternative; this Deployment now mounts vllm-cache-llama-405b-gp3
# (pvcs-models.yaml) which holds the same 205 GiB of safetensors
# pre-loaded on local EBS.
#
# Trade-off chosen for the lab's remaining 2-month lifetime
# (cluster destruction planned end-of-June):
#   gp3 PVC      ~$20/mo storage,  ~3 min cold-start (local NVMe)
#   S3 Mountpoint ~$5.30/mo storage, ~6 min cold-start (mmap'd S3)
# Net cost over 2 months: ~$30 extra storage in exchange for 3 min
# faster cold-start. Worth it given expected demo cadence.
#
# To revert to S3 Mountpoint: change claimName below back to
# vllm-cache-llama-405b. Both PVs persist in the cluster, so the
# revert is a one-line edit + re-sync, no data movement.
#
# CAUTION: p4d.24xlarge is ~$32.77/hr. A full demo cycle (90s provision
# + 3 min cold-start + 5 min inference + 30s consolidate ≈ 10 min) is
# ~$5.50. The variant intentionally uses p4d instead of p5 ($98/hr) unless
# you override the nodeSelector — A100 is plenty for this workload.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-llama-405b
  labels:
    app: vllm-llama-405b
    vllm-model: llama-3.1-405b-awq
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-llama-405b
  template:
    metadata:
      labels:
        app: vllm-llama-405b
        vllm-model: llama-3.1-405b-awq
    spec:
      serviceAccountName: vllm
      enableServiceLinks: false
      # Phase #54b: nodeSelector loosened from instance-type pin
      # to `workload: gpu-experiment` so Karpenter picks whichever
      # 8-GPU instance (p4d.24xlarge / p5.48xlarge) has capacity.
      #
      # Phase #54d (2026-04-29): added pod-level AZ pin to
      # us-west-2a because the deployment's PVC is now
      # vllm-cache-llama-405b-gp3-usw2a (gp3 EBS in us-west-2a).
      # Without this pin, Karpenter could place the pod in any AZ
      # the gpu-experiments NodePool allows (Phase #54c widened
      # that to all 4 us-west-2 AZs), and the gp3 PVC would
      # FailedAttachVolume cross-AZ.
      #
      # To swap to the us-west-2c gp3 PVC instead (when us-west-2c
      # capacity returns): change claimName below from
      # vllm-cache-llama-405b-gp3-usw2a → vllm-cache-llama-405b-gp3
      # AND topology.kubernetes.io/zone below from us-west-2a →
      # us-west-2c. Both PVCs persist in the cluster for this swap.
      #
      # To fall back to S3-Mountpoint (multi-AZ, slow cold-start):
      # change claimName to vllm-cache-llama-405b, drop the
      # topology.kubernetes.io/zone pin, restore readOnly: true on
      # the volumeMount.
      nodeSelector:
        # 2026-05-03: switched from `workload: gpu-experiment` (a label
        # the cluster's NodePools don't actually advertise — was a stale
        # selector that never got tested because this Deployment hadn't
        # been scaled to >0 since the rename of gpu-experiments NodePool's
        # ec2nodeclass labels). Aligning with the working pattern used by
        # the 8B and other GPU Deployments in this manifest.
        karpenter.sh/nodepool: gpu-experiments
        # AZ pin tried 2026-05-03: us-west-2c (no capacity) →
        # us-west-2a (no capacity) → us-west-2b. AWS is tight on
        # p4d/p5 in us-west-2 today. us-west-2b's pre-staged PVC
        # vllm-cache-llama-405b-gp3-usw2b is the third try.
        # If 2b is also dry, fall back to S3 Mountpoint (multi-AZ,
        # vllm-cache-llama-405b — slower cold-start but works
        # against any AZ that has capacity).
        topology.kubernetes.io/zone: us-west-2b
      tolerations:
        - { key: nvidia.com/gpu,    operator: Exists, effect: NoSchedule }
        - { key: gpu-experiment,    operator: Exists, effect: NoSchedule }
      # No init container — the gp3 PVC was pre-populated by the
      # Phase #52a staging Job (a one-shot kubectl apply, not in
      # this manifest). vLLM reads weights from local EBS at pod
      # start. If the PVC is ever destroyed, re-stage with
      # /tmp/job-stage-405b.yaml or the Phase #52a recipe in the
      # pvcs-models.yaml header.
      containers:
        - name: vllm
          image: vllm/vllm-openai:placeholder
          args:
            - "--model"
            - "/model"
            - "--served-model-name"
            - "llama-3.1-405b"
            - "--tensor-parallel-size"
            - "8"
            - "--quantization"
            - "awq"
            - "--dtype"
            - "half"
            - "--max-model-len"
            - "8192"
            - "--gpu-memory-utilization"
            - "0.85"
            - "--enforce-eager"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          ports:
            - { name: http, containerPort: 8000 }
          env:
            - { name: HF_HUB_OFFLINE,       value: "1" }
            - { name: TRANSFORMERS_OFFLINE, value: "1" }
            - { name: NCCL_DEBUG,           value: "WARN" }
            - { name: OTEL_SERVICE_NAME,    value: vllm-llama-405b }
          resources:
            requests: { nvidia.com/gpu: "8", cpu: "16", memory: "128Gi" }
            limits:   { nvidia.com/gpu: "8", cpu: "64", memory: "400Gi" }
          # Longer startup grace than other variants. Phase #52b
          # cut cold-start from ~6 min (S3 Mountpoint mmap) to ~3
          # min (local NVMe reads from gp3 PVC). Keeping the
          # generous 20-min budget anyway — vLLM's safetensors
          # load + 8-GPU KV-cache warmup can spike past 5 min on
          # an unfavorable hardware draw, and a stuck startup is
          # worse than a generous timeout.
          startupProbe:  { httpGet: { path: /health, port: http }, initialDelaySeconds: 60, periodSeconds: 10, failureThreshold: 120 }
          readinessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 10, failureThreshold: 3 }
          livenessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 30, failureThreshold: 3 }
          volumeMounts:
            # Phase #54d: readOnly dropped — gp3 RWO doesn't
            # enforce read-only at the volume layer. Same
            # rationale as Phase #52b before the temporary #54c
            # revert.
            - { name: model-cache, mountPath: /model }
            - { name: shm,         mountPath: /dev/shm }
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            # Phase #54d (2026-04-29): pinned to the new
            # us-west-2a gp3 PVC. AWS InsufficientInstanceCapacity
            # for both p4d AND p5 in us-west-2c during the smoke
            # made the original us-west-2c gp3 PVC unusable until
            # capacity returns there. Phase #54d staged a sibling
            # PVC in us-west-2a for the same model weights.
            #
            # Both gp3 PVCs persist in the cluster (~$40/mo
            # combined, ~$80 over the lab's remaining 2 months).
            # Operator can swap by editing claimName + the
            # topology.kubernetes.io/zone selector above.
            #
            # See the nodeSelector comment above for the full
            # claimName/zone-pin swap recipe + the S3-Mountpoint
            # fallback path (vllm-cache-llama-405b, multi-AZ).
            # 2026-05-03: swapped 2c → 2a (no capacity) → 2b. The
            # third pre-staged PVC vllm-cache-llama-405b-gp3-usw2b.
            claimName: vllm-cache-llama-405b-gp3-usw2b
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 16Gi }

---
# DeepSeek-R1-Distill-Llama-70B AWQ-INT4 on 4× NVIDIA L4 24GB
# (g6.12xlarge, ~$4.60/hr). Same architecture + tensor shapes as
# Llama 3.3 70B AWQ — by deliberate construction. The DeepSeek
# distillation kept Llama 3.3 70B's structure unchanged, only the
# weights are re-trained with reasoning-chain supervision from R1.
#
# Demo angle: scale this up alongside (or instead of) the default
# `vllm` Deployment, send identical prompts to each, observe in
# Langfuse how this model's responses include <think>...</think>
# reasoning blocks before the final answer. Same hardware, same
# serving args — the only experimental variable is the model
# weights.
#
# Why g6.12xlarge over g5.12xlarge: L4 is ~19% cheaper than A10G
# for equivalent VRAM, and L4's INT4 tensor-core path runs AWQ
# ~1.7x faster than A10G's. The reasoning-chain output also tends
# to be longer than non-reasoning models, so faster int4 throughput
# directly translates to better demo experience (less waiting for
# the visible <think> block to finish streaming).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-deepseek-r1-70b
  labels:
    app: vllm-deepseek-r1-70b
    vllm-model: deepseek-r1-distill-llama-70b-awq
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-deepseek-r1-70b
  template:
    metadata:
      labels:
        app: vllm-deepseek-r1-70b
        vllm-model: deepseek-r1-distill-llama-70b-awq
    spec:
      serviceAccountName: vllm
      enableServiceLinks: false
      nodeSelector:
        node.kubernetes.io/instance-type: g6.12xlarge
      tolerations:
        - { key: nvidia.com/gpu,    operator: Exists, effect: NoSchedule }
        - { key: gpu-experiment,    operator: Exists, effect: NoSchedule }
      initContainers:
        - name: model-sync
          image: amazon/aws-cli:2.17.0
          env:
            - { name: AWS_REGION, value: us-west-2 }
            - { name: S3_URI,     value: s3://raj-ai-lab-eks-cilium-model-weights/deepseek-r1-distill-llama-70b-awq/ }
            - { name: MODEL_PATH, value: /model }
          command: ["/bin/sh", "-euxc"]
          args:
            - |
              aws configure set default.s3.max_concurrent_requests 32
              aws configure set default.s3.multipart_chunksize 128MB
              aws s3 sync "$S3_URI" "$MODEL_PATH" --no-progress
              ls -la "$MODEL_PATH"
          resources:
            requests: { cpu: "2", memory: "2Gi" }
            limits:   { cpu: "8", memory: "4Gi" }
          volumeMounts:
            - { name: model-cache, mountPath: /model }
      containers:
        - name: vllm
          image: vllm/vllm-openai:placeholder
          args:
            - "--model"
            - "/model"
            - "--served-model-name"
            - "deepseek-r1-distill-llama-70b"
            - "--tensor-parallel-size"
            - "4"
            - "--quantization"
            - "awq"
            - "--dtype"
            - "half"
            # Reasoning models burn through context with <think> blocks
            # before the answer — give them more room than the dense
            # completion variants. 16k is conservative; bump to 32768
            # if KV-cache headroom on 4× L4 (96 GB total VRAM) allows.
            - "--max-model-len"
            - "16384"
            - "--gpu-memory-utilization"
            - "0.92"
            - "--enforce-eager"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          ports:
            - { name: http, containerPort: 8000 }
          env:
            - { name: HF_HUB_OFFLINE,       value: "1" }
            - { name: TRANSFORMERS_OFFLINE, value: "1" }
            - { name: NCCL_DEBUG,           value: "WARN" }
            - { name: OTEL_SERVICE_NAME,    value: vllm-deepseek-r1-70b }
          resources:
            requests:
              nvidia.com/gpu: "4"
              cpu: "8"
              memory: "64Gi"
            limits:
              nvidia.com/gpu: "4"
              cpu: "32"
              memory: "120Gi"
          startupProbe:  { httpGet: { path: /health, port: http }, initialDelaySeconds: 30, periodSeconds: 10, failureThreshold: 60 }
          readinessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 10, failureThreshold: 3 }
          livenessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 30, failureThreshold: 3 }
          volumeMounts:
            - { name: model-cache, mountPath: /model, readOnly: true }
            - { name: shm,         mountPath: /dev/shm }
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-cache-deepseek-r1-70b
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 8Gi }

---
# bge-m3 (BAAI) embedding model on 1× NVIDIA L4 24GB (g6.xlarge).
# Multilingual dense+sparse+multivector retriever; vLLM's --task=embedding
# mode exposes the dense path via /v1/embeddings (1024 dims, cosine).
#
# Hardware sizing: bge-m3 is ~2.3 GB on disk and ~5 GB in VRAM with KV
# cache enabled — fits on the cheapest viable GPU (L4 24 GB) with room
# to spare. g6.xlarge at $0.80/hr is ~$1/hr cheaper than g6e.xlarge
# (L40S, $1.86/hr) for what amounts to identical embedding throughput
# at this VRAM footprint — the L40S's larger VRAM, more SMs, and INT4
# tensor cores aren't load-bearing for an embedding model.
#
# JIT-scaled (replicas=0 in git): same pattern as the other generator
# tiers. Considered always-on (replicas=1) but the $580/month idle
# burn isn't justified for a single-user portfolio lab. Operator
# scales up before a demo session via:
#   kubectl -n llm scale deploy/vllm-bge-m3 --replicas=1
# then back to 0 after — Karpenter consolidates the g6.xlarge within
# ~30s, idle GPU spend returns to $0. ArgoCD's vllm_app
# ignoreDifferences covers vllm-bge-m3 so the manual scale stays.
# The cost-vs-latency tradeoff: every fresh ingestion-service
# /upload pays a ~3 min cold-start tax for the embedder unless an
# operator has pre-warmed it.
#
# Cold start: ~3 min total (Karpenter ~90s + node boot ~60s + image
# pull cached + aws s3 sync 2.3 GB ~10s + vLLM load ~30s). Embedding
# throughput is 5-10x faster per token than chat generation (no
# autoregressive sampling).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-bge-m3
  labels:
    app: vllm-bge-m3
    vllm-model: bge-m3
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-bge-m3
  template:
    metadata:
      labels:
        app: vllm-bge-m3
        vllm-model: bge-m3
    spec:
      serviceAccountName: vllm
      enableServiceLinks: false
      nodeSelector:
        node.kubernetes.io/instance-type: g6.xlarge
      tolerations:
        - { key: nvidia.com/gpu,    operator: Exists, effect: NoSchedule }
        - { key: gpu-experiment,    operator: Exists, effect: NoSchedule }
      initContainers:
        - name: model-sync
          image: amazon/aws-cli:2.17.0
          env:
            - { name: AWS_REGION, value: us-west-2 }
            - { name: S3_URI,     value: s3://raj-ai-lab-eks-cilium-model-weights/bge-m3/ }
            - { name: MODEL_PATH, value: /model }
          command: ["/bin/sh", "-euxc"]
          args:
            - |
              aws configure set default.s3.max_concurrent_requests 32
              aws configure set default.s3.multipart_chunksize 128MB
              aws s3 sync "$S3_URI" "$MODEL_PATH" --no-progress
              ls -la "$MODEL_PATH"
          resources:
            requests: { cpu: "1", memory: "1Gi" }
            limits:   { cpu: "2", memory: "2Gi" }
          volumeMounts:
            - { name: model-cache, mountPath: /model }
      containers:
        - name: vllm
          image: vllm/vllm-openai:placeholder
          args:
            - "--model"
            - "/model"
            - "--served-model-name"
            - "bge-m3"
            # --task=embedding: vLLM's mode for sentence-transformer-style
            # models. Exposes /v1/embeddings (OpenAI-compatible) instead
            # of /v1/chat/completions. No autoregressive sampling — one
            # forward pass per input, returns the [CLS] pooled vector.
            - "--task"
            - "embedding"
            - "--tensor-parallel-size"
            - "1"
            - "--dtype"
            - "half"
            - "--max-model-len"
            - "8192"
            - "--gpu-memory-utilization"
            - "0.85"
            - "--enforce-eager"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          ports:
            - { name: http, containerPort: 8000 }
          env:
            - { name: HF_HUB_OFFLINE,       value: "1" }
            - { name: TRANSFORMERS_OFFLINE, value: "1" }
            - { name: OTEL_SERVICE_NAME,    value: vllm-bge-m3 }
          resources:
            requests: { nvidia.com/gpu: "1", cpu: "2", memory: "4Gi" }
            limits:   { nvidia.com/gpu: "1", cpu: "3", memory: "12Gi" }
          startupProbe:  { httpGet: { path: /health, port: http }, initialDelaySeconds: 30, periodSeconds: 10, failureThreshold: 60 }
          readinessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 10, failureThreshold: 3 }
          livenessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 30, failureThreshold: 3 }
          volumeMounts:
            - { name: model-cache, mountPath: /model, readOnly: true }
            - { name: shm,         mountPath: /dev/shm }
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-cache-bge-m3
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 1Gi }

---
# bge-reranker-v2-m3 cross-encoder, served by HuggingFace
# text-embeddings-inference (TEI) — NOT vLLM. vLLM is for generative
# LLMs; cross-encoder rerankers (which score query+doc pairs, not
# generate text) are TEI's wheelhouse.
#
# Why a reranker on top of bge-m3 dense retrieval:
#   bge-m3 (bi-encoder) embeds query and docs independently, then
#   cosine-similarity-ranks. Fast but loses cross-attention nuance
#   between query and candidate. A cross-encoder reranker re-runs
#   the top-N candidates through a transformer that sees both
#   query+doc concatenated and outputs a relevance score. ~10-25
#   percentage-point precision boost on retrieval@K, at the cost
#   of ~50 ms per batch. Worth it for any RAG that cares about
#   answer quality.
#
# Why TEI not vLLM:
#   vLLM serves causal LMs. bge-reranker is a SequenceClassification
#   model — different API, different inference path. TEI (the
#   companion to text-generation-inference) handles both embedders
#   and rerankers; gRPC/HTTP API; Rust-based, very fast on small
#   models.
#
# Why the Service name keeps the `vllm-*` prefix:
#   Conventional in this repo — `vllm-<model>` reads as "model
#   server" regardless of underlying engine. Easier to grep.
#   See services-models.yaml for the matching ClusterIP.
#
# Why direct HF Hub download (no S3 stage):
#   Model is ~590 MB; first pull is ~30 sec over the VPC endpoint
#   to HF's CDN. Not worth a manual `aws s3 sync` pre-stage step
#   for a model this small.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-bge-reranker
  labels:
    app: vllm-bge-reranker
    vllm-model: bge-reranker-v2-m3
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-bge-reranker
  template:
    metadata:
      labels:
        app: vllm-bge-reranker
        vllm-model: bge-reranker-v2-m3
    spec:
      serviceAccountName: vllm
      enableServiceLinks: false
      nodeSelector:
        karpenter.sh/nodepool: gpu-experiments
      tolerations:
        - { key: nvidia.com/gpu,    operator: Exists, effect: NoSchedule }
        - { key: gpu-experiment,    operator: Exists, effect: NoSchedule }
      # First TEI smoke (2026-04-29) failed with `Error: Could not
      # download model artifacts: relative URL without a base` — TEI
      # 1.5's bundled hf-hub Rust crate (0.3.2) has a URL-redirect
      # parsing bug that surfaces on HF's CDN-LFS host. Switching to
      # the lab's standard model-weights pre-stage pattern (S3 sync
      # at pod start, then run TEI with --model-id pointing at the
      # local path) avoids HF Hub at runtime entirely. Same shape as
      # every other vllm-* Deployment in this file.
      initContainers:
        - name: model-sync
          image: amazon/aws-cli:2.17.0
          env:
            - { name: AWS_REGION, value: us-west-2 }
            - { name: S3_URI,     value: s3://raj-ai-lab-eks-cilium-model-weights/bge-reranker-v2-m3/ }
            - { name: MODEL_PATH, value: /model }
          command: ["/bin/sh", "-euxc"]
          args:
            - |
              aws configure set default.s3.max_concurrent_requests 32
              aws configure set default.s3.multipart_chunksize 128MB
              aws s3 sync "$S3_URI" "$MODEL_PATH" --no-progress
              ls -la "$MODEL_PATH"
          resources:
            requests: { cpu: "500m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "512Mi" }
          volumeMounts:
            - { name: model-cache, mountPath: /model }
      containers:
        - name: tei
          # TEI image with CUDA support for L4 / Ampere+ GPUs.
          image: ghcr.io/huggingface/text-embeddings-inference:cuda-1.5
          imagePullPolicy: IfNotPresent
          args:
            # Local path (populated by model-sync init container).
            # TEI accepts a directory containing config.json +
            # weights as --model-id and skips the HF Hub download.
            - "--model-id"
            - "/model"
            - "--port"
            - "8000"
            # TEI auto-detects whether this is an embedder or a
            # reranker from the model's config.json
            # (architectures: ["XLMRobertaForSequenceClassification"]).
          ports:
            - { name: http, containerPort: 8000 }
          resources:
            # The model is ~2.2 GB on disk; TEI loads it into host RAM
            # before copying to GPU, which peaks at ~4-6 GB total
            # (model + tokenizer + Rust + CUDA driver overhead). 4Gi
            # limit was too tight — first deploy hit OOMKilled (exit
            # 137) at the FlashBert init step. Bumped to 8Gi to give
            # comfortable headroom.
            #
            # GPU-side: bge-reranker-v2-m3 fits in <2 GB VRAM. L4's 24
            # GB is massive overprovisioning, but g6.xlarge is the
            # cheapest Ampere+ instance — paying the GPU price for
            # the smallest available is fine.
            requests: { nvidia.com/gpu: "1", cpu: "1", memory: "4Gi" }
            limits:   { nvidia.com/gpu: "1", cpu: "2", memory: "8Gi" }
          startupProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 60   # ~5 min headroom for first GPU warmup
          readinessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 10, failureThreshold: 3 }
          livenessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 30, failureThreshold: 3 }
          volumeMounts:
            - { name: model-cache, mountPath: /model, readOnly: true }
      volumes:
        - name: model-cache
          # emptyDir is fine here — the model is ~2.2 GB; first sync
          # from S3 is ~10 sec on the VPC endpoint. Per-pod re-sync
          # on cold start is acceptable for a scale-to-zero workload.
          # Switch to a PVC if cold-start latency becomes a concern.
          emptyDir: { sizeLimit: 4Gi }

---
# Llama Guard 3 8B (FP16) on 1× NVIDIA L4 24GB (g6.xlarge).
#
# Used by langgraph-service as a pre/post content-safety filter. Llama
# Guard 3 is a Llama-3-family classifier fine-tuned on Meta's hazard
# taxonomy: 14 categories covering violent crimes, non-violent crimes,
# sex-related crimes, child sexual exploitation, defamation, specialized
# advice, privacy, intellectual property, indiscriminate weapons, hate,
# suicide/self-harm, sexual content, elections, code-interpreter abuse.
#
# Inference pattern (from Meta's model card):
#   POST /v1/chat/completions with messages=[...] (the conversation to
#   score). Llama Guard's tokenizer ships a chat template that wraps
#   the input in a safety-categories prompt and asks the model to
#   produce 'safe' or 'unsafe\n<comma-separated S-codes>'. vLLM applies
#   the chat template automatically, so the langgraph-service caller
#   doesn't need to reconstruct the prompt format.
#
# Prerequisite (one-time):
#   The model weights must be staged to S3 BEFORE this Deployment can
#   start successfully. The model-sync init container does
#   `aws s3 sync s3://.../llama-guard-3-8b/` and will fail-fast if the
#   prefix is empty. Stage via a one-shot K8s Job (per the lab's
#   no-laptop-staging policy) running:
#     huggingface-cli download meta-llama/Llama-Guard-3-8B \
#       --local-dir /tmp/lg && \
#     aws s3 sync /tmp/lg s3://raj-ai-lab-eks-cilium-model-weights/llama-guard-3-8b/
#   See the model-stage Job pattern in training/ for a template.
#
# Why a separate model (not folded into vllm-llama-8b's pod):
#   Different chat template — Llama Guard's tokenizer config has a
#   safety-categories template that conflicts with Llama 3.1 Instruct's
#   default. vLLM picks one tokenizer per pod, so they need separate
#   serving processes. Also: Llama Guard runs short prompts (~500 in,
#   ~50 out) and benefits from low max-model-len, while the chat tier
#   wants full 8K context. Different model = different tuning.
#
# Cost: $0.55/hr on g6.xlarge when up. Default replicas=0 (operator
# scales up before a session that needs safety-filtering). Idle cost: $0.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-llama-guard-3-8b
  labels:
    app: vllm-llama-guard-3-8b
    vllm-model: llama-guard-3-8b
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-llama-guard-3-8b
  template:
    metadata:
      labels:
        app: vllm-llama-guard-3-8b
        vllm-model: llama-guard-3-8b
    spec:
      serviceAccountName: vllm
      enableServiceLinks: false
      # Llama Guard 3 8B FP16 fits in ~16 GB VRAM with 4K context;
      # g6.xlarge's L4 24GB is the cheapest GPU that holds it
      # comfortably. Karpenter picks from the gpu-experiments
      # allowlist — same scheduling as bge-m3.
      nodeSelector:
        karpenter.sh/nodepool: gpu-experiments
      tolerations:
        - { key: nvidia.com/gpu,    operator: Exists, effect: NoSchedule }
        - { key: gpu-experiment,    operator: Exists, effect: NoSchedule }
      initContainers:
        - name: model-sync
          image: amazon/aws-cli:2.17.0
          env:
            - { name: AWS_REGION, value: us-west-2 }
            - { name: S3_URI,     value: s3://raj-ai-lab-eks-cilium-model-weights/llama-guard-3-8b/ }
            - { name: MODEL_PATH, value: /model }
          command: ["/bin/sh", "-euxc"]
          args:
            - |
              aws configure set default.s3.max_concurrent_requests 32
              aws configure set default.s3.multipart_chunksize 128MB
              aws s3 sync "$S3_URI" "$MODEL_PATH" --no-progress
              ls -la "$MODEL_PATH"
          resources:
            requests: { cpu: "1", memory: "1Gi" }
            limits:   { cpu: "2", memory: "2Gi" }
          volumeMounts:
            - { name: model-cache, mountPath: /model }
      containers:
        - name: vllm
          image: vllm/vllm-openai:placeholder
          args:
            - "--model"
            - "/model"
            - "--served-model-name"
            - "llama-guard-3-8b"
            - "--tensor-parallel-size"
            - "1"
            - "--dtype"
            - "half"
            # Llama Guard prompts are short by design — the chat
            # template wraps input in ~500 tokens of safety categories
            # plus the user input itself (~100-500 tokens for typical
            # chat). 4096 is comfortable headroom; longer wastes KV
            # cache memory we could devote to throughput.
            - "--max-model-len"
            - "4096"
            - "--gpu-memory-utilization"
            - "0.85"
            - "--enforce-eager"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            # Deliberately NO --enable-lora, NO --enable-auto-tool-choice,
            # NO --tool-call-parser — Llama Guard is a classifier, not
            # a generative agent. Tool-call flags would confuse the
            # safety-categories chat template.
          ports:
            - { name: http, containerPort: 8000 }
          env:
            - { name: HF_HUB_OFFLINE,       value: "1" }
            - { name: TRANSFORMERS_OFFLINE, value: "1" }
            - { name: OTEL_SERVICE_NAME,    value: vllm-llama-guard-3-8b }
          resources:
            requests: { nvidia.com/gpu: "1", cpu: "2", memory: "8Gi" }
            limits:   { nvidia.com/gpu: "1", cpu: "3", memory: "20Gi" }
          startupProbe:  { httpGet: { path: /health, port: http }, initialDelaySeconds: 30, periodSeconds: 10, failureThreshold: 60 }
          readinessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 10, failureThreshold: 3 }
          livenessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 30, failureThreshold: 3 }
          volumeMounts:
            - { name: model-cache, mountPath: /model, readOnly: true }
            - { name: shm,         mountPath: /dev/shm }
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-cache-llama-guard-3-8b
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 2Gi }

---
# Phase #81d: Distilled Llama-3.2-1B student. Serves the QLoRA
# adapter trained in Phase #81c (distillation of llama-3.3-70b
# teacher outputs) on top of NousResearch/Llama-3.2-1B base. The
# routing tier ("trivial-fast") goes here in Phase #81e — most
# trivial-tier traffic (greetings already short-circuit via
# Phase #82 social filter, but the long tail of "what is X"
# style trivial questions) routes here for ~5-10× cost reduction
# vs the 8B.
#
# Stays at replicas=0 in this scaffolding commit because Phase #81c
# hasn't run yet — the s3://raj-ai-lab-eks-cilium-training/adapters/
# llama-3.2-1b-distilled/ path doesn't exist until then. Scaling up
# pre-#81c would fail in the adapter-sync init container.
#
# Activation sequence:
#   1. Phase #81b operator runs: dataset-prep Job generates teacher
#      outputs JSONL.
#   2. Phase #81c operator runs: distill PyTorchJob trains adapter,
#      uploads to s3://<bucket>/adapters/llama-3.2-1b-distilled/.
#   3. Pre-stage base weights (one-time):
#        aws s3 sync s3://huggingface-models-public/NousResearch/Llama-3.2-1B/ \
#          s3://raj-ai-lab-eks-cilium-model-weights/llama-3.2-1b/
#   4. kubectl -n llm scale deploy/vllm-llama-1b-distilled --replicas=1
#   5. Phase #81e merges to enable routing.
#
# Sized for g6.xlarge (1× L4 24GB). 1B FP16 weights ≈ 2.5GB; LoRA
# adds ~30MB. With prefix caching enabled and gpu-mem-util=0.92,
# KV cache pool is ~18GB → 30+ concurrent decode contexts. Per-pod
# throughput at trivial-tier traffic shape (short prompts, short
# responses) should easily clear 100 concurrent users.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-llama-1b-distilled
  labels:
    app: vllm-llama-1b-distilled
    vllm-model: llama-3.2-1b
spec:
  # Phase #81e (gitops-controlled scaling): replicas=1 because this
  # is the trivial-fast canary tier. langgraph-service routes 5% of
  # trivial-tier traffic here (TRIVIAL_FAST_FRACTION=0.05); the pod
  # needs to be always-warm to avoid 503s on canary requests. Cost:
  # ~$0.80/hr always-on g6.xlarge L4. Toggle this via gitops commit:
  # set replicas to 0 to disable the canary, push, ArgoCD syncs.
  #
  # 2026-05-02: moved from operator-controlled (Phase #81d kubectl
  # scale + ignoreDifferences) to gitops-controlled. The matching
  # change in raj-ai-lab-eks-infra/argocd-apps.tf removes
  # vllm-llama-1b-distilled from /spec/replicas ignoreDifferences,
  # so ArgoCD now enforces this manifest's replicas value. Future
  # scale events: edit this number, commit, push, wait ~3 min for
  # ArgoCD selfHeal sync.
  #
  # Pre-reqs already satisfied (Phase #81b/c/d-prereq):
  #   - base weights at s3://raj-ai-lab-eks-cilium-model-weights/llama-3.2-1b/
  #     (operational Job at llm/operational/base-stage-llama-3.2-1b.yaml)
  #   - LoRA adapter at s3://raj-ai-lab-eks-cilium-training/adapters/
  #     llama-3.2-1b-distilled/ (trained 2026-05-01 23:26 PT,
  #     45 MB, train loss 0.74 / eval loss 0.95)
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-llama-1b-distilled
  template:
    metadata:
      labels:
        app: vllm-llama-1b-distilled
        vllm-model: llama-3.2-1b
    spec:
      serviceAccountName: vllm
      enableServiceLinks: false
      nodeSelector:
        karpenter.sh/nodepool: gpu-experiments
      tolerations:
        - { key: nvidia.com/gpu, operator: Exists, effect: NoSchedule }
        - { key: gpu-experiment, operator: Exists, effect: NoSchedule }
      initContainers:
        - name: model-sync
          image: amazon/aws-cli:2.17.0
          env:
            - { name: AWS_REGION, value: us-west-2 }
            - { name: S3_URI,     value: s3://raj-ai-lab-eks-cilium-model-weights/llama-3.2-1b/ }
            - { name: MODEL_PATH, value: /model }
          command: ["/bin/sh", "-euxc"]
          args:
            - |
              aws configure set default.s3.max_concurrent_requests 32
              aws configure set default.s3.multipart_chunksize 64MB
              aws s3 sync "$S3_URI" "$MODEL_PATH" --no-progress
              ls -la "$MODEL_PATH"
          resources:
            requests: { cpu: "1", memory: "1Gi" }
            limits:   { cpu: "2", memory: "2Gi" }
          volumeMounts:
            - { name: model-cache, mountPath: /model }
        # Pulls the distilled LoRA adapter from the training bucket.
        # WILL FAIL UNTIL PHASE #81C UPLOADS THE ADAPTER. This is
        # why replicas=0 — the Deployment exists for routing
        # scaffolding but isn't safe to scale up until the adapter
        # is in place.
        - name: adapter-sync
          image: amazon/aws-cli:2.17.0
          env:
            - { name: AWS_REGION,   value: us-west-2 }
            - { name: S3_URI,       value: s3://raj-ai-lab-eks-cilium-training/adapters/llama-3.2-1b-distilled/ }
            - { name: ADAPTER_PATH, value: /adapters/distilled }
          command: ["/bin/sh", "-euxc"]
          args:
            - |
              # Same exclude pattern as the 8B+Alpaca adapter-sync
              # (deployment-models.yaml ~line 111): omit tokenizer*
              # and config files so vLLM falls back to the base
              # Llama-3.2-1B tokenizer's chat_template.
              aws s3 sync "$S3_URI" "$ADAPTER_PATH" --no-progress \
                --exclude "tokenizer*" \
                --exclude "special_tokens_map.json" \
                --exclude "config.json" \
                --exclude "README.md"
              ls -la "$ADAPTER_PATH"
          resources:
            requests: { cpu: "500m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "512Mi" }
          volumeMounts:
            - { name: adapter-cache, mountPath: /adapters/distilled }
      containers:
        - name: vllm
          image: vllm/vllm-openai:placeholder
          args:
            - "--model"
            - "/model"
            - "--served-model-name"
            - "llama-3.2-1b"
            - "--tensor-parallel-size"
            - "1"
            - "--dtype"
            - "half"
            # 1B fits comfortably with 8K context on L4. If we want
            # to share more system-prompt prefix with the 8B's 8192-
            # token cache, keeping these aligned is convenient.
            - "--max-model-len"
            - "8192"
            # Same GPU-mem-util reasoning as Phase #80a on the 8B.
            # 1B's smaller weights (~2.5GB on the L4 24GB) leave a
            # huge KV cache pool — 0.92 means ~18GB available for
            # KV + prefix cache.
            - "--gpu-memory-utilization"
            - "0.92"
            # Phase #80a: prefix caching. Trivial-tier traffic has
            # high system-prompt overlap (every request shares the
            # same agent system prompt + plan + RAG context) so
            # hit rate should be ~95%+ once warm. Higher than 8B's
            # because trivial-tier prompts have less unique
            # variability.
            - "--enable-prefix-caching"
            - "--enforce-eager"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            # LoRA serving. The distilled adapter overrides the
            # raw Llama-3.2-1B base behavior to match the 70B
            # teacher's response style + content. Without the
            # adapter loaded, the base model is a Llama-3.2-1B
            # raw chat model — usable but not domain-aligned.
            - "--enable-lora"
            - "--max-loras"
            - "1"
            # Same r=16 as Phase #81's Axolotl config
            # (training/configs/llama-3.2-1b-distilled.yaml).
            - "--max-lora-rank"
            - "16"
            - "--lora-modules"
            - "llama-3.2-1b-distilled=/adapters/distilled"
            # Tool calling support same as the 8B — Llama 3.x family
            # uses identical tool-call format. Critical for
            # trivial-fast tier: simple queries (calculator, time)
            # still want tool support.
            - "--enable-auto-tool-choice"
            - "--tool-call-parser"
            - "llama3_json"
            # Phase #81d chat-template fix. NousResearch/Llama-3.2-1B
            # is the BASE variant (not Instruct), so its tokenizer
            # ships no chat_template. Without this flag vLLM's
            # /v1/chat/completions returns HTTP 400 ("As of
            # transformers v4.44, default chat template is no longer
            # allowed..."). Mounted from the chat-template-llama3
            # ConfigMap (llm/base/chat-template-llama3.yaml).
            #
            # Tools-aware variant of this template is a follow-up;
            # current template handles basic system/user/assistant
            # turns but doesn't render tools={...} into the prompt,
            # so tool calls won't reach the model in chat-completions
            # requests until the template is upgraded.
            - "--chat-template"
            - "/chat-templates/llama3.jinja"
          ports:
            - { name: http, containerPort: 8000 }
          env:
            - { name: HF_HUB_OFFLINE,                value: "1" }
            - { name: TRANSFORMERS_OFFLINE,          value: "1" }
            - { name: OTEL_SERVICE_NAME,             value: vllm-llama-1b-distilled }
            - { name: VLLM_ALLOW_RUNTIME_LORA_UPDATING, value: "True" }
          resources:
            # Sized smaller than the 8B (which needs 28Gi memory limit
            # for the 16GB FP16 weights + load buffer). 1B's peak
            # host RAM during from_pretrained is ~3-4GB.
            requests: { nvidia.com/gpu: "1", cpu: "1", memory: "4Gi" }
            limits:   { nvidia.com/gpu: "1", cpu: "2", memory: "12Gi" }
          startupProbe: { httpGet: { path: /health, port: http }, initialDelaySeconds: 15, periodSeconds: 10, failureThreshold: 30 }
          readinessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 10, failureThreshold: 3 }
          livenessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 30, failureThreshold: 3 }
          volumeMounts:
            - { name: model-cache,    mountPath: /model,             readOnly: true }
            - { name: adapter-cache,  mountPath: /adapters/distilled, readOnly: true }
            - { name: chat-templates, mountPath: /chat-templates,     readOnly: true }
            - { name: shm,            mountPath: /dev/shm }
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-cache-llama-1b-distilled
        - name: adapter-cache
          emptyDir: { sizeLimit: 1Gi }
        # Phase #81d: chat template Jinja file mounted from ConfigMap.
        - name: chat-templates
          configMap:
            name: chat-template-llama3
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 2Gi }
