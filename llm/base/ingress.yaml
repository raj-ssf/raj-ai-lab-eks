apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vllm
  labels:
    app: vllm
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Large prompts + streamed responses — give NGINX headroom.
    nginx.ingress.kubernetes.io/proxy-body-size: "32m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - llm.example.local   # overlay patches with real FQDN
      secretName: vllm-tls
  rules:
    - host: llm.example.local   # overlay patches with real FQDN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vllm
                port:
                  name: http
