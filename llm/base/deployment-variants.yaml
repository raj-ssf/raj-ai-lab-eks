---
# Variant: 8× NVIDIA H100 80GB on p5.48xlarge (~$98.32/hr on-demand).
# Hopper-generation flagship. NVSwitch + 3.2 Tbps EFA backs TP=8.
# 640 GB total VRAM is overkill for quantized 70B but useful as a
# portfolio data-point. H100's FP8 / Transformer Engine isn't
# exercised by AWQ — for that you'd want fp8 quant + newer vLLM.
#
# CAUTION: ~$98/hr. Scale to 1 only for deliberate brief tests, and
# confirm scale-down + node consolidation before walking away.
apiVersion: apps/v1
kind: Deployment
