      containers:
        - name: vllm
          image: vllm/vllm-openai:placeholder
          args:
            - "--model"
            - "/model"
            - "--served-model-name"
            - "llama-3.3-70b"
            - "--tensor-parallel-size"
            - "1"
            - "--quantization"
            - "awq"
            - "--dtype"
            - "half"
            - "--max-model-len"
            - "16384"
            - "--gpu-memory-utilization"
            - "0.85"
            - "--enforce-eager"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          ports:
            - { name: http, containerPort: 8000 }
          env:
            - { name: HF_HUB_OFFLINE,       value: "1" }
            - { name: TRANSFORMERS_OFFLINE, value: "1" }
            - { name: OTEL_SERVICE_NAME,    value: vllm-g6e-1gpu }
          resources:
            requests:
              nvidia.com/gpu: "1"
              cpu: "2"
              memory: "8Gi"
            limits:
              nvidia.com/gpu: "1"
              cpu: "3"
              memory: "28Gi"
          startupProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 30
