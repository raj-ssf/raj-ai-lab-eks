# Hardware-comparison test variants for vLLM 70B AWQ inference.
#
# Each Deployment below pins one specific EC2 instance type via
# nodeSelector. All scale to 0 by default; bring one online with:
#   kubectl -n llm scale deployment vllm-<variant> --replicas=1
# and take it down with the same command setting --replicas=0.
#
# Karpenter's `gpu-experiments` NodePool (see raj-ai-lab-eks-infra/
# karpenter-nodepool.tf) provisions the node. Nodes auto-consolidate
# ~30s after the pod scales down, and auto-expire within 24h even if
# left running.
#
# All variants share the same model weights (Llama 3.3 70B AWQ) via
# the vllm-model-cache PVC. Because the PVC is ReadWriteOnce EBS,
# only ONE variant can be scaled up at a time — a second concurrent
# variant pod will stay Pending with FailedAttachVolume until the
# first scales down. This matches the intended workflow: pick a GPU
# type, test, scale down, pick the next.
#
# Reached via `kubectl port-forward deployment/<name> 8000:8000` —
# no Service or Ingress is provisioned per variant to keep the public
# llm.ekstest.com endpoint pinned to the default `vllm` Deployment.

---
# Variant: 4× NVIDIA T4 16GB on g4dn.12xlarge (~$3.91/hr on-demand).
# Turing-generation perf-floor baseline. AWQ marlin kernel requires
# INT4 tensor cores (Ampere+); on Turing vLLM falls back to the
# slower awq_triton kernel. Worth testing to confirm the floor.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-g4dn-4gpu
  labels:
    app: vllm-g4dn-4gpu
    vllm-variant: g4dn-4gpu
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-g4dn-4gpu
  template:
    metadata:
      labels:
        app: vllm-g4dn-4gpu
        vllm-variant: g4dn-4gpu
    spec:
      serviceAccountName: vllm
      enableServiceLinks: false
      nodeSelector:
        node.kubernetes.io/instance-type: g4dn.12xlarge
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: gpu-experiment
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: model-sync
          image: amazon/aws-cli:2.17.0
          env:
            - name: AWS_REGION
              value: us-west-2
            - name: S3_URI
              value: s3://raj-ai-lab-eks-model-weights/llama-3.3-70b-instruct-awq/
            - name: MODEL_PATH
              value: /model
          command: ["/bin/sh", "-euxc"]
          args:
            - |
              aws configure set default.s3.max_concurrent_requests 32
              aws configure set default.s3.multipart_chunksize 128MB
              aws s3 sync "$S3_URI" "$MODEL_PATH" \
                --exclude ".cache/*" \
                --exclude "*.metadata" \
                --no-progress
              ls -la "$MODEL_PATH"
          resources:
            requests: { cpu: "2", memory: "2Gi" }
            limits:   { cpu: "8", memory: "4Gi" }
          volumeMounts:
            - { name: model-cache, mountPath: /model }
      containers:
        - name: vllm
          image: vllm/vllm-openai:placeholder
          args:
            - "--model"
            - "/model"
            - "--served-model-name"
            - "llama-3.3-70b"
            - "--tensor-parallel-size"
            - "4"
            - "--quantization"
            - "awq"
            - "--dtype"
            - "half"
            - "--max-model-len"
            - "16384"
            - "--gpu-memory-utilization"
            - "0.85"
            - "--enforce-eager"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          ports:
            - { name: http, containerPort: 8000 }
          env:
            - { name: HF_HUB_OFFLINE,       value: "1" }
            - { name: TRANSFORMERS_OFFLINE, value: "1" }
            - { name: NCCL_DEBUG,           value: "WARN" }
            - { name: OTEL_SERVICE_NAME,    value: vllm-g4dn-4gpu }
          resources:
            requests:
              nvidia.com/gpu: "4"
              cpu: "8"
              memory: "64Gi"
            limits:
              nvidia.com/gpu: "4"
              cpu: "32"
              memory: "120Gi"
          startupProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - { name: model-cache, mountPath: /model, readOnly: true }
            - { name: shm,         mountPath: /dev/shm }
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-model-cache
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 8Gi }

---
# Variant: 1× NVIDIA L40S 48GB on g6e.xlarge (~$1.86/hr on-demand).
# Cheapest single-GPU path — 70B AWQ (~38 GB) fits comfortably in
