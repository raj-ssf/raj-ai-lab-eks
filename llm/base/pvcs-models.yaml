# Per-model PVCs — one cache per "hot" model. Separate from
# vllm-model-cache (60 GiB, Llama 3.3 70B AWQ) so each model's
# working set survives across pod restarts without competing for
# space. All gp3 via the cluster-default StorageClass.
#
# Each PVC stays in us-west-2c (the vllm-model-cache zone) because
# EBS is AZ-locked and our gpu-experiments Karpenter NodePool is
# zone-pinned to us-west-2c. If an experiment ever runs in another
# AZ, the PVC binds will fail with FailedAttachVolume and the pod
# stays Pending.
#
# Giant models (Llama 3.1 405B AWQ at ~230 GB):
#
# Phase #52 (2026-04-29): added a gp3 PVC for the 405B alongside
# the existing S3-mountpoint PV (pv-llama-405b.yaml). Trade-off
# decision flipped in favor of the gp3 PVC for the remaining
# ~2-month lab lifetime (cluster destruction planned end-of-June):
#
#   S3-mountpoint  ~$5.30/mo storage, ~6 min cold-start mmap
#   gp3 PVC        ~$20/mo storage,   ~3 min cold-start (faster
#                                     local SSD reads)
#
# Over 2 months that's ~$30 difference. Accepted for faster
# cold-start during the remaining demo window. After cluster
# teardown, both PVs are destroyed; the S3 source bucket is
# untouched, so re-staging into a future cluster is a one-shot
# Job re-run.
#
# Rough idle cost (PVC sum): 30 + 50 + 40 + 250 = 370 GiB ×
# $0.08/GB-mo ≈ $29.60/mo.

---
# Llama 3.1 8B Instruct (FP16) — 16 GB on disk, 30 GiB PVC leaves
# headroom for aws-s3-sync's transient staging files + a bit of slack.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-cache-llama-8b
  labels:
    app: vllm
    model: llama-3.1-8b
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 30Gi

---
# Phase #83c (attempt 2, 2026-05-02): Llama 3.2 1B base weights as
# the SPECULATIVE-DECODING DRAFT for the canonical 70B (`vllm`
# Deployment in deployment.yaml). vLLM loads draft + target in the
# same process, so the draft weights need to live on a PVC the 70B
# pod can mount.
#
# Why this targets the 70B and not the 8B as in attempt-1: vLLM
# 0.7.2's SpecDecodeWorker raises ValueError on any --enable-lora
# target. The 8B has the alpaca LoRA loaded for the tuned-lora
# langgraph tier; the canonical 70B is LoRA-free. Trade-off: the
# 70B is JIT-warmed (replicas=0 by default in scaling.yaml) so
# spec decode only helps when reasoning queries actually warm it.
# See feedback_vllm_spec_decode_lora.md for the full miss.
#
# Source: s3://raj-ai-lab-eks-model-weights/llama-3.2-1b/ (already
# pre-staged by llm/operational/base-stage-llama-3.2-1b.yaml).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-cache-llama-3.2-1b-draft
  labels:
    app: vllm
    model: llama-3.2-1b-draft
    purpose: speculative-decoding-draft
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi

---
# Mixtral 8x7B Instruct AWQ — 28 GB on disk (MoE-quantized), 50 GiB
# PVC. Larger margin for Mixtral's multi-shard safetensors layout.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-cache-mixtral-8x7b
  labels:
    app: vllm
    model: mixtral-8x7b-awq
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 50Gi

---
# Llama 3.2 11B Vision Instruct (FP16) — 22 GB on disk; 40 GiB PVC
# allows for the vision preprocessor weights + future minor version
# bumps without re-provisioning.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-cache-llama-vision-11b
  labels:
    app: vllm
    model: llama-3.2-11b-vision
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 40Gi

---
# DeepSeek-R1-Distill-Llama-70B AWQ-INT4 — ~40 GB on disk; 60 GiB
# PVC matches the sibling vllm-model-cache (Llama 3.3 70B AWQ) so
# the two reasoning-vs-completion 70B-class models have parallel
# storage budgets for head-to-head demo comparisons.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-cache-deepseek-r1-70b
  labels:
    app: vllm
    model: deepseek-r1-distill-llama-70b-awq
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 60Gi

---
# bge-m3 (BAAI) — multilingual dense+sparse+multivector embedding model.
# 2.3 GB on disk; 10 GiB PVC is generous (room for tokenizer assets +
# margin for HF model bumps). Used by ingestion-service for chunk
# embedding and (eventually) by rag-service for query embedding.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-cache-bge-m3
  labels:
    app: vllm
    model: bge-m3
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi

---
# Llama Guard 3 8B (Meta) — content-safety classifier model used by
# langgraph-service's safety_input and safety_output nodes. ~16 GB on
# disk (FP16 weights + tokenizer + chat template). 30 GiB PVC leaves
# headroom for the next minor version (Llama Guard 4 if it lands) and
# any auxiliary files Meta ships alongside the weights.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-cache-llama-guard-3-8b
  labels:
    app: vllm
    model: llama-guard-3-8b
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 30Gi

---
# Phase #52: Llama 3.1 405B Instruct AWQ (4-bit quantized) — 204 GB
# on disk across 47 safetensors shards. 250 GiB PVC matches the
# capacity of the older S3-mountpoint PV (pv-llama-405b.yaml,
# vllm-cache-llama-405b) so vllm-llama-405b can swap between the
# two backings without reconfiguration.
#
# RWO not ROX (the older S3-mountpoint PVC was ROX because S3 has
# inherently multi-reader semantics). gp3 EBS only supports RWO,
# which is fine — the 405B Deployment runs replicas=1 with
# strategy=Recreate, so single-mount is the only access pattern
# we ever need.
#
# Initial population: a one-shot Job (NOT in this manifest) ran
# `aws s3 sync s3://raj-ai-lab-eks-model-weights/
# llama-3.1-405b-instruct-awq/ /model` mounted from this PVC.
# After cluster teardown end-of-June, the source bucket persists;
# re-staging in a future cluster is `kubectl apply` of a similar
# Job.
#
# To swap vllm-llama-405b deployment from S3-mountpoint to gp3:
# edit deployment-models.yaml — claimName from
# vllm-cache-llama-405b to vllm-cache-llama-405b-gp3, drop the
# readOnly: true, accessMode/access stays implicit-RWO.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-cache-llama-405b-gp3
  labels:
    app: vllm
    model: llama-3.1-405b-awq
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 250Gi

---
# Phase #54d: us-west-2a sibling of vllm-cache-llama-405b-gp3.
#
# Adds a second 250 GiB gp3 PVC in us-west-2a so the 405B
# Deployment can land in either AZ (whichever has p4d/p5 capacity
# at scale-up time). Prompted by AWS hitting Insufficient-
# InstanceCapacity for both p4d.24xlarge AND p5.48xlarge in
# us-west-2c during the Phase #54b smoke test, while AWS's error
# message confirmed capacity was available in us-west-2a/b/d.
#
# Sibling PVC (vllm-cache-llama-405b-gp3, us-west-2c) stays so
# we have a fast-path in either AZ. Combined with Phase #54c's
# NodePool widening, the 405B Deployment can now use:
#   - vllm-cache-llama-405b-gp3      + zone-pin us-west-2c (this PVC)
#   - vllm-cache-llama-405b-gp3-usw2a + zone-pin us-west-2a (NEW)
#   - vllm-cache-llama-405b           multi-AZ via S3-Mountpoint
#                                    (slow cold-start fallback)
# Operator picks via deployment-models.yaml's claimName + pod-zone.
#
# Cost: +$20/mo on top of the existing us-west-2c gp3. Total gp3-
# 405B storage now ~$40/mo until lab teardown end-of-June ≈ $80
# remaining. Accepted as the price of multi-AZ resilience for a
# rare-use but expensive-to-fail workload.
#
# Initial population: a one-shot Job ran aws s3 sync from the same
# S3 source bucket into this PVC (Phase #54d staging, completed
# 2026-04-29 in 28 min). 205 GiB present, 47 shards.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-cache-llama-405b-gp3-usw2a
  labels:
    app: vllm
    model: llama-3.1-405b-awq
    topology.kubernetes.io/zone: us-west-2a
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 250Gi

---
# Phase #54f (2026-04-30): third sibling PVC, us-west-2b. After
# AWS InsufficientInstanceCapacity rotated through us-west-2c → 2a
# → 2c again within an hour during the Phase #54b smoke test, the
# decision was to populate gp3 PVCs in EVERY AZ the VPC supports
# so the operator can swap to whichever AZ has p4d/p5 capacity at
# any moment. With 3 PVCs (us-west-2a, b, c), at least 2 of 3 AZs
# typically have capacity simultaneously per AWS's tonight error
# messages.
#
# us-west-2d was attempted but the VPC has no private subnet in
# us-west-2d (only AZ1, AZ2, AZ3 = us-west-2a, b, c per the VPC
# tags). 3-AZ coverage is the maximum without VPC subnet
# expansion; that's a Terraform infra change deferred until/if
# us-west-2d capacity proves to matter.
#
# Total 405B storage cost (post #54f):
#   vllm-cache-llama-405b           S3-Mountpoint  $5.30/mo
#   vllm-cache-llama-405b-gp3       gp3 us-west-2c  $20/mo
#   vllm-cache-llama-405b-gp3-usw2a gp3 us-west-2a  $20/mo
#   vllm-cache-llama-405b-gp3-usw2b gp3 us-west-2b  $20/mo  (NEW)
#                                       Total      ~$65/mo
# Over remaining ~2 months until lab teardown end-of-June ≈ $130.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-cache-llama-405b-gp3-usw2b
  labels:
    app: vllm
    model: llama-3.1-405b-awq
    topology.kubernetes.io/zone: us-west-2b
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 250Gi

---
# Phase #81d: Llama 3.2 1B base weights cache for the distilled
# student. ~2.5GB weights → 10Gi PVC gives lots of headroom for
# tokenizer/config files + future model variants we might re-stage
# under the same cache PVC. Smaller than the 8B cache (30Gi) since
# 1B's working set is ~5× smaller.
#
# Pre-stage weights via:
#   aws s3 sync s3://huggingface-models-public/NousResearch/Llama-3.2-1B/ \
#     s3://raj-ai-lab-eks-model-weights/llama-3.2-1b/
# (Operator-side, one-time. Same pattern as the 8B base.)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-cache-llama-1b-distilled
  labels:
    app: vllm
    model: llama-3.2-1b
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
