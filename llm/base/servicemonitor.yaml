apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vllm
  labels:
    app: vllm
    # kube-prometheus-stack's Prometheus selects ServiceMonitors with this
    # label (release=kube-prometheus-stack). Without it, the scrape target
    # is ignored even though the Service + endpoint exist.
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: vllm
  endpoints:
    - port: http
      path: /metrics
      # 30s is plenty for a lab; vllm's gauges (KV-cache util, active
      # requests) don't move fast enough to need tighter scrape.
      interval: 30s
