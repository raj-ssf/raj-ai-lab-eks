apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - serviceaccount.yaml
  - pvc.yaml
  # Per-model PVCs for "hot" model variants (8B, Mixtral 8x7B,
  # Llama 3.2 Vision 11B). Each is a dedicated gp3 cache.
  - pvcs-models.yaml
  # Statically-provisioned PV + PVC backed by S3 Mountpoint for the
  # 230 GB Llama 3.1 405B model — avoids a dedicated EBS PVC for a
  # rare-use weights set. Requires the aws-mountpoint-s3-csi-driver
  # EKS add-on (raj-ai-lab-eks-infra/mountpoint-s3-csi.tf).
  - pv-llama-405b.yaml
  - deployment.yaml
  # Hardware-comparison test variants. Each is an additional named
  # Deployment pinned to one instance type via nodeSelector; all
  # steady-state replicas=0. Activated per-test by kubectl scale.
  # Not exposed via the main llm.ekstest.com Service — reach them
  # via `kubectl port-forward deployment/<name>`.
  - deployment-variants.yaml
  # Model-axis test variants — one Deployment per model, each paired
  # with its dedicated PVC (or S3 Mountpoint PVC for 405B). Replicas=0
  # by default; kubectl scale to bring one online for a demo.
  - deployment-models.yaml
  # Per-model-variant Services so callers (langgraph-service router,
  # rag-service hybrid path) can address each variant by stable DNS
  # name. The default `vllm` Service in service.yaml continues to
  # front the canonical 70B AWQ Deployment.
  - services-models.yaml
  - service.yaml
  - httproute.yaml
  - servicemonitor.yaml
  # Phase #54's prewarm-cronjobs.yaml was removed in Phase #82d.
  # Reason: with Phase #80c's HPA min=1 enforcing always-warm 1
  # replica, the `prewarm-down` CronJob's scale-to-0 at 2am PT
  # ACTIVELY conflicts with HPA's floor — HPA cannot scale FROM
  # zero (the metric-stream goes <unknown> with no pod emitting),
  # so the deployment stays at 0 from 2am PT until manually
  # rescued OR until prewarm-up fires at 9am PT. During that
  # 7-hour window every chat request that doesn't hit the social
  # filter (Phase #82) returns "no healthy upstream" 503.
  #
  # Observed live 2026-05-01 13:32 PT: user prompted "Can you
  # think?" → classify call to vllm-llama-8b → 503 → user-
  # visible upstream error. Manual scale rescued it.
  #
  # Cost trade-off:
  #   Before (Phase #54):  17h/day window × ~$0.65/hr ≈ $330/mo
  #   After (Phase #82d):  24h × ~$0.80/hr (g6.xlarge HPA-managed) ≈ $580/mo
  # ~$250/mo extra for guaranteed availability of the
  # always-on tier. Worth it given chat-ui's user-facing impact.
  #
  # Future cost-flexibility path:
  #   Phase #80d KEDA ScaledObject CAN scale from 0 (polls
  #   Prometheus directly even when no pods exist), restoring the
  #   2am-scale-down savings while keeping the autoscaling.
  #   Tracked as a separate phase; #82d is the immediate fix.
  # Phase #80d: KEDA ScaledObject replaces the Phase #80c HPA.
  # KEDA's prometheus trigger polls Prometheus directly (independent
  # of pod state) so it CAN scale from 0, unlike HPA. Stacked
  # cron+prometheus triggers give us:
  #   - Always-warm 9am-2am PT (matches the original Phase #54 window)
  #   - Off-hours scale-to-0 (cost saving)
  #   - Load-driven scale-up at any hour
  # Phase #82d's prewarm-cronjobs.yaml removal stays — that
  # mechanism is now subsumed by the cron trigger inside this
  # ScaledObject.
  - scaledobject-vllm-llama-8b.yaml
