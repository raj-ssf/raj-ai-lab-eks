apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  labels:
    app: vllm
spec:
  # Steady-state off. GPU nodes are demo-on-demand: `kubectl -n llm scale
  # deployment vllm --replicas=1` triggers Karpenter to provision a node
  # (~60-90s); scaling back to 0 triggers consolidation (~30s). The
  # ArgoCD Application for vllm is wired with ignoreDifferences on
  # /spec/replicas + RespectIgnoreDifferences=true, so selfHeal will not
  # revert a manual scale — see argocd-apps.tf:vllm_app in the infra repo.
  replicas: 0
  # GPU pods aren't great candidates for rolling updates on a single-node
  # GPU pool — Recreate avoids trying to schedule a second 4-GPU pod when
  # only one fits.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      serviceAccountName: vllm
      # Disable Docker-link-style Service env var injection. Kubernetes
      # otherwise injects VLLM_SERVICE_HOST / VLLM_SERVICE_PORT / VLLM_PORT
      # etc. for every Service in the namespace — and 'VLLM_PORT' happens
      # to be vLLM's own native env var for the server bind port. K8s
      # injects 'tcp://IP:8000', vLLM tries to int() that, crashes with
      # ValueError at engine start. Modern K8s opinion is service links
      # are legacy anyway (use DNS: vllm.llm.svc.cluster.local).
      enableServiceLinks: false
      # Target the dedicated GPU node group only.
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      # Init container streams weights from S3 to the PVC. First pod ever:
      # ~60s for a 38 GB sync over AWS backbone. Subsequent pod restarts:
      # seconds (aws s3 sync skips files already present).
      initContainers:
        - name: model-sync
          image: amazon/aws-cli:2.17.0  # ships awscli v2 + Pod Identity support
          env:
            - name: AWS_REGION
              value: us-west-2
            - name: S3_URI
              value: s3://raj-ai-lab-eks-cilium-model-weights/llama-3.3-70b-instruct-awq/
            - name: MODEL_PATH
              value: /model
          command: ["/bin/sh", "-euxc"]
          args:
            - |
              aws configure set default.s3.max_concurrent_requests 32
              aws configure set default.s3.multipart_chunksize 128MB
              aws s3 sync "$S3_URI" "$MODEL_PATH" \
                --exclude ".cache/*" \
                --exclude "*.metadata" \
                --no-progress
              ls -la "$MODEL_PATH"
          resources:
            requests:
              cpu: "2"
              memory: "2Gi"
            limits:
              cpu: "8"
              memory: "4Gi"
          volumeMounts:
            - name: model-cache
              mountPath: /model
        # Phase #83c (2026-05-02): pull the Llama 3.2 1B base weights for
        # use as the speculative-decoding draft. vLLM loads draft + target
        # in the same process, so the 1B weights need to be on the 70B
        # pod's filesystem (mounted via vllm-cache-llama-3.2-1b-draft PVC).
        # ~2.5 GB sync; ~30 s warm, ~5 s on warmed PVC.
        - name: draft-sync
          image: amazon/aws-cli:2.17.0
          env:
            - { name: AWS_REGION, value: us-west-2 }
            - { name: S3_URI,     value: s3://raj-ai-lab-eks-cilium-model-weights/llama-3.2-1b/ }
            - { name: DRAFT_PATH, value: /draft-model }
          command: ["/bin/sh", "-euxc"]
          args:
            - |
              aws configure set default.s3.max_concurrent_requests 32
              aws configure set default.s3.multipart_chunksize 64MB
              aws s3 sync "$S3_URI" "$DRAFT_PATH" --no-progress
              ls -la "$DRAFT_PATH"
          resources:
            requests: { cpu: "500m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
          volumeMounts:
            - name: draft-cache
              mountPath: /draft-model
      containers:
        - name: vllm
          # OpenAI-compatible server build. Pin the tag in the overlay so
          # version bumps don't require editing the base.
          image: vllm/vllm-openai:placeholder
          args:
            - "--model"
            - "/model"
            - "--served-model-name"
            - "llama-3.3-70b"
            - "--tensor-parallel-size"
            - "4"
            - "--quantization"
            - "awq"          # vLLM auto-picks the marlin kernel on Ampere (A10G)
            - "--dtype"
            - "half"         # FP16 activations
            - "--max-model-len"
            - "16384"        # conservative; bump if KV cache has room
            # Phase #83c attempt-2 follow-up (2026-05-03): 0.92 -> 0.80.
            # The original 0.92 was sized for 70B-only on this Deployment.
            # With spec decoding wired (--speculative-model below loading
            # a 1B FP16 draft TP-sharded across all 4 ranks), vLLM's
            # memory pool at 0.92 saturates the GPU at ~21.3 GiB used /
            # 22 GiB total on the L4-class g6.12xlarge -- leaving only
            # ~123 MiB free for NCCL's all_reduce working memory during
            # inference. RAGAS judge load triggered OOM:
            #   torch.OutOfMemoryError: CUDA out of memory. Tried to
            #   allocate 246.00 MiB. GPU 0 has a total capacity of
            #   22.03 GiB of which 123.69 MiB is free.
            # at vllm/distributed/parallel_state.py: _all_reduce_out_place.
            # Crashed under the 15-concurrent eval /v1/chat/completions
            # barrage (was idle-fine for ~50 min before that).
            #
            # 0.80 leaves ~4.4 GiB free per GPU for NCCL + system buffer
            # while still affording ~3 GiB KV pool per GPU. Trade-off:
            # lower max-concurrent-decode capacity per pod, but stable
            # under realistic load instead of OOM-crashing. If Karpenter
            # ever schedules to a larger GPU class (L40S 48 GiB or A100
            # 80 GiB) the same 0.80 leaves much more headroom -- the
            # tightness only shows on L4 24 GiB.
            - "--gpu-memory-utilization"
            - "0.80"
            - "--enforce-eager"   # skip CUDA graph capture → faster cold start, -15% tokens/sec
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            # Phase #83c (2026-05-02): speculative decoding. Llama 3.2 1B
            # (FP16, base) drafts N tokens; this 70B target verifies them
            # in a single forward pass.
            #
            # Why this target (not the 8B from attempt-1): vLLM 0.7.2's
            # SpecDecodeWorker raises ValueError when --enable-lora is
            # set on the target. The 8B has the alpaca LoRA loaded and
            # serves the tuned-lora langgraph tier; this 70B Deployment
            # is LoRA-free, so the guard doesn't fire. See
            # feedback_vllm_spec_decode_lora.md.
            #
            # TP=4 + spec decode topology: vLLM defaults
            # speculative-draft-tensor-parallel-size=1, so the 1B draft
            # loads on rank 0 only (asymmetric ~2.5 GB on one of four
            # L40S 48 GiB GPUs). With gpu-memory-utilization=0.92 and
            # 70B AWQ at ~9.5 GiB per GPU shard + ~6 GiB activations,
            # GPU 0 still has ~26 GiB KV pool vs ~28 GiB on GPUs 1-3 —
            # asymmetry well under noise. No need to drop the
            # gpu-memory-utilization here (unlike attempt-1 on the 8B
            # where the L4 24 GiB margin was tight).
            #
            # Caveats inherited from spec decode in vLLM 0.7.2:
            #   - Acceptance rate depends on draft/target distribution
            #     alignment. 1B base + 70B Instruct are both Llama
            #     family but different post-training; expect 30-50%
            #     accept on plain chat.
            #   - This Deployment doesn't use --enable-auto-tool-choice
            #     or --enable-lora, so the draft path covers all
            #     traffic uniformly.
            #   - Compatible with --enforce-eager (above) — spec
            #     decoding works without CUDA graphs at some per-token
            #     overhead.
            - "--speculative-model"
            - "/draft-model"
            - "--num-speculative-tokens"
            - "5"
            # OTLP tracing disabled: stock vllm/vllm-openai:v0.7.2 image
            # doesn't ship OpenTelemetry Python packages, so setting
            # --otlp-traces-endpoint crashes engine init with
            # 'ModuleNotFoundError: No module named opentelemetry'.
            # Restore by layering a custom image that pip-installs
            # opentelemetry-api / sdk / exporter-otlp on top of upstream,
            # then set the flag back. Prometheus /metrics path is
            # unaffected — ServiceMonitor continues to scrape it.
          ports:
            - name: http
              containerPort: 8000
          env:
            # Skip HF's telemetry ping on startup (no network anyway, but
            # avoids a blocking retry during init).
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: TRANSFORMERS_OFFLINE
              value: "1"
            # NCCL across 4 GPUs — disable the P2P shared-memory transport
            # check since /dev/shm is already sized for it via the shm volume.
            - name: NCCL_DEBUG
              value: "WARN"
            # OTel service name — harmless when the traces endpoint isn't
            # configured (vllm only reads this when tracing is active).
            # Kept so re-enabling the endpoint is a 1-line flag-flip.
            - name: OTEL_SERVICE_NAME
              value: vllm
          resources:
            requests:
              # 4 A10G GPUs consumed by one pod. No other vLLM pod can
              # coschedule on this node until this one scales down.
              nvidia.com/gpu: "4"
              cpu: "8"
              # Host RAM during vLLM init: weights are mmap'd from disk
              # then copied to GPU VRAM; transient peak ~45 GB.
              memory: "64Gi"
            limits:
              nvidia.com/gpu: "4"
              cpu: "32"
              memory: "120Gi"
          # vLLM cold start for 70B AWQ across 4 GPUs: ~2-3 min (s3 sync
          # already done). startupProbe gives it a 10-minute window before
          # the kubelet gives up; readiness takes over once it responds.
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: model-cache
              mountPath: /model
              readOnly: true
            - name: draft-cache
              mountPath: /draft-model
              readOnly: true
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-model-cache
        # Phase #83c: draft model cache for speculative decoding. PVC
        # rather than emptyDir so the 2.5 GB sync doesn't repeat on
        # every pod restart. PVC defined in pvcs-models.yaml.
        - name: draft-cache
          persistentVolumeClaim:
            claimName: vllm-cache-llama-3.2-1b-draft
        # NCCL's P2P + vLLM's tensor-parallel IPC use /dev/shm heavily.
        # Default container shm is 64 MiB — far too small for 70B across
        # 4 GPUs. Memory-backed emptyDir bypasses disk and grows as needed
        # up to the sizeLimit.
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
