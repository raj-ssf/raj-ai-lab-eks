# Phase #81d: Alpaca-format chat template for vllm-llama-1b-distilled.
#
# The base model NousResearch/Llama-3.2-1B is the BASE variant (not
# Instruct), so its tokenizer ships no chat_template. Without a
# template, vLLM 0.7.2's /v1/chat/completions returns HTTP 400.
#
# IMPORTANT: this template renders messages in **Alpaca format**, not
# the canonical Llama-3 chat-template format. Why:
#
#   The distilled LoRA was trained via axolotl `type: alpaca` on
#   Dolly-15k teacher outputs (training/configs/llama-3.2-1b-
#   distilled.yaml). Axolotl's alpaca formatter wraps each example as:
#
#     Below is an instruction that describes a task. Write a
#     response that appropriately completes the request.
#
#     ### Instruction:
#     {instruction}
#
#     ### Response:
#     {output}<|end_of_text|>
#
#   So the LoRA learned to recognize "### Instruction:" / "### Response:"
#   as the prompt structure and emit <|end_of_text|> as the stop token.
#   It NEVER saw the Llama-3 chat-template special tokens
#   (<|start_header_id|>, <|eot_id|>) during training, so wrapping
#   inference prompts in those tokens makes the LoRA produce garbled
#   output that fails to stop at end-of-turn.
#
#   First Phase #81d chat-completions test (2026-05-02) confirmed this:
#   Llama-3 chat template produced "What is the capital of France?
#   edReader\n\n[repeats]..." with finish=length. Switched to Alpaca
#   format here.
#
# Single-turn assumption: trivial-fast tier handles single-turn
# factual queries; multi-turn chat history is reduced to "last user
# message" in this template. If trivial-fast ever needs real
# multi-turn awareness, this template would need to render the full
# conversation as the instruction with a "Conversation history:" prefix.
#
# Tools support: not included. Same caveat as the prior Llama-3
# template: tool calls in chat-completions requests will silently
# not render to the model. A tools-aware Alpaca variant (or
# re-training the LoRA on a chat-format dataset) is a follow-up.
#
# Why ConfigMap instead of inline `--chat-template "<jinja>"` arg:
# Jinja escaping inside YAML strings is fragile (newlines, single
# quotes, backslashes all get mangled). A mounted file lets us write
# clean Jinja and reference it by path.
#
# Other Deployments (vllm-llama-8b, vllm-deepseek-r1-70b, etc.) use
# Instruct-tuned bases that ship their own chat_template AND were
# trained on chat-format data — they don't need this fix. This is
# specific to the 1B-distilled-on-Alpaca-data combination.

apiVersion: v1
kind: ConfigMap
metadata:
  name: chat-template-llama3
  namespace: llm
  labels:
    app.kubernetes.io/component: chat-template
    phase: "81d"
data:
  llama3.jinja: |
    {%- set sys = (messages | selectattr('role', 'equalto', 'system') | map(attribute='content') | list | first) | default('') -%}
    {%- set usr = (messages | selectattr('role', 'equalto', 'user') | map(attribute='content') | list | last) | default('') -%}
    Below is an instruction that describes a task. Write a response that appropriately completes the request.
    {% if sys %}
    {{ sys | trim }}
    {% endif %}
    ### Instruction:
    {{ usr | trim }}

    ### Response:
