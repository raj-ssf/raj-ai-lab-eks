# Phase #81d: Chat template for vllm-llama-1b-distilled.
#
# The base model NousResearch/Llama-3.2-1B is the BASE variant
# (not Instruct), so its tokenizer ships no chat_template. Without
# a template, vLLM 0.7.2's /v1/chat/completions returns HTTP 400:
#   "As of transformers v4.44, default chat template is no longer
#    allowed, so you must provide a chat template if the tokenizer
#    does not define one."
#
# We pass --chat-template /chat-templates/llama3.jinja to vLLM via
# the Deployment args (llm/base/deployment-models.yaml vllm-llama-1b-
# distilled section). This mounts here as a ConfigMap volume.
#
# Template scope: basic chat (system / user / assistant turns).
# Tools support is NOT included in this version — a tools-aware
# template (matching what Llama-3.1-Instruct's tokenizer ships) is
# a follow-up. Tool calls in /v1/chat/completions requests will
# silently not render to the model until the tools-aware template
# replaces this one.
#
# Why ConfigMap instead of inline `--chat-template "<jinja>"` arg:
# Jinja escaping inside YAML strings is fragile (newlines, single
# quotes, backslashes all get mangled). A mounted file lets us write
# clean Jinja and reference it by path.
#
# Other Deployments (vllm-llama-8b, vllm-deepseek-r1-70b, etc.) use
# Instruct/chat-tuned bases whose tokenizer_config.json already ships
# a chat_template — they don't need this. This file is specific to
# the 1B-distilled variant whose base lacks one.

apiVersion: v1
kind: ConfigMap
metadata:
  name: chat-template-llama3
  namespace: llm
  labels:
    app.kubernetes.io/component: chat-template
    phase: "81d"
data:
  llama3.jinja: |
    {%- set loop_messages = messages -%}
    {%- for message in loop_messages -%}
    {%- set content = '<|start_header_id|>' + message['role'] + '<|end_header_id|>\n\n' + message['content'] | trim + '<|eot_id|>' -%}
    {%- if loop.index0 == 0 -%}
    {%- set content = bos_token + content -%}
    {%- endif -%}
    {{- content -}}
    {%- endfor -%}
    {%- if add_generation_prompt -%}
    {{- '<|start_header_id|>assistant<|end_header_id|>\n\n' -}}
    {%- endif -%}
