apiVersion: v1
kind: ServiceAccount
metadata:
  name: vllm
  # namespace: set by overlay (`namespace:` field in kustomization.yaml)
  # Pod Identity association binding this SA to the vllm IAM role is
  # declared in raj-ai-lab-eks-infra/model-weights.tf — the association
  # is matched by (cluster, namespace, service_account) tuple, no
  # annotation needed on the SA itself (that's the IRSA pattern, not
  # Pod Identity's).
