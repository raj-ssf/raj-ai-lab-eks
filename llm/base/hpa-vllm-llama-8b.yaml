# Phase #80c: HPA for vllm-llama-8b on queue depth.
#
# Scales 1 → 4 replicas based on `vllm_num_requests_waiting` — the
# count of requests in vLLM's prefill/decode queue. >5 sustained per
# pod = backpressure → spawn another vllm pod (Karpenter expands the
# gpu-experiments NodePool with a fresh g6.xlarge L4).
#
# Scaling signal rationale (vs CPU/memory):
#   vLLM is GPU-bound. The Python OpenAI server has roughly constant
#   CPU (~3-5 cores) regardless of how many concurrent requests are
#   in-flight on the GPU's continuous-batching scheduler. CPU-based
#   HPA on vllm would never trigger. The right backpressure signal
#   is the queue: when the GPU's KV cache is full, new requests
#   queue. Sustained queue depth = "this pod is saturated."
#
# Why minReplicas=1 (not 0):
#   1. HPA structurally cannot scale from 0 — needs at least one pod
#      emitting metrics for the controller to read.
#   2. langgraph-service's ensure_warm node (main.py:2475) handles
#      cold-start scale-from-0 → 1 today. With min=1, ensure_warm is
#      effectively a no-op (always sees a warm pod), and HPA owns
#      1 → N scaling. The two coexist cleanly.
#   3. Production-grade chat at 1000 users would never want 0 warm —
#      first-request latency on a cold vllm spawn is ~3-5 min (GPU
#      node spawn + image pull + model load). At 1 warm: <500ms.
#
# Why maxReplicas=4:
#   gpu-experiments NodePool limit: 8 GPUs total
#   (raj-ai-lab-eks-infra/karpenter-nodepool.tf:344).
#   8B at TP=1 = 1 GPU/pod. 4 pods = 4 GPUs (half the cap), leaves
#   room for variant deployments (vllm-llama-405b, vllm-bge-m3 if
#   GPU-pooled) to spawn alongside without bumping the NodePool
#   limit. At 4 vllm-llama-8b pods × ~30 concurrent generations each
#   = ~120 concurrent users. Aligns with the "1000 users at 5%
#   concurrency" target from the production-grade discussion.
#
# Behavior tuning:
#   scaleUp stabilization 30s — GPU node spawn is slow (Karpenter
#     spawn + g6.xlarge boot + image pull + vLLM init = 3-5 min
#     wall-clock). Don't dawdle; start the spawn signal fast.
#   scaleUp policies allow up to 100% growth or 1 pod per 30s
#     (whichever is larger). For a workload that takes 3-5 min to
#     spawn, "scale by 100% every 30s" is bounded by reality —
#     Karpenter won't actually spawn nodes that fast.
#   scaleDown stabilization 600s (10 min) — GPU nodes are expensive
#     and slow to re-spawn. Don't churn on transient lulls.
#   scaleDown policies cap at 1 pod per 60s — gentle release.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vllm-llama-8b
  namespace: llm
  labels:
    app: vllm-llama-8b
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vllm-llama-8b
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Pods
      pods:
        metric:
          name: vllm_num_requests_waiting
        target:
          type: AverageValue
          averageValue: "5"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      selectPolicy: Max
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 1
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 600
      selectPolicy: Min
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
