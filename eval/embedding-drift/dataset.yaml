# Canary text snippets for embedding drift detection.
#
# These texts are FROZEN across runs — the same strings get embedded
# every time the drift Job runs. What CAN change between runs:
#   - The vllm-bge-m3 model version (image bump)
#   - GPU driver / CUDA toolkit changes
#   - vLLM internal changes to embedding extraction
#   - Numerical instability across hardware migrations
#
# Each shift in any of those produces slightly different embeddings
# for the same text. Small drifts are expected (numerical noise);
# large drifts mean the embedding-space landscape has shifted enough
# that pre-existing cached embeddings + Qdrant-stored chunks may be
# less aligned with new queries — silent retrieval quality regression.
#
# Coverage strategy: 15 snippets across diverse semantic regions so
# drift in any one area doesn't average out. Categories:
#   tech_infra        Kubernetes / AWS / networking jargon
#   tech_app          application-layer development
#   common_knowledge  generic facts a chat user might ask
#   domain_specific   queries representative of this lab's actual
#                     RAG workload (Pod Identity, Llama, vLLM)
#   edge_cases        very short / very long / multilingual /
#                     code-bearing snippets

snippets:
