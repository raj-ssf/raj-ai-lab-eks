    text: "def cosine(a, b): return sum(x*y for x,y in zip(a,b)) / (sum(x*x for x in a)**0.5 * sum(y*y for y in b)**0.5)"

  - id: edge-long
    category: edge_cases
    text: |
      The hybrid retrieval pattern combines dense embedding-based search with sparse BM25 lexical matching, using Reciprocal Rank Fusion (RRF) to merge ranked lists. Dense embeddings via bge-m3 capture semantic similarity but can miss exact-keyword matches; sparse BM25 captures rare technical terms (function names, error codes, model names) that a dense model might map to a generic concept embedding. RRF fuses them by summing 1/(k + rank) across lists, robust to the absence of common scale between the two scoring systems. Cross-encoder reranking via bge-reranker-v2-m3 then scores query+candidate pairs jointly, providing the precision boost a bi-encoder cannot match because it sees both inputs simultaneously rather than embedding them independently.
